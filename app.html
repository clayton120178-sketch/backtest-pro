<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backtest Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── DESIGN TOKENS ────────────────────────────────────────── */
:root{
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --smooth:cubic-bezier(0.4,0,0.2,1);
  --out:cubic-bezier(0,0,0.2,1);
  --t1:100ms;--t2:180ms;--t3:300ms;

  /* Dark (default) */
  --bg0:#08080B;
  --bg1:#0F0F14;
  --bg2:#151519;
  --bg3:#1C1C22;
  --bd:rgba(255,255,255,0.07);
  --bdh:rgba(255,255,255,0.14);
  --tx:#F2F2F6;
  --txs:#72728A;
  --txm:#6B6B82;

  /* Brand — Âmbar (logo, accent decorativo, chips ativos, steps) */
  --ac:#F0A020;
  --acd:rgba(240,160,32,0.09);
  --acd2:rgba(240,160,32,0.16);

  /* Ação primária — Branco (botão avançar, CTA principal) */
  --action:#F2F2F6;
  --action-t:#08080B;

  /* Confirmação / Profit — Verde */
  --pr:#00BB80;
  --prd:rgba(0,187,128,0.09);

  /* Danger / Loss — Vermelho */
  --dg:#EE3A3A;
  --dgd:rgba(238,58,58,0.09);

  /* Info / Neutro — Índigo */
  --in:#7878EE;
  --ind:rgba(120,120,238,0.09);

  /* Warning / Atenção — usado em alerts, nunca em CTA */
  --wn:#F0A020;
  --wnd:rgba(240,160,32,0.09);
}

/* ── LIGHT THEME ─────────────────────────────────────────── */
[data-theme="light"]{
  --bg0:#F3F1EC;
  --bg1:#FDFCF9;
  --bg2:#ECEAE3;
  --bg3:#E2DFD7;
  --bd:rgba(0,0,0,0.12);
  --bdh:rgba(0,0,0,0.22);
  --tx:#0E0C14;
  --txs:#4A465E;
  --txm:#7A7690;
  --ac:#B86800;
  --acd:rgba(184,104,0,0.08);
  --acd2:rgba(184,104,0,0.15);
  --action:#0E0C14;
  --action-t:#FDFCF9;
  --pr:#006E4A;
  --prd:rgba(0,110,74,0.08);
  --dg:#B81C1C;
  --dgd:rgba(184,28,28,0.08);
  --in:#3030B0;
  --ind:rgba(48,48,176,0.08);
  --wn:#B86800;
  --wnd:rgba(184,104,0,0.08);
}

html,body{min-height:100%;background:var(--bg0);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;transition:background var(--t3) var(--smooth),color var(--t3) var(--smooth)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
input,button,select{font-family:inherit}
input[type=range]{accent-color:var(--ac)}

/* Scanlines — dark mode only */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.013) 0px,rgba(255,255,255,0.013) 1px,transparent 1px,transparent 4px)}
[data-theme="light"] body::after{display:none}

@keyframes sright{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes sleft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes lprog{0%{width:0}15%{width:18%}40%{width:50%}70%{width:75%}95%{width:93%}100%{width:93%}}
@keyframes stepDone{0%{transform:scale(1)}35%{transform:scale(1.25)}65%{transform:scale(0.92)}100%{transform:scale(1)}}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.72)}}
.aFwd{animation:sright .2s var(--out) both}
.aBwd{animation:sleft .2s var(--out) both}
.aUp{animation:fadeUp .22s var(--out) both}

/* ── LAYOUT ──────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--bg1);border-bottom:0.5px solid var(--bd);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;transition:background var(--t3) var(--smooth)}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-icon{width:28px;height:28px;border-radius:7px;background:var(--acd2);border:0.5px solid var(--ac);display:flex;align-items:center;justify-content:center;animation:breathe 2.4s var(--smooth) infinite}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.02em}
.logo-text span{color:var(--ac)}

/* Progress bar */
.prog-bar{display:flex;align-items:center;gap:0;flex:1;justify-content:center;overflow:hidden}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background var(--t2);border:none;background:none;color:inherit}
.prog-step:hover:not(:disabled){background:var(--bg2)}
.prog-step:disabled{cursor:default}
.prog-circle{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;transition:all var(--t2) var(--smooth);flex-shrink:0}
.prog-circle.done{background:var(--pr);border-color:var(--pr)}
.prog-circle.active{background:var(--ac);border-color:var(--ac)}
.prog-label{font-size:10px;font-weight:600;color:var(--txm);white-space:nowrap;transition:color var(--t2);letter-spacing:.03em}
.prog-label.active{color:var(--ac)}
.prog-label.done{color:var(--pr)}
.prog-line{width:16px;height:0.5px;background:var(--bd);flex-shrink:0;margin-bottom:14px;transition:background var(--t3)}
.prog-line.done{background:var(--pr)}
.avatar{width:30px;height:30px;border-radius:15px;background:var(--bg2);border:0.5px solid var(--bd);display:flex;align-items:center;justify-content:center}
main{flex:1;padding:24px 20px;max-width:1060px;width:100%;margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
@media(max-width:800px){.two-col{grid-template-columns:1fr}.side-panel{display:none!important}}

/* ── CARDS ───────────────────────────────────────────────── */
.card{background:var(--bg1);border:0.5px solid var(--bd);border-radius:12px;transition:border-color var(--t2) var(--smooth),background var(--t2) var(--smooth),box-shadow var(--t2) var(--smooth),transform var(--t2) var(--spring)}
.card.sel{border-color:var(--ac)!important;background:var(--acd)!important}
.card.seld{border-color:var(--dg)!important;background:var(--dgd)!important}
.card.selp{border-color:var(--pr)!important;background:var(--prd)!important}
.card.pick{cursor:pointer}
.card.pick:hover{border-color:var(--bdh);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.card.pick.dir-venda:hover{border-color:var(--dg);background:var(--dgd)}
.card.pick.sel:hover{border-color:var(--ac)}
.card.pick.seld:hover{border-color:var(--dg)}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;font-weight:600;transition:transform var(--t1) var(--spring),box-shadow var(--t2) var(--smooth),background var(--t1),opacity var(--t2);border-radius:8px;white-space:nowrap;font-size:14px;position:relative;overflow:hidden;letter-spacing:-.01em}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:opacity var(--t1)}
.btn:hover::before{opacity:1}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.97) translateY(0)}
.btn:disabled{opacity:.32;cursor:not-allowed;transform:none!important;pointer-events:none}

/* Primário — VERDE (avançar, confirmar, rodar) */
.btnP{background:var(--pr);color:#fff;padding:11px 22px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.btnP:hover{box-shadow:0 6px 20px var(--prd)}

/* Secundário */
.btnS{background:transparent;color:var(--txs);padding:11px 16px;border:0.5px solid var(--bd)}
.btnS:hover{color:var(--tx);border-color:var(--bdh);background:var(--bg2)}

/* Ghost / small */
.btnGh{background:transparent;border:0.5px solid var(--bd);color:var(--txs);padding:4px 9px;font-size:12px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all var(--t1) var(--spring);font-weight:500}
.btnGh:hover{color:var(--tx);border-color:var(--bdh)}

/* Confirmar — VERDE */
.btnConfirm{background:var(--pr);color:#fff;padding:11px 22px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.btnConfirm:hover{box-shadow:0 6px 20px var(--prd)}

/* Âmbar — apenas para Pro/upgrade (não CTA de fluxo) */
.btnAmber{background:var(--ac);color:#000;padding:11px 22px;font-weight:700}
.btnAmber:hover{box-shadow:0 6px 20px var(--acd2)}

/* Warn confirm — aviso que pode confirmar assim mesmo */
.btnWarn{background:var(--wnd);color:var(--wn);padding:11px 22px;font-weight:700;border:0.5px solid rgba(240,160,32,.3)}
.btnWarn:hover{background:rgba(240,160,32,.18)}

/* ── CHIPS ───────────────────────────────────────────────── */
.chip{padding:5px 14px;border-radius:99px;cursor:pointer;font-size:13px;font-weight:500;border:0.5px solid var(--bd);background:var(--bg2);color:var(--txs);transition:all var(--t1) var(--spring);user-select:none;display:inline-flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--bdh);color:var(--tx);transform:translateY(-1px)}
.chip.on{background:var(--pr);border-color:var(--pr);color:#fff;font-weight:700;box-shadow:0 2px 10px var(--prd)}
.chip.onV{background:var(--dg);border-color:var(--dg);color:#fff;font-weight:700;box-shadow:0 2px 10px var(--dgd)}
.chip.onA{background:var(--in);border-color:var(--in);color:#fff;font-weight:700}

/* Direction chips */
.chip-buy{border-color:var(--pr);color:var(--pr);background:var(--prd)}
.chip-buy:hover{border-color:var(--pr);color:var(--pr);background:var(--prd);transform:translateY(-1px)}
.chip-buy.on{background:var(--pr);border-color:var(--pr);color:#fff;font-weight:700;box-shadow:0 2px 12px var(--prd)}
.chip-sell{border-color:var(--dg);color:var(--dg);background:var(--dgd)}
.chip-sell:hover{border-color:var(--dg);color:var(--dg);background:var(--dgd);transform:translateY(-1px)}
.chip-sell.on{background:var(--dg);border-color:var(--dg);color:#fff;font-weight:700;box-shadow:0 2px 12px var(--dgd)}

/* ── FORM ────────────────────────────────────────────────── */
.slabel{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.09em;display:flex;align-items:center;gap:5px;margin-bottom:9px}
.stepper{display:flex;align-items:center;gap:6px}
.step-btn{background:var(--bg3);border:0.5px solid var(--bd);color:var(--tx);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:300;transition:all var(--t1) var(--spring);flex-shrink:0;font-family:inherit}
.step-btn:hover{background:var(--bg2);border-color:var(--bdh);transform:scale(1.10)}
.step-btn:active{transform:scale(.92)}
.step-val{min-width:48px;width:64px;text-align:center;background:var(--bg3);border:0.5px solid var(--bd);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--tx);font-family:'JetBrains Mono',monospace;outline:none;transition:border-color var(--t2),transform var(--t1) var(--spring)}
.step-val:focus{border-color:var(--ac)}
.step-unit{font-size:12px;color:var(--txs);flex-shrink:0}
.ckbox{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all var(--t2) var(--smooth)}
.ckbox.on{background:var(--pr);border-color:var(--pr)}
.cring{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t2) var(--smooth)}
.cring.on{background:var(--pr);border-color:var(--pr)}
.cring.dg.on{background:var(--dg);border-color:var(--dg)}
.toggle{width:44px;height:24px;border-radius:12px;border:1.5px solid var(--bd);cursor:pointer;position:relative;background:var(--bg3);transition:all var(--t2) var(--smooth);flex-shrink:0}
.toggle.on{background:var(--pr);border-color:var(--pr)}
.toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:8px;background:var(--txm);transition:left var(--t2) var(--spring),background var(--t2);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-thumb{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
[data-theme="light"] .toggle{border-color:rgba(0,0,0,.18);background:#D8D5CC}
[data-theme="light"] .toggle-thumb{background:#fff}
[data-theme="light"] .toggle.on{background:var(--pr);border-color:var(--pr)}

/* ── TABS ────────────────────────────────────────────────── */
.tabs{display:flex;border-bottom:0.5px solid var(--bd);gap:0;overflow-x:auto}
.tab{padding:8px 13px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txs);border-bottom:2px solid transparent;transition:all var(--t2) var(--smooth);user-select:none;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tab.onV{color:var(--dg);border-bottom-color:var(--dg)}

/* ── STEP HEADER ─────────────────────────────────────────── */
.step-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.step-icon{width:32px;height:32px;border-radius:9px;background:var(--acd2);border:0.5px solid var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--tx);letter-spacing:-.02em}
.step-sub{font-size:12px;color:var(--txm)}

/* Nav footer */
.nav-footer{display:flex;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:0.5px solid var(--bd)}

/* Radio row */
.radio-row{display:flex;align-items:flex-start;gap:11px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:background var(--t2) var(--smooth)}
.radio-row:hover{background:var(--bg2)}
.radio-row.on{background:var(--acd)}

/* Banner/alert */
.banner{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:9px;margin-bottom:16px}
.banner.warn{background:var(--wnd);border:0.5px solid rgba(240,160,32,.2)}

/* Condition item */
.cond-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg3);border:0.5px solid var(--bd);border-radius:10px;transition:border-color var(--t2) var(--smooth)}
.cond-item:hover{border-color:var(--bdh)}
.cond-icon{width:24px;height:24px;border-radius:6px;background:var(--acd);border:0.5px solid var(--acd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ac);font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700}
.and-divider{text-align:center;margin:3px 0;font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--ac)}

/* Mgmt block */
.mgmt-block{background:var(--bg1);border:0.5px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.mgmt-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:15px 17px}
.mgmt-body{padding:0 17px 17px;border-top:0.5px solid var(--bd)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:800;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeUp .18s var(--out)}
.modal{background:var(--bg1);border:0.5px solid var(--bdh);border-radius:18px;width:100%;max-width:720px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.8)}
.modal-header{padding:16px 20px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px}
.modal-footer{padding:13px 20px;border-top:0.5px solid var(--bd);display:flex;justify-content:flex-end;gap:9px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px}
.cond-preview{background:var(--bg0);border:0.5px solid var(--bd);border-radius:10px;padding:8px;margin-bottom:4px}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:28px;text-align:center}
.spinner{width:62px;height:62px;position:relative}
.spinner-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--pr);animation:spin .7s linear infinite}
.spinner-inner{position:absolute;inset:10px;border-radius:50%;border:1px solid var(--prd)}
.load-bar{width:260px;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;margin:0 auto}
.load-fill{height:100%;background:var(--pr);border-radius:1px;width:5%;transition:width 0.5s ease}

/* Results */
.verdict{border-radius:16px;padding:22px 26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.verdict.ok{background:var(--prd);border:0.5px solid rgba(0,187,128,.3)}
.verdict.bad{background:var(--dgd);border:0.5px solid rgba(238,58,58,.3)}
.verdict-icon{width:48px;height:48px;border-radius:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
@media(max-width:700px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
.metric-card{background:var(--bg1);border:0.5px solid var(--bd);border-radius:12px;padding:14px 16px;transition:all var(--t2) var(--spring)}
.metric-card:hover{border-color:var(--bdh);transform:translateY(-2px)}
.metric-label{font-size:9px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.metric-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;letter-spacing:-.03em}
.chart-card{background:var(--bg1);border:0.5px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.chart-label{font-size:9px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace}

/* Confirmation */
.confirm-row{padding-bottom:13px;margin-bottom:13px;border-bottom:0.5px solid var(--bd)}
.confirm-key{font-size:10px;font-weight:800;color:var(--txs);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px}
.confirm-val{font-size:14px;color:var(--tx);line-height:1.6}

/* ── AUTH ────────────────────────────────────────────────── */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.auth-modal{background:var(--bg1);border:0.5px solid var(--bdh);border-radius:20px;width:100%;max-width:420px;padding:36px 32px;box-shadow:0 32px 80px rgba(0,0,0,.8)}
.auth-logo{display:flex;align-items:center;gap:9px;margin-bottom:28px;justify-content:center}
.auth-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--acd2);border:0.5px solid var(--ac);display:flex;align-items:center;justify-content:center}
.auth-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--tx);letter-spacing:-.02em}
.auth-logo-text span{color:var(--ac)}
.auth-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--tx);margin-bottom:6px;text-align:center;letter-spacing:-.02em}
.auth-sub{font-size:13px;color:var(--txs);text-align:center;margin-bottom:24px;line-height:1.5}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.auth-input{width:100%;background:var(--bg3);border:0.5px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color var(--t2),box-shadow var(--t2);box-sizing:border-box}
.auth-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
.auth-input::placeholder{color:var(--txm)}
.auth-btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--pr);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all var(--t1) var(--spring);margin-top:4px;letter-spacing:-.01em}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,187,128,.25)}
.auth-btn:active{transform:scale(.97)}
.auth-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.auth-error{background:var(--dgd);border:0.5px solid rgba(238,58,58,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--dg);margin-bottom:14px;display:none}
.auth-error.show{display:block}
.auth-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--txm);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:0.5px;background:var(--bd)}
.auth-google{width:100%;padding:11px;border-radius:9px;border:0.5px solid var(--bd);background:transparent;color:var(--txs);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all var(--t1) var(--spring);display:flex;align-items:center;justify-content:center;gap:9px;box-sizing:border-box}
.auth-google:hover{color:var(--tx);border-color:var(--bdh);transform:translateY(-1px)}
.auth-toggle{text-align:center;margin-top:20px;font-size:13px;color:var(--txs)}
.auth-toggle a{color:var(--ac);cursor:pointer;font-weight:600}

/* Avatar menu */
.avatar-wrap{position:relative}
.avatar-menu{position:absolute;top:48px;right:0;background:var(--bg1);border:0.5px solid var(--bdh);border-radius:13px;padding:8px;min-width:210px;box-shadow:0 16px 48px rgba(0,0,0,.6);z-index:500;display:none}
.avatar-menu.open{display:block;animation:fadeUp .15s var(--out)}
.avatar-name{font-size:12px;color:var(--txs);padding:8px 10px 10px;border-bottom:0.5px solid var(--bd);margin-bottom:6px}
.avatar-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--txs);transition:all var(--t2) var(--smooth);background:none;border:none;width:100%;font-family:inherit;text-align:left}
.avatar-item:hover{background:var(--bg2);color:var(--tx)}
.avatar-item.danger{color:var(--dg)}
.avatar-item.danger:hover{background:var(--dgd)}
.avatar-version{font-size:10px;font-weight:700;color:var(--txm);letter-spacing:.06em;padding:6px 10px 8px;border-top:0.5px solid var(--bd);margin-top:4px;font-family:'JetBrains Mono',monospace}

/* Theme toggle in header */
.theme-sw{background:var(--bg2);border:0.5px solid var(--bd);border-radius:99px;display:flex;padding:3px;gap:0}
.theme-opt{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.04em;cursor:pointer;color:var(--txm);transition:all var(--t2) var(--smooth);user-select:none}
.theme-opt.on{background:var(--bg0);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* Tour */
.tour-help-btn{background:transparent;border:0.5px solid var(--bd);border-radius:8px;padding:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t2) var(--smooth);margin-right:6px}
.tour-help-btn:hover{background:var(--bg2);border-color:var(--bdh)}

/* ── PLANS ───────────────────────────────────────────────── */
.plans-screen{max-width:860px;margin:0 auto;padding:32px 20px}
.plans-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:var(--tx);margin-bottom:6px;text-align:center;letter-spacing:-.03em}
.plans-sub{font-size:14px;color:var(--txs);text-align:center;margin-bottom:28px}
.cycle-toggle{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.cycle-btn{padding:7px 18px;border-radius:99px;border:0.5px solid var(--bd);background:transparent;color:var(--txs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all var(--t1) var(--spring)}
.cycle-btn.active{background:var(--ac);border-color:var(--ac);color:#000;font-weight:700}
.plans-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:600px){.plans-grid{grid-template-columns:1fr}}
.plan-card{background:var(--bg1);border:0.5px solid var(--bd);border-radius:16px;padding:26px;position:relative;overflow:hidden;transition:all var(--t2) var(--spring)}
.plan-card:hover{border-color:var(--bdh);transform:translateY(-2px)}
.plan-card.featured{border-color:rgba(240,160,32,.4);background:var(--acd)}
.plan-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--ac)}
.plan-popular{position:absolute;top:16px;right:16px;padding:3px 10px;border-radius:5px;font-size:10px;font-weight:800;background:var(--ac);color:#000;letter-spacing:.04em}
.plan-name{font-size:11px;font-weight:800;color:var(--txs);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.plan-price{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:var(--tx);line-height:1;margin-bottom:4px;letter-spacing:-.03em}
.plan-price span{font-size:15px;font-weight:400;color:var(--txs);font-family:'DM Sans',sans-serif}
.plan-features{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.plan-feature{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txs)}
.plan-feature.ok{color:var(--tx)}
.plan-feature .fi{width:16px;height:16px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.plan-feature.ok .fi{background:var(--prd);color:var(--pr)}
.plan-feature:not(.ok) .fi{background:var(--bg3);color:var(--txm)}
.plan-btn{width:100%;padding:12px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all var(--t1) var(--spring);background:var(--bg3);color:var(--tx);border:0.5px solid var(--bd)}
.plan-btn:hover{transform:translateY(-1px)}
.plan-btn.featured-btn{background:var(--action);color:var(--action-t);border:none}
.plan-btn.featured-btn:hover{box-shadow:0 6px 20px rgba(255,255,255,.12)}

/* ── PAYMENT ─────────────────────────────────────────────── */
.payment-screen{max-width:520px;margin:0 auto;padding:24px 20px}
.payment-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--tx);margin-bottom:6px;letter-spacing:-.02em}
.payment-sub{font-size:13px;color:var(--txs);margin-bottom:24px;line-height:1.5}
.payment-summary{background:var(--bg1);border:0.5px solid var(--bdh);border-radius:12px;padding:16px 18px;margin-bottom:20px}
.payment-method-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.payment-tab{flex:1;min-width:100px;padding:10px;border:0.5px solid var(--bd);border-radius:9px;background:var(--bg2);cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:var(--txs);transition:all var(--t2) var(--smooth)}
.payment-tab:hover{border-color:var(--bdh);color:var(--tx)}
.payment-tab.active{border-color:var(--ac);background:var(--acd);color:var(--tx)}
.pix-container{text-align:center;padding:20px}
.pix-qr{width:180px;height:180px;background:var(--bg3);border-radius:12px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;border:0.5px solid var(--bd)}
.nosub-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:32px 20px;position:relative;overflow:hidden}
.nosub-glow{position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,212,170,.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.nosub-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;border:0.5px solid rgba(0,212,170,.3);background:rgba(0,212,170,.07);font-size:11px;font-weight:700;color:var(--ac);letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px;font-family:'JetBrains Mono',monospace}
.nosub-headline{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:800;color:var(--tx);letter-spacing:-.03em;line-height:1.1;margin-bottom:14px;max-width:480px}
.nosub-headline em{font-style:normal;color:var(--ac)}
.nosub-desc{font-size:15px;color:var(--txs);line-height:1.6;max-width:380px;margin-bottom:36px}
.nosub-cta{display:inline-flex;align-items:center;gap:10px;padding:15px 36px;border-radius:12px;border:none;background:var(--ac);color:#0A0A0F;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .18s cubic-bezier(.34,1.56,.64,1);letter-spacing:-.01em}
.nosub-cta:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,212,170,.3)}
.nosub-cta:active{transform:translateY(0)}
.nosub-cta svg{transition:transform .18s}
.nosub-cta:hover svg{transform:translateX(3px)}
.nosub-proof{display:flex;align-items:center;gap:20px;margin-top:28px;flex-wrap:wrap;justify-content:center}
.nosub-proof-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txm)}
.nosub-proof-dot{width:4px;height:4px;border-radius:50%;background:var(--bd)}

/* ── HISTORY ─────────────────────────────────────────────── */
.history-list{display:flex;flex-direction:column;gap:10px}
.history-card{background:var(--bg1);border:0.5px solid var(--bd);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all var(--t2) var(--spring)}
.history-card:hover{border-color:var(--bdh);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.history-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.history-card-title{font-size:14px;font-weight:600;color:var(--tx)}
.history-card-date{font-size:11px;color:var(--txm);font-family:'JetBrains Mono',monospace}
.history-card-metrics{display:flex;gap:16px;flex-wrap:wrap}
.history-card-metric{display:flex;flex-direction:column;gap:2px}
.history-card-metric-label{font-size:9px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono',monospace}
.history-card-metric-value{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.history-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;text-align:center}

/* ── VALIDATION FEEDBACK ─────────────────────────────────── */
.val-issue{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:8px;margin-top:7px;font-size:12px;line-height:1.5}
.val-issue.block{background:var(--dgd);border:0.5px solid rgba(238,58,58,.2);color:var(--dg)}
.val-issue.warn{background:var(--wnd);border:0.5px solid rgba(240,160,32,.2);color:var(--wn)}
.val-issue svg{flex-shrink:0;margin-top:1px}

/* ── TOUR ────────────────────────────────────────────────── */
.tour-overlay{position:fixed;inset:0;z-index:9000;pointer-events:none}
.tour-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(2px)}
.tour-box{position:absolute;background:var(--bg1);border:0.5px solid var(--bdh);border-radius:14px;padding:18px 20px;max-width:300px;box-shadow:0 20px 60px rgba(0,0,0,.8);pointer-events:auto;z-index:9001}
.tour-step-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ac);margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.tour-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--tx);margin-bottom:6px;letter-spacing:-.01em}
.tour-desc{font-size:13px;color:var(--txs);line-height:1.6;margin-bottom:16px}
.tour-nav{display:flex;align-items:center;justify-content:space-between}
.tour-dots{display:flex;gap:5px}
.tour-dot{width:5px;height:5px;border-radius:50%;background:var(--bd);transition:background var(--t2)}
.tour-dot.on{background:var(--ac)}
.tour-tooltip{position:fixed;background:var(--bg1);border:0.5px solid var(--bdh);border-radius:14px;padding:18px 20px;max-width:300px;box-shadow:0 20px 60px rgba(0,0,0,.8);z-index:9002;pointer-events:auto}
.tour-tooltip-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--tx);margin-bottom:8px;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
.tour-tooltip-body{font-size:13px;color:var(--txs);line-height:1.6;margin-bottom:16px}
.tour-tooltip-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tour-tooltip-counter{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txm);font-family:'JetBrains Mono',monospace}
.tour-tooltip-btns{display:flex;gap:8px;align-items:center}
.tour-skip{background:transparent;border:0.5px solid var(--bd);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--txs);cursor:pointer;transition:all var(--t2)}
.tour-skip:hover{border-color:var(--bdh);color:var(--tx)}
.tour-next{background:var(--ac);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:#000;cursor:pointer;transition:all var(--t2)}
.tour-next:hover{opacity:.85}
.tour-arrow{position:absolute;width:10px;height:10px;background:var(--bg1);border:0.5px solid var(--bdh);transform:rotate(45deg)}
.tour-arrow-bottom{top:-6px;left:20px;border-right:none;border-bottom:none}
.tour-arrow-top{bottom:-6px;left:20px;border-left:none;border-top:none}

/* Tooltip */
.tip-wrap{position:relative;display:inline-flex}
.tip-box{position:fixed;background:var(--bg3);border:0.5px solid var(--bdh);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--tx);line-height:1.5;width:240px;z-index:9999;box-shadow:0 6px 24px rgba(0,0,0,.8);pointer-events:none;font-weight:400}
.strategy-sentence{font-size:12px;color:var(--txs);line-height:1.75;animation:fadeUp .2s ease-out}
.strategy-sentence strong{color:var(--tx);font-weight:600}
.strategy-sentence .hl{color:#00D4AA;font-weight:600}

/* Direction section labels */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:7px 0 10px;display:flex;align-items:center;gap:8px}
.section-label.compra{color:var(--pr)}
.section-label.venda{color:var(--dg)}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--bd)}
/* ── ASSET SELECTOR ─────────────────────────────────────────── */
.asset-combo{position:relative;z-index:10}
.asset-search{width:100%;background:var(--bg3);border:0.5px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px 11px 36px;font-size:14px;font-family:inherit;outline:none;transition:border-color var(--t2),box-shadow var(--t2);box-sizing:border-box}
.asset-search:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--prd)}
.asset-search::placeholder{color:var(--txm)}
.asset-search-icon{position:absolute;left:12px;top:12px;color:var(--txm);pointer-events:none}
.asset-dropdown{position:fixed;background:var(--bg1);border:0.5px solid var(--bdh);border-radius:10px;max-height:260px;overflow-y:auto;z-index:9000;box-shadow:0 16px 48px rgba(0,0,0,.85);display:none}
.asset-dropdown.open{display:block;animation:fadeUp .15s var(--out)}
.asset-cat{font-size:10px;font-weight:800;color:var(--txm);text-transform:uppercase;letter-spacing:.1em;padding:10px 14px 4px;font-family:'JetBrains Mono',monospace}
.asset-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background var(--t1)}
.asset-item:hover{background:var(--bg3)}
.asset-item:hover .asset-ticker{color:var(--pr)}
.asset-item:hover .asset-name{color:var(--tx)}
.asset-item.active{background:var(--prd);border-left:2px solid var(--pr)}
.asset-item.active .asset-ticker{color:var(--pr);font-weight:800}
.asset-item.active .asset-name{color:var(--tx)}
.asset-ticker{font-size:12px;font-weight:700;color:var(--txs);font-family:'JetBrains Mono',monospace;min-width:68px;transition:color var(--t1)}
.asset-name{font-size:12px;color:var(--txs);transition:color var(--t1);flex:1}
.asset-selected{display:flex;align-items:center;gap:10px;background:var(--bg3);border:0.5px solid var(--pr);border-radius:9px;padding:10px 14px;margin-top:8px}
.asset-selected .asset-ticker{font-size:13px;font-weight:800;color:var(--pr);font-family:'JetBrains Mono',monospace}
.asset-selected .asset-name{font-size:13px;color:var(--tx);flex:1}

</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="m9 17 3-5 3 3 3-5"/></svg>
      </div>
      <div class="logo-text">Backtest<span> Pro</span></div>
    </div>
    <div class="prog-bar" id="prog-bar"></div>
    <div style="display:flex;align-items:center">
      <div class="theme-sw" id="theme-sw" style="margin-right:8px">
        <div class="theme-opt on" id="themeD" onclick="setAppTheme('dark')">Dark</div>
        <div class="theme-opt" id="themeL" onclick="setAppTheme('light')">Light</div>
      </div>
      <button class="tour-help-btn" id="tour-help-btn" onclick="startTourForCurrentScreen()" title="Tour guiado">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--txs)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="3"/></svg>
      </button>
      <div class="avatar-wrap" id="avatar-wrap">
      <div class="avatar" id="avatar-btn" style="cursor:pointer" onclick="toggleAvatarMenu()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--txs)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <div class="avatar-menu" id="avatar-menu">
        <div class="avatar-name" id="avatar-name">—</div>
        <button class="avatar-item" onclick="showScreen('history');document.getElementById('avatar-menu').classList.remove('open')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Meus backtests
        </button>
        <button class="avatar-item" onclick="showScreen('plans');document.getElementById('avatar-menu').classList.remove('open')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Minha assinatura
        </button>
        <div class="avatar-version" id="avatar-version">v1.0.0</div>
        <button class="avatar-item danger" onclick="handleLogout()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </div>
    </div>
    </div>
  </header>
  <main id="main"></main>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────
const APP_VERSION = '2.0.0'; // Versão do produto — atualizar a cada release

// ─── THEME ───────────────────────────────────────────────────
function setAppTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const d=document.getElementById('themeD'),l=document.getElementById('themeL');
  if(d){d.classList.toggle('on',t==='dark');l.classList.toggle('on',t==='light');}
  try{localStorage.setItem('bp-theme',t);}catch(e){}
  // Re-render only if app is already booted (renderApp exists and main has content)
  if(typeof renderApp==='function'&&document.getElementById('main')?.children.length>0){
    try{renderApp();}catch(e){}
  }
}
(function(){try{const t=localStorage.getItem('bp-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();

// Theme-aware SVG colors — reads CSS variables at render time
function svgTheme(){
  const s=getComputedStyle(document.documentElement);
  const g=v=>s.getPropertyValue(v).trim();
  return{
    bg:g('--bg0')||'#08080B',
    bg1:g('--bg1')||'#0F0F14',
    bg2:g('--bg2')||'#151519',
    bg3:g('--bg3')||'#1C1C22',
    bd:g('--bd')||'rgba(255,255,255,0.07)',
    tx:g('--tx')||'#F2F2F6',
    txs:g('--txs')||'#72728A',
    txm:g('--txm')||'#3E3E54',
    grid:document.documentElement.getAttribute('data-theme')==='light'?'rgba(0,0,0,0.06)':'#1E1E2E',
    panelBg:document.documentElement.getAttribute('data-theme')==='light'?'#F0EDE6':'#0F0F14',
    badgeBg:document.documentElement.getAttribute('data-theme')==='light'?'#FDFCF9':'#0A0A0F',
  };
}

const state = {
  screen: 'wizard', // wizard|confirm|loading|results
  step: 0,
  maxDone: 0,
  dir: 'fwd',
  animate: false,

function applyStrategy(strategy) {
  const cfg=state.cfg;
  // Apply conditions
  cfg.conditions=strategy.conditions.map(c=>({id:c.id,name:c.name,params:{...c.params}}));
  // Apply direction
  cfg.direction=strategy.direction;
  // Apply trigger
  cfg.entryType=strategy.entryType;
  cfg.validity=strategy.validity;
  // Apply risk
  cfg.stopType=strategy.stopType;
  cfg.stopPts=strategy.stopPts||200;
  cfg.stopOffset=strategy.stopOffset||10;
  cfg.tpType=strategy.tpType;
  cfg.tpRR=strategy.tpRR||2;
  cfg.tpPts=strategy.tpPts||400;
  // Reset management to defaults
  cfg.trailing=false;cfg.partial=false;cfg.exitCond=false;cfg.exitCondition=null;
  // Render
  renderApp();
}

function getCondsFor(id) {
  if (['rsi','stoch','cci','williams'].includes(id)) return OSC_CONDS;
  if (['sma','ema'].includes(id)) return MA_CONDS;
  if (id==='bb')      return BB_CONDS;
  if (id==='vwap')    return VWAP_CONDS;
  if (id==='macd')    return MACD_CONDS;
  if (id==='adx')     return ADX_CONDS;
  if (id==='sar')     return SAR_CONDS;
  if (id==='hilo')    return HILO_CONDS;
  if (id==='atr')     return ATR_CONDS;
  if (id==='hilon')   return HILON_CONDS;
  if (id==='gap')     return GAP_CONDS;
  if (id==='prevday') return PREVDAY_CONDS;
  if (id==='fib')     return FIB_CONDS;
  if (id==='candle')  return CANDLE_CONDS;
  if (id==='fvg')     return FVG_CONDS;
  if (id==='bos')     return BOS_CONDS;
  if (id==='choch')   return CHOCH_CONDS;
  if (id==='grab')    return GRAB_CONDS;
  if (id==='sweep')   return SWEEP_CONDS;

  if (id==='range')   return RNG_CONDS;
  return [];
}

// Returns 'long', 'short', 'both', or null (neutral) for a single condition
function getCondImpliedDir(cond) {
  const ct=(cond.params?.cond||'').toLowerCase();
  const id=cond.id;
  // MA crossover
  if(['sma','ema'].includes(id)){
    if(ct.includes('cruzamento de médias')) return 'both';
    if(ct.includes('curta cruza acima')) return 'long';
    if(ct.includes('curta cruza abaixo')) return 'short';
    return null; // Preço vs Média = filter, neutral
  }
  // HiLo
  if(id==='hilo'){
    if(ct.includes('compra')) return 'long';
    if(ct.includes('venda')) return 'short';
    return null;
  }
  // Gap
  if(id==='gap'){
    if(ct.includes('alta')) return 'long';
    if(ct.includes('baixa')) return 'short';
    return null;
  }
  // Candle patterns
  if(id==='candle'){
    if(ct.includes('alta')||ct.includes('manhã')) return 'long';
    if(ct.includes('baixa')||ct.includes('noite')) return 'short';
    return null; // Doji, Spinning Top
  }
  // SAR
  if(id==='sar'){
    if(ct.includes('cruza acima')) return 'long';
    if(ct.includes('cruza abaixo')) return 'short';
    return null; // "está acima/abaixo" = filter
  }
  // Smart Money Concepts — direction from params.dir
  if(SMC_IDS.includes(id)){
    const dir=(cond.params?.dir||'').toLowerCase();
    if(dir==='compra e venda') return 'both';
    if(dir.includes('compra')||dir.includes('bullish')||dir.includes('alta')) return 'long';
    if(dir.includes('venda')||dir.includes('bearish')||dir.includes('baixa')) return 'short';
    return null;
  }
  // Everything else: oscillators, BB, VWAP, volume, price, range, ATR, ADX, etc.
  return null;
}

// Analyzes ALL conditions and returns {dir, reasons}
// dir: 'long' | 'short' | 'both' | null (user chooses)
function inferDirection(conditions) {
  let hasLong=false, hasShort=false, hasBoth=false;
  const reasons=[];
  for(const c of conditions){
    const d=getCondImpliedDir(c);
    if(d==='long'){hasLong=true;reasons.push({label:condLabel(c),dir:'compra'});}
    if(d==='short'){hasShort=true;reasons.push({label:condLabel(c),dir:'venda'});}
    if(d==='both'){hasBoth=true;reasons.push({label:condLabel(c),dir:'compra e venda'});}
  }
  if(hasBoth) return {dir:'both',reasons};
  if(hasLong&&hasShort) return {dir:'conflict',reasons};
  if(hasLong) return {dir:'long',reasons};
  if(hasShort) return {dir:'short',reasons};
  return {dir:null,reasons};
}

function condLabel(c) {
  const p = c.params;
  switch(c.id) {
    case 'rsi':      return `IFR(${p.per||14}) ${p.cond} ${p.val}`;
    case 'stoch':    return `Estocástico(${p.per||14}) ${p.cond} ${p.val}`;
    case 'cci':      return `CCI(${p.per||14}) ${p.cond} ${p.val}`;
    case 'williams': return `Williams %R(${p.per||14}) ${p.cond} ${p.val}`;
    case 'macd':     return `MACD — ${p.cond}`;
    case 'sma':      return isMACrossover(p.cond)?`SMA(${p.per||9}) × SMA(${p.per2||200})${isMACrossoverBoth(p.cond)?' — Cruzamento (C/V)':' — '+p.cond}`:`SMA(${p.per||200}) — ${p.cond}`;
    case 'ema':      return isMACrossover(p.cond)?`EMA(${p.per||9}) × EMA(${p.per2||200})${isMACrossoverBoth(p.cond)?' — Cruzamento (C/V)':' — '+p.cond}`:`EMA(${p.per||200}) — ${p.cond}`;
    case 'bb':       return `Bollinger(${p.per||20}, ${p.dev||2}σ) — ${p.cond}`;
    case 'vwap':     return p.cond;
    case 'adx':      return `ADX(${p.per||14}) ${p.cond} ${p.val}`;
    case 'sar':      return `SAR — ${p.cond}`;
    case 'hilo':     return `HiLo(${p.per||6}) — ${p.cond}`;
    case 'atr':      return `ATR(${p.per||14}) ${p.cond.replace('X×',((p.mult||1.0).toFixed(1))+'×')}`;
    case 'hilon':    return `${p.cond} (${p.per||20})`;
    case 'gap':      return `${p.cond}${p.val?' > '+p.val+' pts':''}`;
    case 'prevday':  return p.cond;
    case 'fib':      return `Fibo(${p.per||50}) — ${p.cond}`;
    case 'candle':   return `Padrão: ${p.cond}`;

    case 'range':    return `Range ${p.cond} ${p.val} pts`;
    case 'fvg':      return `FVG ${p.dir||'Compra'} — ${p.cond||'Gap detectado'}`;
    case 'bos':      return `BoS ${p.dir||'Compra'} — ${p.cond||'BoS detectado'}`;
    case 'choch':    return `CHoCH ${p.dir||'Compra'} — ${p.cond||'CHoCH detectado'}`;
    case 'grab':     return `Grab ${p.dir||'Compra'} (${p.per} candles)`;
    case 'sweep':    return `Sweep ${p.dir||'Compra'} (${p.per} candles, ≥${p.val} pts, ${p.confCandles||3} conf.)`;
    default:         return c.name;
  }
}

function generateEQ(seed,n,bias) {
  // Seeded pseudo-random for reproducible mock data
  let s=seed;const rng=()=>{s=(s*16807+0)%2147483647;return(s&0x7fffffff)/2147483647;};
  const d=[];for(let i=0;i<n;i++){const base=(rng()-0.48+bias)*2000;d.push(Math.round(base));}
  let v=0,peak=0;
  return d.map((x,i)=>{v+=x;if(v>peak)peak=v;const yr=2019+Math.floor(i*87/n/12),mo=Math.floor((i*87/n)%12);return{v:Math.round(v),dd:Math.round(Math.min(0,v-peak)),pnl:x,t:(new Date(2019+Math.floor(i*87/n/12),Math.floor((i*87/n)%12))).toLocaleDateString('pt-BR',{month:'short'}).replace('.','')+" '"+String(2019+Math.floor(i*87/n/12)).slice(2)};});
}

function computeAnalysis(eq,cap) {
  let peak=cap,peakIdx=0,maxDDPct=0,maxDDVal=0,maxDDIdx=0,maxDDPeakIdx=0;
  for(let i=0;i<eq.length;i++){
    const e=cap+eq[i].v;
    if(e>peak){peak=e;peakIdx=i;}
    else{const ddv=peak-e,ddp=peak>0?(ddv/peak)*100:0;if(ddp>maxDDPct){maxDDPct=ddp;maxDDVal=ddv;maxDDIdx=i;maxDDPeakIdx=peakIdx;}}
  }
  peak=cap;let uwStart=null;const uwPeriods=[];
  for(let i=0;i<eq.length;i++){const e=cap+eq[i].v;if(e>=peak){if(uwStart!==null){uwPeriods.push({s:uwStart,e:i-1});uwStart=null;}peak=e;}else{if(uwStart===null)uwStart=i;}}
  if(uwStart!==null)uwPeriods.push({s:uwStart,e:eq.length-1});
  const uwLens=uwPeriods.map(p=>p.e-p.s+1);
  const tuwMax=uwLens.length?Math.max(...uwLens):0;
  const tuwAvg=uwLens.length?uwLens.reduce((a,b)=>a+b,0)/uwLens.length:0;
  let maxStreak=0,curStreak=0,streakStart=0,mStreakS=0,mStreakE=0;
  for(let i=0;i<eq.length;i++){if(eq[i].pnl<0){if(curStreak===0)streakStart=i;curStreak++;if(curStreak>maxStreak){maxStreak=curStreak;mStreakS=streakStart;mStreakE=i;}}else curStreak=0;}
  const wins=eq.filter(d=>d.pnl>0),losses=eq.filter(d=>d.pnl<0);
  const avgWin=wins.length?wins.reduce((a,b)=>a+b.pnl,0)/wins.length:0;
  const avgLoss=losses.length?Math.abs(losses.reduce((a,b)=>a+b.pnl,0)/losses.length):0;
  const totalProfit=wins.reduce((a,b)=>a+b.pnl,0);
  const totalLoss=Math.abs(losses.reduce((a,b)=>a+b.pnl,0));
  const payoff=avgLoss>0?avgWin/avgLoss:0;
  const profitFactor=totalLoss>0?totalProfit/totalLoss:0;
  const recoveryFactor=maxDDVal>0?(cap+eq[eq.length-1].v-cap)/maxDDVal:0;
  const winRate=eq.length>0?(wins.length/eq.length)*100:0;
  const viés=(winRate/100)*avgWin-((100-winRate)/100)*avgLoss;
  return{maxDDPct,maxDDVal,maxDDIdx,maxDDPeakIdx,uwPeriods,tuwMax,tuwAvg,maxStreak,mStreakS,mStreakE,wins:wins.length,losses:losses.length,avgWin,avgLoss,payoff,profitFactor,recoveryFactor,winRate,viés,totalProfit,totalLoss,cap};
}

function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==='class') el.className=v;
    else if (k==='style' && typeof v==='object') Object.assign(el.style,v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for (const c of children.flat(99)) {
    if (c==null||c===false) continue;
    if (typeof c === 'string'||typeof c==='number') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}
function hsvg(tag,attrs={}) {
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

function getAssetTick(ticker) {
  const a = findAsset(ticker);
  if (!a) return { tick:1, unit:'pts', currency:'R$', tickVal:null };
  return { tick: a.tick||1, unit: a.unit||'pts', currency: a.currency||'R$', tickVal: a.tickVal||null };
}

// Snap value to nearest valid tick multiple
function snapToTick(val, tick) {
  const decimals = tick.toString().includes('.') ? tick.toString().split('.')[1].length : 0;
  return +(Math.round(val / tick) * tick).toFixed(decimals);
}

// Stepper that quantizes to asset tick size
function stepperPoints(val, min, max, assetTicker, onChange) {
  const { tick, unit, currency, tickVal } = getAssetTick(assetTicker);
  const decimals = tick.toString().includes('.') ? tick.toString().split('.')[1].length : 0;
  val = snapToTick(Math.max(min, val), tick);

  const inp = h('input', {type:'text', inputmode:'decimal', class:'step-val'});
  inp.value = val.toFixed(decimals);

  function readVal() { const n = parseFloat(inp.value.replace(/[^\d.\-]/g,'')); return isNaN(n) ? val : n; }
  function clamp(n) { return Math.max(min, Math.min(max, snapToTick(n, tick))); }
  function commit() { const nv = clamp(readVal()); val = nv; inp.value = nv.toFixed(decimals); onChange(nv); updateTickHint(); }
  inp.addEventListener('change', commit);
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();inp.blur();} });

  const dec = h('button',{class:'step-btn',type:'button'}); dec.textContent='−';
  dec.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); const nv=clamp(readVal()-tick); val=nv; inp.value=nv.toFixed(decimals); onChange(nv); updateTickHint(); });
  const inc = h('button',{class:'step-btn',type:'button'}); inc.textContent='+';
  inc.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); const nv=clamp(readVal()+tick); val=nv; inp.value=nv.toFixed(decimals); onChange(nv); updateTickHint(); });

  const unitEl = div('step-unit'); unitEl.textContent = unit;
  const wrap = div('stepper', dec, inp, inc, unitEl);

  // Tick hint — valor financeiro estimado (só pra futuros B3 com tickVal conhecido)
  const hint = div(''); hint.style.cssText = 'font-size:10px;color:var(--txm);margin-top:4px;font-family:JetBrains Mono';
  function updateTickHint() {
    const v = parseFloat(inp.value) || 0;
    if (tickVal !== null && v > 0) {
      const ticks = v / tick;
      const financ = (ticks * tickVal).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
      hint.textContent = `≈ ${currency} ${financ} por contrato`;
    } else {
      hint.textContent = `Tick: ${tick} ${unit}`;
    }
  }
  updateTickHint();

  const container = div(''); container.append(wrap, hint);
  return container;
}

function timeStepper(val,onChange) {
  // val = 'HH:MM' string
  function parseTime(s){const p=(s||'00:00').split(':');return{h:parseInt(p[0],10)||0,m:parseInt(p[1],10)||0};}
  function fmt(h,m){return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
  function addMin(s,delta){let{h,m}=parseTime(s);m+=delta;while(m>=60){m-=60;h++;}while(m<0){m+=60;h--;}h=Math.max(0,Math.min(23,h));return fmt(h,m);}

  const inp=h('input',{type:'text',inputmode:'numeric',class:'step-val',value:val,maxlength:'5',placeholder:'HH:MM'});
  inp.style.width='68px';inp.style.letterSpacing='1px';
  // Auto-format: insert colon after 2 digits
  inp.addEventListener('input',e=>{
    let v=inp.value.replace(/[^\d]/g,'');
    if(v.length>4)v=v.slice(0,4);
    if(v.length>=3)v=v.slice(0,2)+':'+v.slice(2);
    inp.value=v;
  });
  inp.addEventListener('blur',()=>{
    const{h:hr,m:mn}=parseTime(inp.value);
    const clamped=fmt(Math.max(0,Math.min(23,hr)),Math.max(0,Math.min(59,mn)));
    inp.value=clamped;onChange(clamped);
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='ArrowUp'){e.preventDefault();const nv=addMin(inp.value,5);inp.value=nv;onChange(nv);}
    if(e.key==='ArrowDown'){e.preventDefault();const nv=addMin(inp.value,-5);inp.value=nv;onChange(nv);}
  });

  const dec=h('button',{class:'step-btn',type:'button'});dec.textContent='−';
  dec.addEventListener('click',e=>{e.preventDefault();const nv=addMin(inp.value,-5);inp.value=nv;onChange(nv);});
  const inc=h('button',{class:'step-btn',type:'button'});inc.textContent='+';
  inc.addEventListener('click',e=>{e.preventDefault();const nv=addMin(inp.value,5);inp.value=nv;onChange(nv);});

  return div('stepper',dec,inp,inc);
}

  svgEl.appendChild(hsvg('path',{d:linePath,fill:'none',stroke:'#10B981','stroke-width':'1.8'}));
  // Max Drawdown marker

    // Vertical drop line
    svgEl.appendChild(hsvg('line',{x1:dx,y1:py,x2:dx,y2:dy,stroke:'#EF4444','stroke-width':'1','stroke-dasharray':'3,2','stroke-opacity':'0.6'}));
    // Trough marker
    svgEl.appendChild(hsvg('circle',{cx:dx,cy:dy,r:4,fill:'#EF4444','fill-opacity':'0.2',stroke:'#EF4444','stroke-width':'1.5'}));
    const ddLabel=hsvg('text',{x:dx+6,y:dy+4,fill:'#EF4444','font-size':'8','font-family':'JetBrains Mono','font-weight':'700'});
    ddLabel.textContent=`-${A.maxDDPct.toFixed(1)}%`;svgEl.appendChild(ddLabel);
  }
  // X labels
  [0,12,24,36,48,60,72,84].forEach(i=>{
    if(i<EQ.length){const t=hsvg('text',{x:txf(i),y:H-6,'text-anchor':'middle',fill:TH.txm,'font-size':'9','font-family':'JetBrains Mono'});t.textContent=EQ[i].t.split(' ')[1];svgEl.appendChild(t);}
  });

  return svgEl;
}

// ─── PREVIEW SVG ─────────────────────────────────────────────
function buildPreview(step,cfg) {
  const conds=cfg.conditions||[];
  // Classify conditions
  const overlayConds=conds.filter(c=>['sma','ema','bb','vwap','sar','hilo','prevday','hilon','fib','fvg','bos','choch','sweep','grab'].includes(c.id));
  const oscConds=conds.filter(c=>['rsi','stoch','cci','williams','macd','adx','atr'].includes(c.id));
  const volConds=[];
  const otherConds=conds.filter(c=>['range','gap','candle'].includes(c.id));

  const panelCount=Math.min(oscConds.length+volConds.length,2);
  const panelH=32;
  const chartH=panelCount>0?148:185;
  const labelPad=(step===0)?72:0;
  const totalH=chartH+(panelCount>0?8+panelCount*panelH+(panelCount-1)*4:0)+8+labelPad;
  const W=300;
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${totalH}`});

  // Helpers
  const ln=(x1,y1,x2,y2,c,w,d)=>{const a={x1,y1,x2,y2,stroke:c,'stroke-width':w||0.5};if(d)a['stroke-dasharray']=d;svgEl.appendChild(hsvg('line',a));};
  const pl=(p,c,w,d)=>{const a={points:p,fill:'none',stroke:c,'stroke-width':w||1};if(d)a['stroke-dasharray']=d;svgEl.appendChild(hsvg('polyline',a));};
  const rc=(x,y,w,h,c,o,r)=>svgEl.appendChild(hsvg('rect',{x,y,width:w,height:h,fill:c,'fill-opacity':o!=null?o:1,rx:r||0}));
  const tx=(x,y,t,c,s,a)=>{const e=hsvg('text',{x,y,fill:c,'font-size':s||7,'font-family':'JetBrains Mono','font-weight':500,'text-anchor':a||'start'});e.textContent=t;svgEl.appendChild(e);};
  const pa=(d,c,o)=>svgEl.appendChild(hsvg('path',{d,fill:c,'fill-opacity':o||0.12}));
  const cir=(x,y,c,r)=>svgEl.appendChild(hsvg('circle',{cx:x,cy:y,r:r||2.5,fill:c,'fill-opacity':0.3,stroke:c,'stroke-width':0.8}));

  // Theme colors for SVG
  const TH=svgTheme();

  const badge=(x,y,t,c,s,a)=>{const fs=s||7;const tw=t.length*(fs*0.58);const ax=a==='end'?x-tw-3:a==='middle'?x-tw/2-1.5:x-1.5;rc(ax,y-fs+1,tw+3,fs+2,TH.badgeBg,0.92,2);tx(x,y,t,c,fs,a);};

  // Professional candle data — 20 candles with realistic price action
  const rawPrices=[130,128,132,134,131,136,138,135,140,142,139,144,146,143,148,150,147,152,149,154];
  const candles=rawPrices.map((p,i)=>{
    const prevP=i>0?rawPrices[i-1]:p;
    const o=prevP,c=p;const hi=Math.max(o,c)+2+Math.random()*3;const lo=Math.min(o,c)-2-Math.random()*3;
    const cw=6;const gap=1;const spacing=(W-12)/(rawPrices.length);
    return{x:6+i*spacing,o:chartH-((o-124)*((chartH-10)/34)),c:chartH-((c-124)*((chartH-10)/34)),h:chartH-((hi-124)*((chartH-10)/34)),l:chartH-((lo-124)*((chartH-10)/34)),w:cw};
  });

  // Subtle grid
  for(let i=0;i<4;i++){const y=10+i*((chartH-20)/3);if(y<chartH)ln(4,y,W-4,y,TH.grid,0.4);}

  // Y-axis price labels
  const priceRange=[128,136,144,152];
  priceRange.forEach((p,i)=>{const y=chartH-((p-124)*((chartH-10)/34));tx(W-3,y+3,p.toString(),TH.txm,6,'end');});

  // ── Overlay indicators (on price chart) ──
  const colors=['#F59E0B','#6366F1','#EC4899','#06B6D4','#8B5CF6'];
  let colorIdx=0;
  const nextCol=()=>colors[colorIdx++%colors.length];

  overlayConds.forEach(cond=>{
    const col=nextCol();
    const ct=(cond.params?.cond||'').toLowerCase();
    const smcIds=['fvg','bos','choch','sweep','grab'];
    const upBySMC=smcIds.includes(cond.id)?(cond.params?.dir||'Compra')==='Compra':false;
    const up=smcIds.includes(cond.id)?upBySMC:(ct.includes('acima')||ct.includes('sup')||ct.includes('alta')||ct.includes('compra')||ct.includes('maior'));

    if(['sma','ema'].includes(cond.id)){
      const isCross=isMACrossover(cond.params?.cond||'');
      if(isCross){
        svgEl._maCrossover={cond,col};
      } else {
        const per=cond.params?.per||20;
        // Higher period = flatter line (less oscillation)
        const amplitude=Math.max(2, 14-per*0.04);
        const freq=Math.max(0.08, 0.25-per*0.001);
        const maY=candles.map((c,i)=>{const base=chartH/2+15;return base+Math.sin((i-5)*freq)*amplitude;});
        pl(candles.map((c,i)=>`${c.x+c.w/2},${maY[i]}`).join(' '),col,1);
        badge(candles[0].x,maY[0]-6,cond.id.toUpperCase()+(cond.params?.per?'('+cond.params.per+')':''),col,6);
        if(ct.includes('cruza')){cir(candles[13].x+candles[13].w/2,maY[13],'#00D4AA',3);}
      }
    }
    else if(cond.id==='bb'){
      const dev=cond.params?.dev||2;
      const bw=5+dev*3; // dev 1→8px, dev 2→11px, dev 3→14px, dev 4→17px
      const mid=candles.map(c=>(c.o+c.c)/2);
      let bp=`M${candles[0].x+candles[0].w/2},${mid[0]-bw}`;
      for(let i=1;i<candles.length;i++)bp+=` L${candles[i].x+candles[i].w/2},${mid[i]-bw}`;
      for(let i=candles.length-1;i>=0;i--)bp+=` L${candles[i].x+candles[i].w/2},${mid[i]+bw}`;
      bp+=' Z';pa(bp,col,0.05);
      pl(candles.map((c,i)=>`${c.x+c.w/2},${mid[i]-bw}`).join(' '),col,0.6,'2,2');
      pl(candles.map((c,i)=>`${c.x+c.w/2},${mid[i]+bw}`).join(' '),col,0.6,'2,2');
      pl(candles.map((c,i)=>`${c.x+c.w/2},${mid[i]}`).join(' '),col,0.5);
      badge(candles[0].x,mid[0]-bw-4,'BB'+(cond.params?.per?'('+cond.params.per+','+dev+'σ)':''),col,6);
    }
    else if(cond.id==='vwap'){
      const vwY=candles.map((c,i)=>{const base=chartH/2+8;return base+Math.sin((i-3)*0.15)*8;});
      pl(candles.map((c,i)=>`${c.x+c.w/2},${vwY[i]}`).join(' '),col,1);
      badge(candles[0].x,vwY[0]-5,'VWAP',col,6);
    }
    else if(cond.id==='sar'){
      candles.forEach((cd,i)=>{const above=i<10;const dy=above?cd.l+5:cd.h-5;svgEl.appendChild(hsvg('circle',{cx:cd.x+cd.w/2,cy:dy,r:1.2,fill:above?'#EF4444':'#10B981'}));});
      badge(candles[0].x,candles[0].l+10,'SAR',col,6);
    }
    else if(cond.id==='hilo'){
      for(let i=0;i<candles.length;i++){const sell=i<10;const y=sell?candles[i].l+4:candles[i].h-4;ln(candles[i].x,y,candles[i].x+candles[i].w,y,sell?'#EF4444':'#10B981',1);}
      badge(candles[0].x,candles[0].l+10,'HiLo',col,6);
    }
    else if(cond.id==='prevday'){
      const maxY=chartH*0.2,minY=chartH*0.8;
      ln(4,maxY,W-4,maxY,'#10B981',0.5,'3,3');ln(4,minY,W-4,minY,'#EF4444',0.5,'3,3');
      badge(W-20,maxY-3,'MÁX','#10B981',6);badge(W-20,minY+7,'MÍN','#EF4444',6);
    }
    else if(cond.id==='hilon'){
      const levelY=up?Math.min(...candles.slice(0,14).map(c=>c.h)):Math.max(...candles.slice(0,14).map(c=>c.l));
      ln(candles[0].x,levelY,candles[14].x+candles[14].w,levelY,col,0.8,'3,3');
      cir(candles[14].x+candles[14].w/2,levelY,'#00D4AA',3);
      badge(candles[0].x,levelY+(up?-5:8),'N per.',col,6);
    }
    else if(cond.id==='fib'){
      const top=chartH*0.15,bot=chartH*0.85,rng=bot-top;
      const lvs=[{p:'38.2%',f:0.382},{p:'50%',f:0.5},{p:'61.8%',f:0.618}];
      lvs.forEach(lv=>{const y=bot-rng*lv.f;const hl=ct.includes(lv.p.replace('%',''));ln(4,y,W-4,y,hl?'#F59E0B':TH.grid,hl?0.8:0.4,hl?'':'2,2');if(hl)badge(W-20,y-3,lv.p,'#F59E0B',6);});
    }
    // ── SMC CONDITIONS ──
    else if(cond.id==='fvg'){
      const isMit=cond.params?.entryMode==='mitigation'||(cond.params?.cond||'').includes('retornar');
      // Gap zone between candle 7 and 9
      const zTop=candles[7].l, zBot=candles[9].h;
      if(zBot<zTop){
        rc(candles[7].x,zBot,candles[9].x+candles[9].w-candles[7].x,zTop-zBot,'#6366F1',0.12,2);
        ln(candles[7].x,zTop,W-6,zTop,'#6366F1',0.6,'2,2');
        ln(candles[7].x,zBot,W-6,zBot,'#6366F1',0.6,'2,2');
        badge(candles[7].x+2,(zTop+zBot)/2+3,'FVG','#6366F1',6);
      }
      if(isMit){
        // Pullback arrow pointing down to zone
        const px=candles[15].x+candles[15].w/2;
        const py=Math.min(...candles.slice(10,16).map(cd=>cd.l))-2;
        ln(px,py,px,zTop+2,'#00D4AA',1,'3,2');
        badge(px+4,py-2,'recuo','#00D4AA',6);
      } else {
        // Entry arrow after gap
        const ex=candles[10].x+candles[10].w/2;
        cir(ex,candles[10].c,'#00D4AA',3);
        badge(ex,candles[10].c-8,'ENTRADA','#00D4AA',6,'middle');
      }
      badge(6,12,'FVG','#6366F1',7);
    }
    else if(cond.id==='bos'||cond.id==='choch'){
      const isBos=cond.id==='bos';
      const pivotY=up?Math.min(...candles.slice(3,8).map(cd=>cd.h)):Math.max(...candles.slice(3,8).map(cd=>cd.l));
      ln(4,pivotY,W-4,pivotY,isBos?'#F59E0B':'#EF4444',0.7,'3,3');
      cir(candles[12].x+candles[12].w/2,pivotY,'#00D4AA',3);
      badge(candles[12].x+candles[12].w/2,pivotY+(up?-8:8),isBos?'BoS':'CHoCH',isBos?'#F59E0B':'#EF4444',7,'middle');
      badge(6,12,isBos?'BoS':'CHoCH',isBos?'#F59E0B':'#EF4444',7);
    }
    else if(cond.id==='sweep'||cond.id==='grab'){
      const lvlY=up?Math.min(...candles.slice(0,10).map(cd=>cd.l)):Math.max(...candles.slice(0,10).map(cd=>cd.h));
      ln(4,lvlY,W-4,lvlY,'#F59E0B',0.7,'4,3');
      const sweepCd=candles[10];
      ln(sweepCd.x+sweepCd.w/2,up?sweepCd.h:sweepCd.l,sweepCd.x+sweepCd.w/2,lvlY+(up?4:-4),'#EF4444',1.5);
      cir(sweepCd.x+sweepCd.w/2,lvlY,'#EF4444',3);
      cir(candles[13].x+candles[13].w/2,up?candles[13].l:candles[13].h,'#00D4AA',3);
      badge(6,12,cond.id==='grab'?'Grab':'Sweep','#F59E0B',7);
    }
  });

  // Candles (drawn after overlays)
  const hasMACross=!!svgEl._maCrossover;
  candles.forEach(cd=>{
    const bull=cd.c<cd.o;const col=bull?'#10B981':'#EF4444';
    const top=Math.min(cd.o,cd.c),bh=Math.max(1,Math.abs(cd.o-cd.c));
    const op=hasMACross?0.15:0.9;const fop=hasMACross?0.2:0.8;
    svgEl.appendChild(hsvg('line',{x1:cd.x+cd.w/2,y1:cd.h,x2:cd.x+cd.w/2,y2:cd.l,stroke:col,'stroke-width':'0.6','stroke-opacity':op}));
    svgEl.appendChild(hsvg('rect',{x:cd.x,y:top,width:cd.w,height:bh,rx:'0.5',fill:col,'fill-opacity':fop}));
  });

  // ── MA Crossover (drawn ON TOP of faded candles) ──
  if(hasMACross){
    const mc=svgEl._maCrossover;const cnd=mc.cond;const mcCol=mc.col;
    const shortName=cnd.id.toUpperCase()+'('+(cnd.params?.per||9)+')';
    const longName=cnd.id.toUpperCase()+'('+(cnd.params?.per2||200)+')';
    const shortY=candles.map((_,i)=>{const mid=chartH/2;return mid+Math.cos((i-8)*0.35)*((chartH/2)-15);});
    const longY=candles.map((_,i)=>{const mid=chartH/2+5;return mid+Math.sin((i-5)*0.12)*10;});
    pl(candles.map((c,i)=>`${c.x+c.w/2},${longY[i].toFixed(1)}`).join(' '),mcCol,1.5,'4,3');
    pl(candles.map((c,i)=>`${c.x+c.w/2},${shortY[i].toFixed(1)}`).join(' '),'#00D4AA',1.8);
    let crossIdx=8;
    for(let i=1;i<candles.length;i++){if((shortY[i-1]-longY[i-1])*(shortY[i]-longY[i])<=0){crossIdx=i;break;}}
    const cx=candles[crossIdx].x+candles[crossIdx].w/2,cy=(shortY[crossIdx]+longY[crossIdx])/2;
    svgEl.appendChild(hsvg('circle',{cx,cy,r:4,fill:'#00D4AA','fill-opacity':0.15,stroke:'#00D4AA','stroke-width':1}));
    badge(8,14,shortName,'#00D4AA',7);
    badge(8,24,longName,mcCol,7);
    badge(cx,cy-10,'SINAL','#00D4AA',7,'middle');
    delete svgEl._maCrossover;
  }

  // ── Step 0: time window ──
  if(step===0){
    const toMin=s=>{const p=(s||'00:00').split(':');return(parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0);};
    const isLocal=cfg.market==='local';
    const dayStart=toMin(isLocal?'08:00':'00:00'), dayEnd=toMin(isLocal?'18:30':'23:59'), dayRange=dayEnd-dayStart||1;
    const timeX=s=>{const m=toMin(s);return 6+((Math.max(dayStart,Math.min(dayEnd,m))-dayStart)/dayRange)*(W-12);};
    const x1=timeX(cfg.tStart), x2=timeX(cfg.tLastEntry), x3=timeX(cfg.tEnd);
    rc(x1,0,Math.max(1,x2-x1),chartH,'#00D4AA',0.03,0);
    rc(x2,0,Math.max(1,x3-x2),chartH,'#F59E0B',0.03,0);
    ln(x1,0,x1,chartH,'#00D4AA',0.6);
    ln(x2,0,x2,chartH,'#F59E0B',0.6,'2,2');
    ln(x3,0,x3,chartH,'#EF4444',0.6);
    const lbY=chartH+2;
    rc(0,lbY,W,68,TH.panelBg,1,0);
    ln(4,lbY,W-4,lbY,TH.grid,0.4);
    tx(8,lbY+16,cfg.tStart,'#00D4AA',13);tx(60,lbY+16,'Início da leitura',TH.txs,10);
    tx(8,lbY+34,cfg.tLastEntry,'#F59E0B',13);tx(60,lbY+34,'Última abertura',TH.txs,10);
    tx(8,lbY+52,cfg.tEnd,'#EF4444',13);tx(60,lbY+52,'Encerramento',TH.txs,10);
  }

  // ── Steps 1+: entry marker ──
  const hasCrossoverSignal=conds.some(c=>['sma','ema'].includes(c.id)&&isMACrossover(c.params?.cond||''));
  if(step>=1&&conds.length>0&&!hasCrossoverSignal){
    const si=14;
    rc(candles[si].x-1,candles[si].h-3,candles[si].w+2,candles[si].l-candles[si].h+6,'#00D4AA',0.05,2);
    ln(candles[si].x+candles[si].w/2,candles[si].h-6,candles[si].x+candles[si].w/2,candles[si].h-14,'#00D4AA',0.6);
    badge(candles[si].x+candles[si].w/2,candles[si].h-18,'SINAL','#00D4AA',6,'middle');
  }

  // ── Steps 3+: stop/target ──
  if(step>=3){
    const si=15;
    const entryY=candles[si].o;

    // Scale: convert real pts to preview pixels proportionally
    // Preview chart spans ~34 "price units" over (chartH-10) pixels
    // We need to know how many real pts that represents for the selected asset
    const assetTick=getAssetTick(cfg.asset);
    // Approximate pts-per-preview-unit by asset category
    const previewRangePts=(()=>{
      const t=cfg.asset;
      if(t==='WIN$N'||t==='IND$N'||t==='ISP$N') return 1700;  // WIN: ~1700 pts/pregão
      if(t==='WDO$N'||t==='DOL$N') return 170;                 // WDO: ~170 pts
      if(t==='DI1$N') return 0.5;
      if(['EURUSD','GBPUSD','AUDUSD','NZDUSD','USDCAD','USDCHF','USDBRL','EURCAD','AUDCAD','GBPAUD','EURGBP','EURCHF','EURAUD'].includes(t)) return 0.02;
      if(['USDJPY','EURJPY','GBPJPY','AUDJPY','CADJPY','NZDJPY'].includes(t)) return 3;
      if(t==='XAUUSD') return 50;
      if(t==='XAGUSD') return 2;
      if(['WTICOUSD','BRENTCMDUSD'].includes(t)) return 5;
      if(t==='US500') return 100;
      if(t==='NAS100') return 400;
      if(t==='US30') return 800;
      if(t==='DE40'||t==='GER40') return 300;
      if(t==='UK100') return 150;
      if(t==='FR40') return 150;
      if(t==='JP225') return 500;
      if(t==='AU200') return 80;
      if(t==='HK50') return 400;
      // Ações BR / US / ETFs
      return 10;
    })();

    // px per real pt
    const pxPerPt=(chartH-10)/previewRangePts;

    // Stop distance in pixels
    const stopDistPts=(()=>{
      if(cfg.stopType==='fixed') return cfg.stopPts;
      if(cfg.stopType==='hl_candle') return previewRangePts*0.08+cfg.stopOffset;
      if(cfg.stopType==='n_candles') return previewRangePts*0.12+cfg.stopOffset;
      if(cfg.stopType==='atr') return previewRangePts*0.10*cfg.stopAtrMult;
      return previewRangePts*0.10;
    })();
    const stopDistPx=Math.min(stopDistPts*pxPerPt, chartH-entryY-4);
    const stopY=Math.min(entryY+Math.max(stopDistPx,6), chartH-4);

    // Target distance in pixels
    const targetDistPts=(()=>{
      if(cfg.tpType==='fixed') return cfg.tpPts;
      if(cfg.tpType==='rr') return stopDistPts*cfg.tpRR;
      if(cfg.tpType==='atr') return previewRangePts*0.10*cfg.tpAtrMult;
      if(cfg.tpType==='fib_ext') return stopDistPts*(parseFloat(cfg.tpFibLevel)/100);
      return stopDistPts*2; // fallback for 'none'
    })();
    const targetDistPx=Math.min(targetDistPts*pxPerPt, entryY-6);
    const targetY=Math.max(entryY-Math.max(targetDistPx,8), 6);

    // Draw lines spanning from signal candle to right edge
    const x0=candles[si].x;
    ln(x0,stopY,  W-4,stopY,  '#EF4444',0.9,'3,2');
    ln(x0,targetY,W-4,targetY,'#10B981', 0.9,'3,2');
    ln(x0,entryY, W-4,entryY, '#00D4AA', 0.7,'3,2');

    // Shaded risk/reward zone
    if(targetY<entryY) rc(x0,targetY,W-4-x0,entryY-targetY,'#10B981',0.04,0);
    rc(x0,entryY,W-4-x0,stopY-entryY,'#EF4444',0.04,0);

    // Labels
    badge(W-22,stopY-3,  'STOP','#EF4444',6);
    badge(W-22,targetY-3,'ALVO','#10B981',6);
    badge(W-22,entryY-3, 'ENTR','#00D4AA',6);

    // RR ratio label
    if(cfg.tpType!=='none'){
      const rr=(targetDistPts/stopDistPts).toFixed(1);
      const rrY=(entryY+targetY)/2;
      badge(x0+2,rrY,'R:'+rr,'#00D4AA',6);
    }
  }

  // ── Step 4: trailing ──
  if(step>=4&&cfg.trailing){
    const si=15;const entryY=candles[si].o;
    const pts=[0,1,2,3,4].map(i=>`${candles[si].x+i*14},${entryY-i*3}`).join(' ');
    pl(pts,'#F59E0B',0.8,'2,2');
    badge(candles[si].x+50,entryY-16,'TRAIL','#F59E0B',6);
  }

  // ── Oscillator panels (below chart) ──
  let panelY=chartH+6;
  const drawOscPanel=(cond,yOff)=>{
    const col=cond.id==='macd'?'#00D4AA':'#6366F1';
    const ct=(cond.params?.cond||'').toLowerCase();
    const up=ct.includes('acima')||ct.includes('subindo');
    rc(4,yOff,W-8,panelH,TH.panelBg,1,3);
    svgEl.appendChild(hsvg('rect',{x:4,y:yOff,width:W-8,height:panelH,rx:3,fill:'none',stroke:TH.grid,'stroke-width':0.4}));
    const label=({rsi:'RSI',stoch:'STOCH',cci:'CCI',williams:'W%R',macd:'MACD',adx:'ADX',atr:'ATR'})[cond.id]||cond.id.toUpperCase();
    tx(8,yOff+9,label+(cond.params?.per?'('+cond.params.per+')':''),TH.txm,6);
    if(cond.id==='macd'){
      const hist=[-4,-6,-8,-6,-4,-1,2,5,7,6,4,2,-1,-3,-5,-4,-2,1,3,5];
      const mid=yOff+panelH/2;ln(4,mid,W-4,mid,'#2A2A3C',0.3);
      const bw=(W-16)/hist.length;
      hist.forEach((v,i)=>{const x=8+i*bw,hgt=Math.abs(v)*1.2,vy=v<0?mid:mid-hgt;rc(x,vy,bw-1,hgt,v>=0?'#10B981':'#EF4444',0.5,0.5);});
    } else {
      // threshold line positioned proportionally to val (e.g. RSI 30 = bottom third, RSI 70 = top third)
      const val=cond.params?.val!=null?cond.params.val:null;
      let threshFraction=up?0.25:0.75; // default
      if(val!=null){
        // RSI/Stoch/Williams: 0-100 range; CCI: -200 to +200
        const isWide=['cci','williams'].includes(cond.id);
        const range=isWide?400:100;
        const min=isWide?-200:0;
        threshFraction=1-((val-min)/range); // invert: higher val = higher on panel = lower y
        threshFraction=Math.max(0.1,Math.min(0.9,threshFraction));
      }
      const threshY=yOff+threshFraction*panelH;
      ln(4,threshY,W-4,threshY,'#F59E0B',0.5,'2,2');
      if(val!=null){const vt=hsvg('text',{x:W-6,y:threshY-2,fill:'#F59E0B','font-size':'6','font-family':'JetBrains Mono','text-anchor':'end'});vt.textContent=val;svgEl.appendChild(vt);}
      // wave that crosses the threshold
      const wave=[];const crossAt=13;
      for(let i=0;i<20;i++){
        const progress=i/19;
        const base=up
          ? panelH-4-progress*(panelH-8)   // rising wave (crosses from below)
          : 4+progress*(panelH-8);          // falling wave (crosses from above)
        wave.push(Math.max(2,Math.min(panelH-2,base)));
      }
      const bww=(W-16)/wave.length;
      pl(wave.map((y,i)=>`${8+i*bww},${yOff+y}`).join(' '),col,0.8);
      cir(8+crossAt*bww,yOff+wave[crossAt],'#00D4AA',2);
    }
  };

  const allPanelConds=[...oscConds,...volConds].slice(0,2);
  allPanelConds.forEach((cond,i)=>{
    drawOscPanel(cond,panelY);
    panelY+=panelH+4;
  });

  // ── Empty state (no conditions yet) ──
  if(conds.length===0 && step>=1){
    rc(W/2-60,chartH/2-12,120,28,TH.panelBg,0.6,6);
    tx(W/2,chartH/2,'Adicione condições',TH.txs,9,'middle');
    tx(W/2,chartH/2+12,'para ver o preview',TH.txm,7,'middle');
  }

  return svgEl;
}

function miniCandleIcon(patternName) {

  const dc=(x,o,c,hi,lo,w)=>{const bull=c<o;const col=bull?'#10B981':'#EF4444';ln(x+w/2,hi,x+w/2,lo,col,0.4);rc(x,Math.min(o,c),w,Math.max(1,Math.abs(o-c)),col,0.8,0.3);};

  else if(ct.includes('estrela da noite')||ct.includes('doji da noite')){dc(8,22,12,10,24,4);dc(21,10,12,8,14,3);dc(35,12,24,10,26,4);}

  else if(ct.includes('marubozu')&&ct.includes('alta')){rc(21,8,6,20,G,0.8,0.3);}

  else if(ct.includes('3 soldados')){dc(8,24,18,16,26,4);dc(20,18,12,10,20,4);dc(32,12,8,6,14,4);}
  else if(ct.includes('3 corvos')){dc(8,12,18,10,20,4);dc(20,18,24,16,26,4);dc(32,24,28,22,30,4);}
  else if(ct.includes('nuvem negra')){dc(14,10,22,8,24,6);dc(28,24,16,8,26,6);}
  else if(ct.includes('perfuração')){dc(14,24,14,12,26,6);dc(28,12,20,10,26,6);}
  else if(ct.includes('topo duplo')){dc(5,20,12,10,22,3);dc(14,14,18,12,20,3);dc(23,20,12,10,22,3);dc(32,14,18,12,20,3);ln(5,12,42,12,R,0.4);}
  else if(ct.includes('fundo duplo')){dc(5,14,22,12,24,3);dc(14,20,18,16,26,3);dc(23,14,22,12,24,3);dc(32,20,18,16,26,3);ln(5,24,42,24,G,0.4);}
  else if(ct.includes('trap de alta')){dc(8,14,22,12,24,4);dc(20,24,10,8,26,4);dc(32,12,20,10,22,4);}
