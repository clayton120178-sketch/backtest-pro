<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backtest Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0A0A0F;--bg1:#12121A;--bg2:#1A1A28;--bg3:#1E1E2E;
  --bd:#2A2A3C;--bdh:#3A3A52;
  --tx:#E8E8ED;--txs:#8888A0;--txm:#44445A;
  --ac:#00D4AA;--acd:rgba(0,212,170,.08);--acd2:rgba(0,212,170,.18);
  --in:#6366F1;
  --dg:#EF4444;--dgd:rgba(239,68,68,.08);
  --wn:#F59E0B;--wnd:rgba(245,158,11,.10);
  --pr:#10B981;--prd:rgba(16,185,129,.08);
}
html,body{min-height:100%;background:var(--bg0);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
input,button,select{font-family:inherit}
input[type=time]{color-scheme:dark;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:7px 10px;outline:none;font-size:13px}
input[type=time]:focus{border-color:var(--ac)}
input[type=range]{accent-color:var(--ac)}
@keyframes sright{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes sleft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes lprog{0%{width:0}15%{width:18%}40%{width:50%}70%{width:75%}95%{width:93%}100%{width:93%}}
.aFwd{animation:sright .22s ease-out both}
.aBwd{animation:sleft .22s ease-out both}
.aUp{animation:fadeUp .25s ease-out both}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--bg1);border-bottom:1px solid var(--bd);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--acd2);border:1px solid rgba(0,212,170,.35);display:flex;align-items:center;justify-content:center}
.logo-text{font-weight:800;font-size:15px;letter-spacing:.01em}
.logo-text span{color:var(--ac)}
.prog-bar{display:flex;align-items:center;gap:0;flex:1;justify-content:center;overflow:hidden}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s;border:none;background:none;color:inherit}
.prog-step:hover:not(:disabled){background:var(--bg2)}
.prog-step:disabled{cursor:default}
.prog-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.prog-circle.done{background:var(--pr);border-color:var(--pr)}
.prog-circle.active{background:var(--ac);border-color:var(--ac)}
.prog-label{font-size:10px;font-weight:500;color:var(--txm);white-space:nowrap;transition:color .2s}
.prog-label.active{color:var(--ac)}
.prog-label.done{color:var(--pr)}
.prog-line{width:16px;height:1px;background:var(--bd);flex-shrink:0;margin-bottom:14px;transition:background .3s}
.prog-line.done{background:var(--pr)}
.avatar{width:30px;height:30px;border-radius:15px;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center}
main{flex:1;padding:24px 20px;max-width:1060px;width:100%;margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
@media(max-width:800px){.two-col{grid-template-columns:1fr}.side-panel{display:none!important}}

/* Cards */
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;transition:border-color .15s,background .15s}
.card.sel{border-color:var(--ac)!important;background:var(--acd)!important}
.card.seld{border-color:var(--dg)!important;background:var(--dgd)!important}
.card.selp{border-color:var(--pr)!important;background:var(--prd)!important}
.card.pick{cursor:pointer}.card.pick:hover{border-color:var(--bdh)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;font-weight:500;transition:all .16s;border-radius:8px;white-space:nowrap;font-size:14px}
.btnP{background:var(--ac);color:var(--bg0);padding:11px 22px;font-weight:700}
.btnP:hover{background:#00ecc0;box-shadow:0 0 24px rgba(0,212,170,.28);transform:translateY(-1px)}
.btnP:active{transform:translateY(0)}
.btnS{background:transparent;color:var(--txs);padding:11px 16px;border:1px solid var(--bd)}
.btnS:hover{color:var(--tx);border-color:var(--bdh);background:var(--bg2)}
.btnGh{background:transparent;border:1px solid var(--bd);color:var(--txs);padding:4px 8px;font-size:12px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .13s;font-weight:500}
.btnGh:hover{color:var(--tx);border-color:var(--bdh)}

/* Chips */
.chip{padding:5px 13px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:1px solid var(--bd);background:var(--bg1);color:var(--txs);transition:all .13s;user-select:none;display:inline-block}
.chip:hover{border-color:var(--bdh);color:var(--tx)}
.chip.on{background:var(--ac);border-color:var(--ac);color:var(--bg0);font-weight:700}

/* Form */
.slabel{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:5px;margin-bottom:9px}
.stepper{display:flex;align-items:center;gap:6px}
.step-btn{background:var(--bg2);border:1px solid var(--bd);color:var(--tx);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .13s;flex-shrink:0;font-family:inherit}
.step-btn:hover{background:var(--bd)}
.step-val{min-width:48px;width:64px;text-align:center;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--tx);font-family:'JetBrains Mono',monospace;-moz-appearance:textfield;outline:none;transition:border-color .15s}
.step-val::-webkit-inner-spin-button,.step-val::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.step-val:focus{border-color:var(--ac)}
.step-unit{font-size:12px;color:var(--txs);flex-shrink:0}
.ckbox{width:17px;height:17px;border-radius:4px;border:2px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .14s}
.ckbox.on{background:var(--ac);border-color:var(--ac)}
.cring{width:17px;height:17px;border-radius:50%;border:2px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.cring.on{background:var(--ac);border-color:var(--ac)}
.cring.dg.on{background:var(--dg);border-color:var(--dg)}
.toggle{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:8px;background:#fff;transition:left .18s}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);gap:0;overflow-x:auto}
.tab{padding:8px 13px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txs);border-bottom:2px solid transparent;transition:all .13s;user-select:none;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit}
.tab:hover{color:var(--tx)}.tab.on{color:var(--ac);border-bottom-color:var(--ac)}

/* Step header */
.step-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.step-icon{width:32px;height:32px;border-radius:9px;background:var(--acd2);border:1px solid rgba(0,212,170,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:17px;font-weight:700;color:var(--tx)}
.step-sub{font-size:12px;color:var(--txm)}

/* Nav footer */
.nav-footer{display:flex;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:1px solid var(--bd)}

/* Radio row */
.radio-row{display:flex;align-items:flex-start;gap:11px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:background .12s}
.radio-row:hover{background:var(--bg2)}
.radio-row.on{background:var(--acd)}

/* Alert banner */
.banner{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:9px;margin-bottom:16px}
.banner.warn{background:var(--wnd);border:1px solid rgba(245,158,11,.2)}

/* Mgmt block */
.mgmt-block{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.mgmt-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:15px 17px}
.mgmt-body{padding:0 17px 17px;border-top:1px solid var(--bd)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:800;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeUp .18s ease-out}
.modal{background:var(--bg1);border:1px solid var(--bd);border-radius:16px;width:100%;max-width:580px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 28px 64px rgba(0,0,0,.8)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px}
.modal-footer{padding:13px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:9px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:28px;text-align:center}
.spinner{width:62px;height:62px;position:relative}
.spinner-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--ac);animation:spin .7s linear infinite}
.spinner-inner{position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,212,170,.15)}
.load-bar{width:260px;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;margin:0 auto}
.load-fill{height:100%;background:var(--ac);border-radius:2px;animation:lprog 4.5s ease-out forwards}

/* Results */
.verdict{border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.verdict.ok{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(16,185,129,.03));border:1px solid rgba(16,185,129,.22)}
.verdict.bad{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.03));border:1px solid rgba(239,68,68,.22)}
.verdict-icon{width:50px;height:50px;border-radius:25px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px}
@media(max-width:600px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
.metric-card{background:var(--bg1);border:1px solid var(--bd);border-radius:11px;padding:13px 15px}
.metric-label{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.metric-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.chart-card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.chart-label{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Confirmation */
.confirm-row{padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--bd)}
.confirm-key{font-size:10px;font-weight:800;color:var(--txs);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.confirm-val{font-size:14px;color:var(--tx);line-height:1.6}

/* ─── AUTH ───────────────────────────────────────────────────── */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.auth-modal{background:var(--bg1);border:1px solid var(--bd);border-radius:18px;width:100%;max-width:420px;padding:36px 32px;box-shadow:0 28px 64px rgba(0,0,0,.8)}
.auth-logo{display:flex;align-items:center;gap:9px;margin-bottom:28px;justify-content:center}
.auth-logo-icon{width:34px;height:34px;border-radius:9px;background:var(--acd2);border:1px solid rgba(0,212,170,.3);display:flex;align-items:center;justify-content:center}
.auth-logo-text{font-weight:800;font-size:16px;color:var(--tx)}
.auth-logo-text span{color:var(--ac)}
.auth-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:var(--txs);text-align:center;margin-bottom:24px;line-height:1.5}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.auth-input{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.auth-input:focus{border-color:var(--ac)}
.auth-input::placeholder{color:var(--txm)}
.auth-btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--ac);color:#0A0A0F;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:4px}
.auth-btn:hover{background:#00ecc0}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:#EF4444;margin-bottom:14px;display:none}
.auth-error.show{display:block}
.auth-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--txm);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.auth-google{width:100%;padding:11px;border-radius:9px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:9px;box-sizing:border-box}
.auth-google:hover{color:var(--tx);border-color:var(--bdh)}
.auth-toggle{text-align:center;margin-top:20px;font-size:13px;color:var(--txs)}
.auth-toggle a{color:var(--ac);cursor:pointer;font-weight:600}
.avatar-wrap{position:relative}
.avatar-menu{position:absolute;top:48px;right:0;background:var(--bg1);border:1px solid var(--bd);border-radius:11px;padding:8px;min-width:200px;box-shadow:0 12px 36px rgba(0,0,0,.6);z-index:500;display:none}
.avatar-menu.open{display:block}
.avatar-name{font-size:12px;color:var(--txs);padding:8px 10px 10px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.avatar-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--txs);transition:background .12s;background:none;border:none;width:100%;font-family:inherit;text-align:left}
.avatar-item:hover{background:var(--bg2);color:var(--tx)}
.avatar-item.danger{color:var(--dg)}
.avatar-item.danger:hover{background:rgba(239,68,68,.08)}
/* ─── PLANOS ─────────────────────────────────────────────────── */
.plans-screen{max-width:860px;margin:0 auto;padding:32px 20px}
.plans-title{font-size:24px;font-weight:800;color:var(--tx);margin-bottom:6px;text-align:center}
.plans-sub{font-size:14px;color:var(--txs);text-align:center;margin-bottom:28px}
.cycle-toggle{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.cycle-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.cycle-btn.active{background:var(--ac);border-color:var(--ac);color:#0A0A0F;font-weight:700}
.plans-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:600px){.plans-grid{grid-template-columns:1fr}}
.plan-card{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:26px;position:relative;overflow:hidden;transition:all .15s}
.plan-card.featured{border-color:rgba(0,212,170,.35);background:linear-gradient(160deg,rgba(0,212,170,.04),var(--bg1))}
.plan-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),var(--in))}
.plan-popular{position:absolute;top:16px;right:16px;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:800;background:var(--ac);color:#0A0A0F}
.plan-name{font-size:12px;font-weight:800;color:var(--txs);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.plan-price{font-size:36px;font-weight:800;color:var(--tx);font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.plan-price span{font-size:16px;font-weight:500;color:var(--txs)}
.plan-cycle-note{font-size:11px;color:var(--txm);margin-bottom:18px}
.plan-divider{height:1px;background:var(--bd);margin-bottom:16px}
.plan-features{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.plan-feat{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--txs)}
.plan-feat-check{color:var(--ac);flex-shrink:0}
.plan-feat-dash{color:var(--txm);flex-shrink:0}
.plan-cta{width:100%;padding:11px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;border:none}
.plan-cta.primary{background:var(--ac);color:#0A0A0F}
.plan-cta.primary:hover{background:#00ecc0}
.plan-cta.secondary{background:transparent;color:var(--txs);border:1px solid var(--bd)}
.plan-cta.secondary:hover{color:var(--tx);border-color:var(--bdh)}
/* ─── PAGAMENTO ──────────────────────────────────────────────── */
.pay-screen{max-width:520px;margin:0 auto;padding:32px 20px}
.pay-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--txs);cursor:pointer;background:none;border:none;font-family:inherit;margin-bottom:20px;transition:color .13s}
.pay-back:hover{color:var(--tx)}
.pay-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:4px}
.pay-sub{font-size:13px;color:var(--txs);margin-bottom:24px}
.pay-summary{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
.pay-summary-label{font-size:13px;color:var(--txs)}
.pay-summary-val{font-size:16px;font-weight:700;color:var(--ac);font-family:'JetBrains Mono',monospace}
.pay-methods{display:flex;gap:8px;margin-bottom:22px}
.pay-method-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.pay-method-btn.active{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.pay-field{margin-bottom:14px}
.pay-field label{display:block;font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.pay-input{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.pay-input:focus{border-color:var(--ac)}
.pay-input::placeholder{color:var(--txm)}
.pay-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-btn{width:100%;padding:14px;border-radius:9px;border:none;background:var(--ac);color:#0A0A0F;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:6px}
.pay-btn:hover{background:#00ecc0}
.pay-btn:disabled{opacity:.5;cursor:not-allowed}
.pay-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:#EF4444;margin-bottom:14px;display:none}
.pay-error.show{display:block}
.pay-secure{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--txm);margin-top:14px}

.pay-success h3{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:8px}
.pay-success p{font-size:14px;color:var(--txs);margin-bottom:24px;line-height:1.6}

.nosub-icon{width:56px;height:56px;border-radius:14px;background:var(--acd2);border:1px solid rgba(0,212,170,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.nosub-title{font-size:22px;font-weight:700;color:var(--tx);margin-bottom:8px}
.nosub-sub{font-size:14px;color:var(--txs);max-width:400px;margin:0 auto 28px;line-height:1.6}

.tip-wrap{position:relative;display:inline-flex}
.tip-box{position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--tx);line-height:1.5;width:210px;z-index:500;box-shadow:0 6px 24px rgba(0,0,0,.7);pointer-events:none;font-weight:400}
/* Asset combobox */
.asset-combo{position:relative}
.asset-search{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px 11px 36px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.asset-search:focus{border-color:var(--ac)}
.asset-search::placeholder{color:var(--txm)}
.asset-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txm);pointer-events:none}
.asset-dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg1);border:1px solid var(--bd);border-radius:10px;max-height:280px;overflow-y:auto;z-index:600;box-shadow:0 12px 36px rgba(0,0,0,.7);display:none}
.asset-dropdown.open{display:block}
.asset-cat{font-size:10px;font-weight:800;color:var(--txm);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 4px}
.asset-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s}
.asset-item:hover{background:var(--bg2)}
.asset-item.active{background:var(--acd)}
.asset-ticker{font-size:12px;font-weight:700;color:var(--ac);font-family:'JetBrains Mono',monospace;min-width:64px}
.asset-name{font-size:13px;color:var(--txs);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-selected{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:10px 14px;margin-top:8px}
.asset-selected .asset-ticker{font-size:13px;color:var(--ac)}
.asset-selected .asset-name{font-size:13px;color:var(--tx)}

// ─── HELPERS ──────────────────────────────────────────────────
function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==='class') el.className=v;
    else if (k==='style' && typeof v==='object') Object.assign(el.style,v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for (const c of children.flat(99)) {
    if (c==null||c===false) continue;
    if (typeof c === 'string'||typeof c==='number') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}
function hsvg(tag,attrs={}) {
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
function div(cls,...ch) { return h('div',{class:cls},...ch); }
function btn(cls,ic,label,onclick) {
  const b=h('button',{class:'btn '+cls,onclick});
  if(ic) b.innerHTML=IC[ic]+' ';
  if(label) b.appendChild(document.createTextNode(label));
  return b;
}
function icon(name,color='currentColor') {
  const wrap=div('');
  wrap.innerHTML=IC[name];
  if(color!=='currentColor'&&wrap.firstChild) wrap.firstChild.style.color=color;
  return wrap.firstChild;
}
function stepper(val,min=0,max=9999,unit='',onChange) {
  const inp=h('input',{type:'number',class:'step-val',value:String(val),min:String(min),max:String(max)});
  function readVal(){const n=Number(inp.value);return isNaN(n)?val:n;}
  function clamp(n){return Math.max(min,Math.min(max,Math.round(n)));}
  function commit(){const nv=clamp(readVal());inp.value=nv;onChange(nv);}
  inp.addEventListener('change',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});
  const dec=h('button',{class:'step-btn',type:'button',onclick:e=>{e.preventDefault();const nv=clamp(readVal()-1);inp.value=nv;onChange(nv);}});
  dec.textContent='−';
  const inc=h('button',{class:'step-btn',type:'button',onclick:e=>{e.preventDefault();const nv=clamp(readVal()+1);inp.value=nv;onChange(nv);}});
  inc.textContent='+';
  const wrap=div('stepper',dec,inp,inc);
  if(unit) {const u=div('step-unit');u.textContent=unit;wrap.appendChild(u);}
  return wrap;
}
function ckbox(on,label,onChange) {
  const box=div('ckbox'+(on?' on':''));
  if(on) box.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#0A0A0F" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const lb=h('label',{style:{display:'flex',alignItems:'center',gap:'9px',cursor:'pointer'}},box);

  return lb;
}
function cring(on,isDanger=false) {

}
function toggle(on,onChange) {

// ─── SVG CHARTS ───────────────────────────────────────────────
function buildEquityChart() {
  const W=560,H=150,PL=45,PR=10,PT=8,PB=24;
  const vals=EQ.map(d=>d.v);
  const min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const iW=W-PL-PR,iH=H-PT-PB,n=EQ.length-1;
  const tx=i=>PL+i/n*iW, ty=v=>PT+(1-(v-min)/rng)*iH;
  const pts=EQ.map((d,i)=>`${tx(i).toFixed(1)},${ty(d.v).toFixed(1)}`);
  const linePath='M'+pts.join(' L');
  const areaPath=`M${tx(0).toFixed(1)},${(PT+iH).toFixed(1)} L`+pts.join(' L')+` L${tx(n).toFixed(1)},${(PT+iH).toFixed(1)} Z`;
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  // Grid
  for(let i=0;i<4;i++){const y=PT+i*(iH/3);const l=hsvg('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#2A2A3C','stroke-width':'0.5','stroke-dasharray':'3,3'});svgEl.appendChild(l);}
  // Zero line
  const zy=ty(0);
  if(zy>PT&&zy<PT+iH){const zl=hsvg('line',{x1:PL,y1:zy,x2:W-PR,y2:zy,stroke:'#3A3A52','stroke-width':'1'});svgEl.appendChild(zl);}
  // Defs gradient
  const defs=hsvg('defs',{});
  const grad=hsvg('linearGradient',{id:'eqg',x1:'0',y1:'0',x2:'0',y2:'1'});
  const s1=hsvg('stop',{offset:'0%','stop-color':'#10B981','stop-opacity':'0.3'});
  const s2=hsvg('stop',{offset:'100%','stop-color':'#10B981','stop-opacity':'0.02'});
  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svgEl.appendChild(defs);
  // Area
  const area=hsvg('path',{d:areaPath,fill:'url(#eqg)'});svgEl.appendChild(area);
  // Line
  const line=hsvg('path',{d:linePath,fill:'none',stroke:'#10B981','stroke-width':'1.8'});svgEl.appendChild(line);
  // X labels
  [0,12,24,36,48,60,72,84].forEach(i=>{
    if(i<EQ.length){const t=hsvg('text',{x:tx(i),y:H-6,'text-anchor':'middle',fill:'#44445A','font-size':'9','font-family':'JetBrains Mono'});t.textContent=EQ[i].t.split(' ')[1];svgEl.appendChild(t);}
  });
  // Y labels
  [0,1].forEach(i=>{const v=min+i*rng;const t=hsvg('text',{x:PL-4,y:ty(v)+4,'text-anchor':'end',fill:'#44445A','font-size':'9','font-family':'JetBrains Mono'});t.textContent=(v>=0?'+':'')+Math.round(v/1000)+'k';svgEl.appendChild(t);});
  return svgEl;
}
function buildDDChart() {
  const W=560,H=80,PL=45,PR=10,PT=4,PB=18;
  const vals=EQ.map(d=>d.dd);
  const min=Math.min(...vals,0),rng=-min||1;
  const iW=W-PL-PR,iH=H-PT-PB,n=EQ.length-1;
  const tx=i=>PL+i/n*iW, ty=v=>PT+(v-0)/min*(iH);
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  const defs=hsvg('defs',{});

  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svgEl.appendChild(defs);
  const pts=EQ.map((d,i)=>`${tx(i).toFixed(1)},${ty(d.dd).toFixed(1)}`);
  const areaPath=`M${tx(0)},${PT} L`+pts.join(' L')+` L${tx(n)},${PT} Z`;
  const area=hsvg('path',{d:areaPath,fill:'url(#ddg)'});svgEl.appendChild(area);

}
function buildHistChart() {
  const W=520,H=90,PL=10,PT=8,PB=22;
  const maxC=Math.max(...HIST.map(d=>d.c));
  const barW=(W-PL*2)/HIST.length-4;
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  HIST.forEach((d,i)=>{
    const x=PL+i*(W-PL*2)/HIST.length;
    const bh=(d.c/maxC)*(H-PT-PB);
    const by=H-PB-bh;
    const fill=d.t==='profit'?'#10B981':d.t==='loss'?'#EF4444':'#2A2A3C';
    const rect=hsvg('rect',{x,y:by,width:barW,height:Math.max(0,bh),rx:'2',fill,opacity:'0.82'});
    svgEl.appendChild(rect);
    const lbl=hsvg('text',{x:x+barW/2,y:H-5,'text-anchor':'middle',fill:'#44445A','font-size':'8.5','font-family':'JetBrains Mono'});
    lbl.textContent=d.r;svgEl.appendChild(lbl);
  });
  return svgEl;
}

    const bull=cd.c>cd.o;const col=bull?'#10B981':'#EF4444';
    const top=Math.min(cd.o,cd.c),bh=Math.max(2,Math.abs(cd.o-cd.c));
    const wick=hsvg('line',{x1:cd.x+9,y1:cd.h,x2:cd.x+9,y2:cd.l,stroke:col,'stroke-width':'1'});
    const bar=hsvg('rect',{x:cd.x,y:top,width:'18',height:bh,rx:'1.5',fill:col,'fill-opacity':'0.85'});
    svgEl.appendChild(wick);svgEl.appendChild(bar);
  });
  // Step 0: time window
  if(step===0){
    const zone=hsvg('rect',{x:'60',y:'0',width:'186',height:pH,fill:'#00D4AA','fill-opacity':'0.04'});
    const l1=hsvg('line',{x1:'60',y1:'0',x2:'60',y2:pH,stroke:'#00D4AA','stroke-width':'1'});

    const t1=hsvg('text',{x:'64',y:pH+10,fill:'#00D4AA','font-size':'7.5','font-family':'JetBrains Mono'});t1.textContent=cfg.tStart;svgEl.appendChild(t1);
    const t2=hsvg('text',{x:'200',y:pH+10,fill:'#00D4AA','font-size':'7.5','font-family':'JetBrains Mono'});t2.textContent=cfg.tEnd;svgEl.appendChild(t2);
  }
  // Steps 1+: entry/stop/target
  if(step>=1){
    const zr=hsvg('rect',{x:'206',y:'130',width:'94',height:'55',fill:'#00D4AA','fill-opacity':'0.04'});
    const bl=hsvg('line',{x1:'206',y1:'130',x2:'206',y2:pH,stroke:'#00D4AA','stroke-width':'1','stroke-dasharray':'3,2'});
    svgEl.appendChild(zr);svgEl.appendChild(bl);
    const el=hsvg('line',{x1:'206',y1:'152',x2:'300',y2:'152',stroke:'#00D4AA','stroke-width':'1.5','stroke-dasharray':'4,2'});svgEl.appendChild(el);
    const er=hsvg('rect',{x:'230',y:'143',width:'62','height':'16',rx:'3',fill:'rgba(0,212,170,0.18)',stroke:'#00D4AA','stroke-width':'0.5'});svgEl.appendChild(er);
    const et=hsvg('text',{x:'261',y:'154','text-anchor':'middle',fill:'#00D4AA','font-size':'7','font-family':'JetBrains Mono','font-weight':'600'});et.textContent='ENTRADA';svgEl.appendChild(et);
  }
  if(step>=3){
    const sl=hsvg('line',{x1:'206',y1:'182',x2:'300',y2:'182',stroke:'#EF4444','stroke-width':'1.5','stroke-dasharray':'4,2'});svgEl.appendChild(sl);
    const sr=hsvg('rect',{x:'234',y:'173',width:'52','height':'16',rx:'3',fill:'rgba(239,68,68,0.1)',stroke:'#EF4444','stroke-width':'0.5'});svgEl.appendChild(sr);
    const st=hsvg('text',{x:'260',y:'184','text-anchor':'middle',fill:'#EF4444','font-size':'7','font-family':'JetBrains Mono','font-weight':'600'});st.textContent='STOP';svgEl.appendChild(st);
    const tl=hsvg('line',{x1:'206',y1:'116',x2:'300',y2:'116',stroke:'#10B981','stroke-width':'1.5','stroke-dasharray':'4,2'});svgEl.appendChild(tl);
    const tr=hsvg('rect',{x:'234',y:'107',width:'52','height':'16',rx:'3',fill:'rgba(16,185,129,0.1)',stroke:'#10B981','stroke-width':'0.5'});svgEl.appendChild(tr);
    const tt=hsvg('text',{x:'260',y:'118','text-anchor':'middle',fill:'#10B981','font-size':'7','font-family':'JetBrains Mono','font-weight':'600'});tt.textContent='ALVO';svgEl.appendChild(tt);
  }
  if(step>=4&&cfg.trailing){
    const tp=hsvg('polyline',{points:'206,152 218,148 232,144 246,140 260,137 274,135 288,133',fill:'none',stroke:'#F59E0B','stroke-width':'1.5','stroke-dasharray':'3,2'});svgEl.appendChild(tp);
  }
  // RSI panel
  if(hasOsc){
    const bg=hsvg('rect',{x:'5',y:pH+4,width:'290','height':'30',rx:'3',fill:'#1A1A28',stroke:'#2A2A3C','stroke-width':'0.5'});svgEl.appendChild(bg);
    const lb=hsvg('text',{x:'11',y:pH+15,fill:'#44445A','font-size':'7'});lb.textContent='RSI';svgEl.appendChild(lb);
    const rl=hsvg('line',{x1:'5',y1:pH+19,x2:'295',y2:pH+19,stroke:'#F59E0B','stroke-width':'0.5','stroke-dasharray':'2,2'});svgEl.appendChild(rl);
    const rp=hsvg('polyline',{points:`5,${pH+28} 34,${pH+21} 64,${pH+16} 94,${pH+13} 124,${pH+19} 154,${pH+15} 184,${pH+11} 214,${pH+15} 244,${pH+19} 274,${pH+13} 295,${pH+14}`,fill:'none',stroke:'#6366F1','stroke-width':'1.4'});svgEl.appendChild(rp);
  }
  return svgEl;
}

// ─── MODAL STATE ──────────────────────────────────────────────
let modalState = { open:false, page:0, tab:'Osciladores', ind:null, params:{} };

function openModal(forExitCond=false) {
  modalState = { open:true, page:0, tab:'Osciladores', ind:null, params:{}, forExitCond };
  renderModal();
}
function closeModal() { modalState.open=false; const m=document.getElementById('modal-container'); if(m) m.remove(); }

function renderModal() {
  let existing=document.getElementById('modal-container');
  if(existing) existing.remove();
  if(!modalState.open) return;

  const ms=modalState;
  const tabs=Object.keys(INDS_BY_TAB);
  const inds=INDS_BY_TAB[ms.tab]||[];

  const modalEl=div('overlay');
  modalEl.id='modal-container';
  modalEl.addEventListener('click',e=>{if(e.target===modalEl)closeModal();});

  const modal=div('modal');

  // Header
  const hdr=div('modal-header');
  const htitle=div('');
  htitle.style.cssText='font-size:15px;font-weight:700;color:#E8E8ED';
  htitle.textContent=ms.page===0?'Adicionar Condição':'Configurar: '+ms.ind?.name;
  hdr.appendChild(htitle);
  if(ms.page===1){
    const backBtn=h('button',{class:'btnGh',onclick:()=>{ms.page=0;renderModal();}});
    backBtn.textContent='← Voltar';
    backBtn.style.marginTop='6px';
    htitle.appendChild(document.createElement('br'));
    htitle.appendChild(backBtn);
  }
  const xBtn=h('button',{class:'btnGh',onclick:closeModal});
  xBtn.innerHTML=IC.x;
  hdr.appendChild(xBtn);
  modal.appendChild(hdr);

  // Body
  const body=div('modal-body');

  if(ms.page===0) {
    // Tabs
    const tabBar=div('tabs');
    tabs.forEach(t=>{
      const tb=h('button',{class:'tab'+(ms.tab===t?' on':''),onclick:()=>{ms.tab=t;renderModal();}});
      tb.textContent=t; tabBar.appendChild(tb);
    });
    body.appendChild(tabBar);
    body.style.paddingTop='16px';

    // Grid
    const grid=div('ind-grid');
    inds.forEach(ind=>{
      const card=div('card pick');
      card.style.padding='13px 15px';
      const nm=div('');nm.style.cssText='font-size:13px;font-weight:600;color:#E8E8ED;margin-bottom:4px';nm.textContent=ind.name;
      const ds=div('');ds.style.cssText='font-size:11px;color:#8888A0;line-height:1.4';ds.textContent=ind.desc;
      card.appendChild(nm);card.appendChild(ds);
      card.addEventListener('click',()=>{
        const conds=getCondsFor(ind.id);
        ms.ind=ind;
        ms.params={
          per:ind.defPer||ind.hasPer?14:undefined,
          cond:conds[0]||ind.defCond,
          val:ind.hasVal?ind.defVal:undefined
        };
        if(['sma','ema'].includes(ind.id)) ms.params.per=200;
        ms.page=1;
        renderModal();
      });
      grid.appendChild(card);
    });
    body.appendChild(grid);

  } else {
    // Config page
    const ind=ms.ind;
    const conds=getCondsFor(ind.id);
    const frag=div('');
    frag.style.cssText='display:flex;flex-direction:column;gap:20px';

    if(ind.hasPer!==false && ms.params.per!==undefined) {
      const row=div('');
      row.appendChild(slabel('Período'));
      const s=stepper(ms.params.per,1,500,'',v=>{ms.params.per=v;});
      row.appendChild(s);
      frag.appendChild(row);
    }
    if(conds.length>0){
      const row=div('');
      row.appendChild(slabel('Condição'));
      const radios=[];
      conds.forEach(c=>{
        const r=div('radio-row'+(ms.params.cond===c?' on':''));
        const ring=cring(ms.params.cond===c);
        r.appendChild(ring);
        const t=div('');t.style.cssText='font-size:13px;color:#E8E8ED';t.textContent=c;
        r.appendChild(t);
        radios.push({el:r,ring,cond:c});
        r.addEventListener('click',()=>{
          ms.params.cond=c;
          radios.forEach(rd=>{
            const isOn=rd.cond===c;
            rd.el.className='radio-row'+(isOn?' on':'');
            rd.ring.className='cring'+(isOn?' on':'');
            rd.ring.innerHTML=isOn?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0A0A0F" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`:'';
          });
        });
        row.appendChild(r);
      });
      frag.appendChild(row);
    }
    if(ind.hasVal!==false && ms.params.val!==undefined) {
      const row=div('');
      const valLabel = ind.id==='gap' ? 'Tamanho mínimo (pontos)' : ind.id==='atr' ? 'Valor em pontos' : 'Valor de referência';
      row.appendChild(slabel(valLabel));
      const s=stepper(ms.params.val,-999,99999, ind.id==='gap'||ind.id==='atr'?'pts':'', v=>{ms.params.val=v;});
      row.appendChild(s);
      frag.appendChild(row);
    }
    body.appendChild(frag);
  }

  modal.appendChild(body);

  // Footer (page 1 only)
  if(ms.page===1){
    const foot=div('modal-footer');
    const cancelBtn=h('button',{class:'btn btnS',onclick:closeModal});cancelBtn.textContent='Cancelar';
    const confirmBtn=h('button',{class:'btn btnP',onclick:()=>{
      const newCond={id:ms.ind.id,name:ms.ind.name,params:{...ms.params}};
      if(ms.forExitCond) { state.cfg.exitCondition=newCond; }
      else { state.cfg.conditions.push(newCond); }
      closeModal();
      renderApp();
    }});
    confirmBtn.innerHTML=IC.check+' Confirmar';
    foot.appendChild(cancelBtn);foot.appendChild(confirmBtn);
    modal.appendChild(foot);
  }

  modalEl.appendChild(modal);
  document.body.appendChild(modalEl);
}

function renderStep1() {
  const cfg=state.cfg;

  // Market toggle
  const mktBlock=div('');

  ['local','internacional'].forEach(m=>{
    const c=div('chip'+(cfg.market===m?' on':''));
    c.textContent=m==='local'?'🇧🇷 Brasil (B3)':'🌎 Internacional';
    c.addEventListener('click',()=>{cfg.market=m;cfg.asset=m==='local'?'WIN$N':'EURUSD';renderApp();});
    mktRow.appendChild(c);
  });
  mktBlock.appendChild(mktRow);
  el.appendChild(mktBlock);

  // Asset combobox
  const assetBlock=div('');
  assetBlock.appendChild(slabel('Ativo','Busque por ticker ou nome do ativo. Use o campo de busca abaixo.'));
  const combo=div('asset-combo');
  const searchIcon=div('asset-search-icon');
  searchIcon.innerHTML=IC.search;
  const searchInput=h('input',{type:'text',class:'asset-search',placeholder:'Buscar ativo... ex: WIN, PETR4, EURUSD'});
  const dropdown=div('asset-dropdown');
  combo.append(searchIcon,searchInput,dropdown);

  function renderDropdown(filter='') {
    dropdown.innerHTML='';
    const q=filter.toLowerCase();
    const mktData=ASSETS_DATA[cfg.market];
    let hasResults=false;
    for (const [cat,items] of Object.entries(mktData)) {
      const filtered=items.filter(a=>a.t.toLowerCase().includes(q)||a.n.toLowerCase().includes(q));
      if(filtered.length===0) continue;
      hasResults=true;
      const catLabel=div('asset-cat');catLabel.textContent=CAT_LABELS[cat]||cat;
      dropdown.appendChild(catLabel);
      filtered.forEach(a=>{
        const item=div('asset-item'+(cfg.asset===a.t?' active':''));
        const tk=div('asset-ticker');tk.textContent=a.t;
        const nm=div('asset-name');nm.textContent=a.n;
        item.append(tk,nm);
        item.addEventListener('click',()=>{
          cfg.asset=a.t;
          dropdown.classList.remove('open');
          searchInput.value='';
          renderApp();
        });
        dropdown.appendChild(item);
      });
    }
    if(!hasResults){
      const empty=div('');empty.style.cssText='padding:16px;text-align:center;font-size:12px;color:#44445A';
      empty.textContent='Nenhum ativo encontrado';
      dropdown.appendChild(empty);
    }
  }

  searchInput.addEventListener('focus',()=>{renderDropdown(searchInput.value);dropdown.classList.add('open');});
  searchInput.addEventListener('input',()=>{renderDropdown(searchInput.value);dropdown.classList.add('open');});
  document.addEventListener('click',e=>{if(!combo.contains(e.target))dropdown.classList.remove('open');},{once:false});

  assetBlock.appendChild(combo);

  // Selected asset display
  const cur=findAsset(cfg.asset);
  if(cur){
    const sel=div('asset-selected');
    const tk=div('asset-ticker');tk.textContent=cur.t;
    const nm=div('asset-name');nm.textContent=cur.n;
    const catBadge=div('');catBadge.style.cssText='font-size:10px;color:#44445A;background:#1E1E2E;border:1px solid #2A2A3C;border-radius:4px;padding:1px 6px;font-weight:600';
    catBadge.textContent=CAT_LABELS[cur.cat]||cur.cat;
    sel.append(tk,nm,catBadge);
    assetBlock.appendChild(sel);
  }
  el.appendChild(assetBlock);

  // Timeframe
  const tfBlock=div('');
  tfBlock.appendChild(slabel('Timeframe'));
  tfBlock.appendChild(chipsWrap(TFS,cfg.tf,v=>{cfg.tf=v;renderApp();}));
  el.appendChild(tfBlock);

  // Window
  const wBlock=div('');
  wBlock.appendChild(slabel('Janela Operacional','Horário em que operações podem ser abertas. Sinais fora desta janela são ignorados.'));
  const row=div('');row.style.cssText='display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap';
  const from=div('');from.style.cssText='font-size:13px;color:#8888A0';from.textContent='Das';
  const t1=h('input',{type:'time',value:cfg.tStart,onchange:e=>{cfg.tStart=e.target.value;renderApp();}});
  const to=div('');to.style.cssText='font-size:13px;color:#8888A0';to.textContent='até';
  const t2=h('input',{type:'time',value:cfg.tEnd,onchange:e=>{cfg.tEnd=e.target.value;renderApp();}});
  row.append(from,t1,to,t2);
  wBlock.appendChild(row);
  wBlock.appendChild(ckbox(cfg.closeEnd,'Fechar posições abertas ao final da janela',v=>{cfg.closeEnd=v;renderApp();}));
  el.appendChild(wBlock);
  return el;
}

const LOAD_MSGS=['Analisando 7 anos de histórico...','Processando 48.000 candles...','Calculando drawdowns e métricas...','Simulando execução das operações...','Gerando relatório de performance...'];

function startLoading() {
  state.animate=true;state.screen='loading';state.loadMsg=0;renderApp();
  const iv=setInterval(()=>{
    state.loadMsg++;
    const msgEl=document.getElementById('load-msg');
    if(msgEl) msgEl.textContent=LOAD_MSGS[Math.min(state.loadMsg,LOAD_MSGS.length-1)];
    if(state.loadMsg>=LOAD_MSGS.length-1){clearInterval(iv);setTimeout(()=>{state.animate=true;state.screen='results';renderApp();},700);}

// ─── PROGRESS BAR ─────────────────────────────────────────────
function renderProgressBar() {
  const pb=document.getElementById('prog-bar');
  pb.innerHTML='';
  if(state.screen!=='wizard') {
    const lbl=div('');lbl.style.cssText='font-size:13px;color:#8888A0;font-weight:500';
    lbl.textContent=state.screen==='confirm'?'Confirmar estratégia':state.screen==='loading'?'Processando...':'Resultado do backtest';
    pb.appendChild(lbl);return;
  }
  STEPS.forEach((s,i)=>{
    const done=i<state.maxDone;const active=i===state.step;
    const btn_=h('button',{class:'prog-step',disabled:i>state.maxDone});
    btn_.addEventListener('click',()=>{if(i<=state.maxDone&&i!==state.step){state.dir=i>state.step?'fwd':'bwd';state.animate=true;state.step=i;renderApp();}});
    const circle=div('prog-circle'+(done?' done':active?' active':''));
    if(done) circle.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    else circle.innerHTML=IC[s.icon]||'';
    if(circle.querySelector('svg')){const sv=circle.querySelector('svg');sv.style.color=active?'#0A0A0F':done?'white':'#44445A';}
    const label=div('prog-label'+(done?' done':active?' active':''));label.textContent=s.label;
    btn_.append(circle,label);
    pb.appendChild(btn_);
    if(i<STEPS.length-1){const line=div('prog-line'+(done?' done':''));pb.appendChild(line);}
  });
}

// ─── MAIN RENDER ──────────────────────────────────────────────
function renderApp() {
  renderProgressBar();
  const main=document.getElementById('main');
  main.innerHTML='';

  if(state.screen==='loading'){main.appendChild(renderLoading());state.animate=false;return;}
  if(state.screen==='confirm'){main.appendChild(renderConfirm());state.animate=false;return;}
  if(state.screen==='results'){main.appendChild(renderResults());state.animate=false;return;}

  // Wizard
  const two=div('two-col');

  // Left: form
  const left=div('');
  // Step header
  const hdr=div('step-hdr');
  const ic=div('step-icon');
  ic.innerHTML=IC[STEPS[state.step].icon]||'';
  ic.style.color='#00D4AA';
  const info=div('');

  const s=div('step-sub');s.textContent=STEP_SUBS[state.step];

  // Step content

  left.appendChild(stepRenderers[state.step]());

  // Nav

  const backBtn=h('button',{class:'btn btnS',onclick:()=>{if(state.step>0){state.dir='bwd';state.animate=true;state.step--;renderApp();}}});

  if(state.step===0) backBtn.style.opacity='0.35';

  const fwdBtn=h('button',{class:'btn btnP',onclick:()=>{
    if(state.step<4){state.dir='fwd';state.animate=true;if(state.step>=state.maxDone)state.maxDone=state.step+1;state.step++;renderApp();}
    else{state.animate=true;state.screen='confirm';renderApp();}
  }});
  if(state.step<4) fwdBtn.innerHTML='Avançar '+IC.fwd;
  else fwdBtn.innerHTML='Confirmar estratégia '+IC.fwd;

  nav.append(backBtn,fwdBtn);left.appendChild(nav);

  // Right: preview panel
  const right=div('side-panel');right.style.cssText='position:sticky;top:72px';

    if (cardContainer) cardContainer.style.display = 'none';
  } else {
    const needsRemount = payMethod !== method || !mpMounted;

    if (pixArea) pixArea.style.display = 'none';

async function handleAuth(mode) {
  const email=document.getElementById('auth-email')?.value?.trim();
  const pass=document.getElementById('auth-pass')?.value;
  const name=document.getElementById('auth-name')?.value?.trim();
  const btn=document.getElementById('auth-submit');
  const errEl=document.getElementById('auth-error');
  if(!email||!pass){errEl.textContent='Preencha e-mail e senha.';errEl.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Aguarde...';
  let result;
  if(mode==='login') result=await db.auth.signInWithPassword({email,password:pass});
  else result=await db.auth.signUp({email,password:pass,options:{data:{full_name:name||email.split('@')[0]}}});
  if(result.error){
    const msgs={'Invalid login credentials':'E-mail ou senha incorretos.','User already registered':'E-mail já cadastrado. Faça login.','Password should be at least 6 characters':'Senha deve ter pelo menos 6 caracteres.'};
    errEl.textContent=msgs[result.error.message]||result.error.message;errEl.classList.add('show');
    btn.disabled=false;btn.textContent=mode==='login'?'Entrar':'Criar conta';return;
  }
  if(mode==='signup'&&!result.data.session){
    document.getElementById('auth-overlay')?.remove();
    alert('Verifique seu e-mail para confirmar o cadastro.');
    showAuthModal('login');return;
  }
  // Login bem sucedido — onAuthStateChange vai cuidar do resto
}

// ─── BOOT ─────────────────────────────────────────────────────
// Único ponto de entrada de sessão — onAuthStateChange
let currentScreen = null; // Track current screen to prevent auth override

db.auth.onAuthStateChange(async (event, session) => {
  console.log('auth event:', event, session?.user?.email||'no user');
  if (event === 'SIGNED_IN' && session?.user) {
    currentUser = session.user;
    await loadSubscription(session.access_token);
    updateAvatarUI();
    document.getElementById('auth-overlay')?.remove();
    // Don't override if user is already on plans/payment screens
    if (currentScreen === 'plans' || currentScreen === 'payment') return;
    if (currentSub) { renderApp(); } else { showScreen('nosub'); }
  }
  if (event === 'INITIAL_SESSION') {
    if (session?.user) {
      currentUser = session.user;
      await loadSubscription(session.access_token);
      updateAvatarUI();
      if (currentSub) { renderApp(); } else { showScreen('nosub'); }
    } else {
      showAuthModal('login');
    }
  }
  if (event === 'SIGNED_OUT') {
    currentUser=null; currentSub=null; currentScreen=null;
    showAuthModal('login');
  }
});

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backtest Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0A0A0F;--bg1:#12121A;--bg2:#1A1A28;--bg3:#1E1E2E;
  --bd:#2A2A3C;--bdh:#3A3A52;
  --tx:#E8E8ED;--txs:#8888A0;--txm:#44445A;
  --ac:#00D4AA;--acd:rgba(0,212,170,.08);--acd2:rgba(0,212,170,.18);
  --in:#6366F1;
  --dg:#EF4444;--dgd:rgba(239,68,68,.08);
  --wn:#F59E0B;--wnd:rgba(245,158,11,.10);
  --pr:#10B981;--prd:rgba(16,185,129,.08);
}
html,body{min-height:100%;background:var(--bg0);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
input,button,select{font-family:inherit}
input[type=time]{color-scheme:dark;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:7px 10px;outline:none;font-size:13px}
input[type=time]:focus{border-color:var(--ac)}
input[type=range]{accent-color:var(--ac)}
@keyframes sright{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes sleft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes lprog{0%{width:0}15%{width:18%}40%{width:50%}70%{width:75%}95%{width:93%}100%{width:93%}}
.aFwd{animation:sright .22s ease-out both}
.aBwd{animation:sleft .22s ease-out both}
.aUp{animation:fadeUp .25s ease-out both}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--bg1);border-bottom:1px solid var(--bd);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--acd2);border:1px solid rgba(0,212,170,.35);display:flex;align-items:center;justify-content:center}
.logo-text{font-weight:800;font-size:15px;letter-spacing:.01em}
.logo-text span{color:var(--ac)}
.prog-bar{display:flex;align-items:center;gap:0;flex:1;justify-content:center;overflow:hidden}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s;border:none;background:none;color:inherit}
.prog-step:hover:not(:disabled){background:var(--bg2)}
.prog-step:disabled{cursor:default}
.prog-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.prog-circle.done{background:var(--pr);border-color:var(--pr)}
.prog-circle.active{background:var(--ac);border-color:var(--ac)}
.prog-label{font-size:10px;font-weight:500;color:var(--txm);white-space:nowrap;transition:color .2s}
.prog-label.active{color:var(--ac)}
.prog-label.done{color:var(--pr)}
.prog-line{width:16px;height:1px;background:var(--bd);flex-shrink:0;margin-bottom:14px;transition:background .3s}
.prog-line.done{background:var(--pr)}
.avatar{width:30px;height:30px;border-radius:15px;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center}
main{flex:1;padding:24px 20px;max-width:1060px;width:100%;margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
@media(max-width:800px){.two-col{grid-template-columns:1fr}.side-panel{display:none!important}}

/* Cards */
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;transition:border-color .15s,background .15s}
.card.sel{border-color:var(--ac)!important;background:var(--acd)!important}
.card.seld{border-color:var(--dg)!important;background:var(--dgd)!important}
.card.selp{border-color:var(--pr)!important;background:var(--prd)!important}
.card.pick{cursor:pointer}.card.pick:hover{border-color:var(--bdh)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;font-weight:500;transition:all .16s;border-radius:8px;white-space:nowrap;font-size:14px}
.btnP{background:var(--ac);color:var(--bg0);padding:11px 22px;font-weight:700}
.btnP:hover{background:#00ecc0;box-shadow:0 0 24px rgba(0,212,170,.28);transform:translateY(-1px)}
.btnP:active{transform:translateY(0)}
.btnS{background:transparent;color:var(--txs);padding:11px 16px;border:1px solid var(--bd)}
.btnS:hover{color:var(--tx);border-color:var(--bdh);background:var(--bg2)}
.btnGh{background:transparent;border:1px solid var(--bd);color:var(--txs);padding:4px 8px;font-size:12px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .13s;font-weight:500}
.btnGh:hover{color:var(--tx);border-color:var(--bdh)}

/* Chips */
.chip{padding:5px 13px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:1px solid var(--bd);background:var(--bg1);color:var(--txs);transition:all .13s;user-select:none;display:inline-block}
.chip:hover{border-color:var(--bdh);color:var(--tx)}
.chip.on{background:var(--ac);border-color:var(--ac);color:var(--bg0);font-weight:700}

/* Form */
.slabel{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:5px;margin-bottom:9px}
.stepper{display:flex;align-items:center;gap:6px}
.step-btn{background:var(--bg2);border:1px solid var(--bd);color:var(--tx);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .13s;flex-shrink:0;font-family:inherit}
.step-btn:hover{background:var(--bd)}
.step-val{min-width:48px;width:64px;text-align:center;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--tx);font-family:'JetBrains Mono',monospace;-moz-appearance:textfield;outline:none;transition:border-color .15s}
.step-val::-webkit-inner-spin-button,.step-val::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.step-val:focus{border-color:var(--ac)}
.step-unit{font-size:12px;color:var(--txs);flex-shrink:0}
.ckbox{width:17px;height:17px;border-radius:4px;border:2px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .14s}
.ckbox.on{background:var(--ac);border-color:var(--ac)}
.cring{width:17px;height:17px;border-radius:50%;border:2px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.cring.on{background:var(--ac);border-color:var(--ac)}
.cring.dg.on{background:var(--dg);border-color:var(--dg)}
.toggle{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:8px;background:#fff;transition:left .18s}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);gap:0;overflow-x:auto}
.tab{padding:8px 13px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txs);border-bottom:2px solid transparent;transition:all .13s;user-select:none;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit}
.tab:hover{color:var(--tx)}.tab.on{color:var(--ac);border-bottom-color:var(--ac)}

/* Step header */
.step-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.step-icon{width:32px;height:32px;border-radius:9px;background:var(--acd2);border:1px solid rgba(0,212,170,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:17px;font-weight:700;color:var(--tx)}
.step-sub{font-size:12px;color:var(--txm)}

/* Nav footer */
.nav-footer{display:flex;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:1px solid var(--bd)}

/* Radio row */
.radio-row{display:flex;align-items:flex-start;gap:11px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:background .12s}
.radio-row:hover{background:var(--bg2)}
.radio-row.on{background:var(--acd)}

/* Alert banner */
.banner{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:9px;margin-bottom:16px}
.banner.warn{background:var(--wnd);border:1px solid rgba(245,158,11,.2)}

/* Mgmt block */
.mgmt-block{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.mgmt-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:15px 17px}
.mgmt-body{padding:0 17px 17px;border-top:1px solid var(--bd)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:800;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeUp .18s ease-out}
.modal{background:var(--bg1);border:1px solid var(--bd);border-radius:16px;width:100%;max-width:580px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 28px 64px rgba(0,0,0,.8)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px}
.modal-footer{padding:13px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:9px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:28px;text-align:center}
.spinner{width:62px;height:62px;position:relative}
.spinner-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--ac);animation:spin .7s linear infinite}
.spinner-inner{position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,212,170,.15)}
.load-bar{width:260px;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;margin:0 auto}
.load-fill{height:100%;background:var(--ac);border-radius:2px;animation:lprog 4.5s ease-out forwards}

/* Results */
.verdict{border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.verdict.ok{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(16,185,129,.03));border:1px solid rgba(16,185,129,.22)}
.verdict.bad{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.03));border:1px solid rgba(239,68,68,.22)}
.verdict-icon{width:50px;height:50px;border-radius:25px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px}
@media(max-width:600px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
.metric-card{background:var(--bg1);border:1px solid var(--bd);border-radius:11px;padding:13px 15px}
.metric-label{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.metric-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.chart-card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.chart-label{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Confirmation */
.confirm-row{padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--bd)}
.confirm-key{font-size:10px;font-weight:800;color:var(--txs);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.confirm-val{font-size:14px;color:var(--tx);line-height:1.6}

/* ─── AUTH ───────────────────────────────────────────────────── */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.auth-modal{background:var(--bg1);border:1px solid var(--bd);border-radius:18px;width:100%;max-width:420px;padding:36px 32px;box-shadow:0 28px 64px rgba(0,0,0,.8)}
.auth-logo{display:flex;align-items:center;gap:9px;margin-bottom:28px;justify-content:center}
.auth-logo-icon{width:34px;height:34px;border-radius:9px;background:var(--acd2);border:1px solid rgba(0,212,170,.3);display:flex;align-items:center;justify-content:center}
.auth-logo-text{font-weight:800;font-size:16px;color:var(--tx)}
.auth-logo-text span{color:var(--ac)}
.auth-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:var(--txs);text-align:center;margin-bottom:24px;line-height:1.5}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.auth-input{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.auth-input:focus{border-color:var(--ac)}
.auth-input::placeholder{color:var(--txm)}
.auth-btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--ac);color:#0A0A0F;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:4px}
.auth-btn:hover{background:#00ecc0}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:#EF4444;margin-bottom:14px;display:none}
.auth-error.show{display:block}
.auth-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--txm);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.auth-google{width:100%;padding:11px;border-radius:9px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:9px;box-sizing:border-box}
.auth-google:hover{color:var(--tx);border-color:var(--bdh)}
.auth-toggle{text-align:center;margin-top:20px;font-size:13px;color:var(--txs)}
.auth-toggle a{color:var(--ac);cursor:pointer;font-weight:600}
.avatar-wrap{position:relative}
.avatar-menu{position:absolute;top:48px;right:0;background:var(--bg1);border:1px solid var(--bd);border-radius:11px;padding:8px;min-width:200px;box-shadow:0 12px 36px rgba(0,0,0,.6);z-index:500;display:none}
.avatar-menu.open{display:block}
.avatar-name{font-size:12px;color:var(--txs);padding:8px 10px 10px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.avatar-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--txs);transition:background .12s;background:none;border:none;width:100%;font-family:inherit;text-align:left}
.avatar-item:hover{background:var(--bg2);color:var(--tx)}
.avatar-item.danger{color:var(--dg)}
.avatar-item.danger:hover{background:rgba(239,68,68,.08)}
/* ─── PLANOS ─────────────────────────────────────────────────── */
.plans-screen{max-width:860px;margin:0 auto;padding:32px 20px}
.plans-title{font-size:24px;font-weight:800;color:var(--tx);margin-bottom:6px;text-align:center}
.plans-sub{font-size:14px;color:var(--txs);text-align:center;margin-bottom:28px}
.cycle-toggle{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.cycle-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.cycle-btn.active{background:var(--ac);border-color:var(--ac);color:#0A0A0F;font-weight:700}
.plans-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:600px){.plans-grid{grid-template-columns:1fr}}
.plan-card{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:26px;position:relative;overflow:hidden;transition:all .15s}
.plan-card.featured{border-color:rgba(0,212,170,.35);background:linear-gradient(160deg,rgba(0,212,170,.04),var(--bg1))}
.plan-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),var(--in))}
.plan-popular{position:absolute;top:16px;right:16px;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:800;background:var(--ac);color:#0A0A0F}
.plan-name{font-size:12px;font-weight:800;color:var(--txs);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.plan-price{font-size:36px;font-weight:800;color:var(--tx);font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.plan-price span{font-size:16px;font-weight:500;color:var(--txs)}
.plan-cycle-note{font-size:11px;color:var(--txm);margin-bottom:18px}
.plan-divider{height:1px;background:var(--bd);margin-bottom:16px}
.plan-features{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.plan-feat{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--txs)}
.plan-feat-check{color:var(--ac);flex-shrink:0}
.plan-feat-dash{color:var(--txm);flex-shrink:0}
.plan-cta{width:100%;padding:11px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;border:none}
.plan-cta.primary{background:var(--ac);color:#0A0A0F}
.plan-cta.primary:hover{background:#00ecc0}
.plan-cta.secondary{background:transparent;color:var(--txs);border:1px solid var(--bd)}
.plan-cta.secondary:hover{color:var(--tx);border-color:var(--bdh)}
/* ─── PAGAMENTO ──────────────────────────────────────────────── */
.pay-screen{max-width:520px;margin:0 auto;padding:32px 20px}
.pay-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--txs);cursor:pointer;background:none;border:none;font-family:inherit;margin-bottom:20px;transition:color .13s}
.pay-back:hover{color:var(--tx)}
.pay-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:4px}
.pay-sub{font-size:13px;color:var(--txs);margin-bottom:24px}
.pay-summary{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
.pay-summary-label{font-size:13px;color:var(--txs)}
.pay-summary-val{font-size:16px;font-weight:700;color:var(--ac);font-family:'JetBrains Mono',monospace}
.pay-methods{display:flex;gap:8px;margin-bottom:22px}
.pay-method-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.pay-method-btn.active{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.pay-field{margin-bottom:14px}
.pay-field label{display:block;font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.pay-input{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.pay-input:focus{border-color:var(--ac)}
.pay-input::placeholder{color:var(--txm)}
.pay-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-btn{width:100%;padding:14px;border-radius:9px;border:none;background:var(--ac);color:#0A0A0F;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:6px}
.pay-btn:hover{background:#00ecc0}
.pay-btn:disabled{opacity:.5;cursor:not-allowed}
.pay-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:#EF4444;margin-bottom:14px;display:none}
.pay-error.show{display:block}
.pay-secure{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--txm);margin-top:14px}
.pix-box{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.pix-qr{width:180px;height:180px;margin:0 auto 14px;border-radius:8px}
.pix-copy{width:100%;padding:11px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--ac);font-size:11px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;word-break:break-all;text-align:left;transition:all .15s}
.pix-copy:hover{background:var(--acd)}
.pix-note{font-size:12px;color:var(--txm);margin-top:10px;line-height:1.5}
.pay-success{text-align:center;padding:20px 0}
.pay-success-icon{width:64px;height:64px;border-radius:32px;background:rgba(16,185,129,.1);border:2px solid #10B981;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.pay-success h3{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:8px}
.pay-success p{font-size:14px;color:var(--txs);margin-bottom:24px;line-height:1.6}
.nosub-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;padding:32px 20px}
.nosub-icon{width:56px;height:56px;border-radius:14px;background:var(--acd2);border:1px solid rgba(0,212,170,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.nosub-title{font-size:22px;font-weight:700;color:var(--tx);margin-bottom:8px}
.nosub-sub{font-size:14px;color:var(--txs);max-width:400px;margin:0 auto 28px;line-height:1.6}
/* Tooltip */
.tip-wrap{position:relative;display:inline-flex}
.tip-box{position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--tx);line-height:1.5;width:210px;z-index:500;box-shadow:0 6px 24px rgba(0,0,0,.7);pointer-events:none;font-weight:400}
/* Asset combobox */
.asset-combo{position:relative}
.asset-search{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px 11px 36px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.asset-search:focus{border-color:var(--ac)}
.asset-search::placeholder{color:var(--txm)}
.asset-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txm);pointer-events:none}
.asset-dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg1);border:1px solid var(--bd);border-radius:10px;max-height:280px;overflow-y:auto;z-index:600;box-shadow:0 12px 36px rgba(0,0,0,.7);display:none}
.asset-dropdown.open{display:block}
.asset-cat{font-size:10px;font-weight:800;color:var(--txm);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 4px}
.asset-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s}
.asset-item:hover{background:var(--bg2)}
.asset-item.active{background:var(--acd)}
.asset-ticker{font-size:12px;font-weight:700;color:var(--ac);font-family:'JetBrains Mono',monospace;min-width:64px}
.asset-name{font-size:13px;color:var(--txs);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-selected{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:10px 14px;margin-top:8px}
.asset-selected .asset-ticker{font-size:13px;color:var(--ac)}
.asset-selected .asset-name{font-size:13px;color:var(--tx)}

function getCondsFor(id) {

// ─── HELPERS ──────────────────────────────────────────────────
function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==='class') el.className=v;
    else if (k==='style' && typeof v==='object') Object.assign(el.style,v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for (const c of children.flat(99)) {
    if (c==null||c===false) continue;
    if (typeof c === 'string'||typeof c==='number') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}
function hsvg(tag,attrs={}) {
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
function div(cls,...ch) { return h('div',{class:cls},...ch); }
function btn(cls,ic,label,onclick) {
  const b=h('button',{class:'btn '+cls,onclick});
  if(ic) b.innerHTML=IC[ic]+' ';
  if(label) b.appendChild(document.createTextNode(label));
  return b;
}
function icon(name,color='currentColor') {
  const wrap=div('');
  wrap.innerHTML=IC[name];
  if(color!=='currentColor'&&wrap.firstChild) wrap.firstChild.style.color=color;
  return wrap.firstChild;
}
function stepper(val,min=0,max=9999,unit='',onChange) {
  const inp=h('input',{type:'number',class:'step-val',value:val,min:String(min),max:String(max)});
  function commit(){let nv=parseInt(inp.value,10);if(isNaN(nv))nv=val;nv=Math.max(min,Math.min(max,nv));inp.value=nv;onChange(nv);}
  inp.addEventListener('change',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});
  const dec=h('button',{class:'step-btn',onclick:e=>{e.preventDefault();let nv=Math.max(min,(parseInt(inp.value,10)||val)-1);inp.value=nv;onChange(nv);}});
  dec.textContent='−';
  const inc=h('button',{class:'step-btn',onclick:e=>{e.preventDefault();let nv=Math.min(max,(parseInt(inp.value,10)||val)+1);inp.value=nv;onChange(nv);}});
  inc.textContent='+';
  const wrap=div('stepper',dec,inp,inc);
  if(unit) {const u=div('step-unit');u.textContent=unit;wrap.appendChild(u);}
  return wrap;
}
function ckbox(on,label,onChange) {
  const box=div('ckbox'+(on?' on':''));
  if(on) box.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#0A0A0F" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;

}
function cring(on,isDanger=false) {

function toggle(on,onChange) {

function slabel(text,tip) {

// ─── SVG CHARTS ───────────────────────────────────────────────
function buildEquityChart() {
  const W=560,H=150,PL=45,PR=10,PT=8,PB=24;
  const vals=EQ.map(d=>d.v);
  const min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const iW=W-PL-PR,iH=H-PT-PB,n=EQ.length-1;
  const tx=i=>PL+i/n*iW, ty=v=>PT+(1-(v-min)/rng)*iH;
  const pts=EQ.map((d,i)=>`${tx(i).toFixed(1)},${ty(d.v).toFixed(1)}`);
  const linePath='M'+pts.join(' L');
  const areaPath=`M${tx(0).toFixed(1)},${(PT+iH).toFixed(1)} L`+pts.join(' L')+` L${tx(n).toFixed(1)},${(PT+iH).toFixed(1)} Z`;
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  // Grid
  for(let i=0;i<4;i++){const y=PT+i*(iH/3);const l=hsvg('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#2A2A3C','stroke-width':'0.5','stroke-dasharray':'3,3'});svgEl.appendChild(l);}
  // Zero line
  const zy=ty(0);
  if(zy>PT&&zy<PT+iH){const zl=hsvg('line',{x1:PL,y1:zy,x2:W-PR,y2:zy,stroke:'#3A3A52','stroke-width':'1'});svgEl.appendChild(zl);}
  // Defs gradient
  const defs=hsvg('defs',{});
  const grad=hsvg('linearGradient',{id:'eqg',x1:'0',y1:'0',x2:'0',y2:'1'});
  const s1=hsvg('stop',{offset:'0%','stop-color':'#10B981','stop-opacity':'0.3'});
  const s2=hsvg('stop',{offset:'100%','stop-color':'#10B981','stop-opacity':'0.02'});
  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svgEl.appendChild(defs);
  // Area
  const area=hsvg('path',{d:areaPath,fill:'url(#eqg)'});svgEl.appendChild(area);
  // Line
  const line=hsvg('path',{d:linePath,fill:'none',stroke:'#10B981','stroke-width':'1.8'});svgEl.appendChild(line);
  // X labels
  [0,12,24,36,48,60,72,84].forEach(i=>{
    if(i<EQ.length){const t=hsvg('text',{x:tx(i),y:H-6,'text-anchor':'middle',fill:'#44445A','font-size':'9','font-family':'JetBrains Mono'});t.textContent=EQ[i].t.split(' ')[1];svgEl.appendChild(t);}
  });
  // Y labels
  [0,1].forEach(i=>{const v=min+i*rng;const t=hsvg('text',{x:PL-4,y:ty(v)+4,'text-anchor':'end',fill:'#44445A','font-size':'9','font-family':'JetBrains Mono'});t.textContent=(v>=0?'+':'')+Math.round(v/1000)+'k';svgEl.appendChild(t);});
  return svgEl;
}
function buildDDChart() {
  const W=560,H=80,PL=45,PR=10,PT=4,PB=18;
  const vals=EQ.map(d=>d.dd);
  const min=Math.min(...vals,0),rng=-min||1;
  const iW=W-PL-PR,iH=H-PT-PB,n=EQ.length-1;
  const tx=i=>PL+i/n*iW, ty=v=>PT+(v-0)/min*(iH);
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  const defs=hsvg('defs',{});
  const grad=hsvg('linearGradient',{id:'ddg',x1:'0',y1:'0',x2:'0',y2:'1'});
  const s1=hsvg('stop',{offset:'0%','stop-color':'#EF4444','stop-opacity':'0.35'});
  const s2=hsvg('stop',{offset:'100%','stop-color':'#EF4444','stop-opacity':'0.04'});
  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svgEl.appendChild(defs);
  const pts=EQ.map((d,i)=>`${tx(i).toFixed(1)},${ty(d.dd).toFixed(1)}`);
  const areaPath=`M${tx(0)},${PT} L`+pts.join(' L')+` L${tx(n)},${PT} Z`;
  const area=hsvg('path',{d:areaPath,fill:'url(#ddg)'});svgEl.appendChild(area);
  const line=hsvg('path',{d:'M'+pts.join(' L'),fill:'none',stroke:'#EF4444','stroke-width':'1.4'});svgEl.appendChild(line);
  return svgEl;
}
function buildHistChart() {
  const W=520,H=90,PL=10,PT=8,PB=22;
  const maxC=Math.max(...HIST.map(d=>d.c));
  const barW=(W-PL*2)/HIST.length-4;
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  HIST.forEach((d,i)=>{
    const x=PL+i*(W-PL*2)/HIST.length;
    const bh=(d.c/maxC)*(H-PT-PB);
    const by=H-PB-bh;
    const fill=d.t==='profit'?'#10B981':d.t==='loss'?'#EF4444':'#2A2A3C';
    const rect=hsvg('rect',{x,y:by,width:barW,height:Math.max(0,bh),rx:'2',fill,opacity:'0.82'});
    svgEl.appendChild(rect);
    const lbl=hsvg('text',{x:x+barW/2,y:H-5,'text-anchor':'middle',fill:'#44445A','font-size':'8.5','font-family':'JetBrains Mono'});
    lbl.textContent=d.r;svgEl.appendChild(lbl);
  });
  return svgEl;
}
