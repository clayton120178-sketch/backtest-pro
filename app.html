<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backtest Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0A0A0F;--bg1:#12121A;--bg2:#1A1A28;--bg3:#1E1E2E;
  --bd:#2A2A3C;--bdh:#3A3A52;
  --tx:#E8E8ED;--txs:#8888A0;--txm:#6B6B80;
  --ac:#00D4AA;--acd:rgba(0,212,170,.08);--acd2:rgba(0,212,170,.18);
  --in:#6366F1;
  --dg:#EF4444;--dgd:rgba(239,68,68,.08);
  --wn:#F59E0B;--wnd:rgba(245,158,11,.10);
  --pr:#10B981;--prd:rgba(16,185,129,.08);
}
html,body{min-height:100%;background:var(--bg0);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
input,button,select{font-family:inherit}
input[type=time]{color-scheme:dark;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:7px 10px;outline:none;font-size:13px;font-family:'JetBrains Mono',monospace;min-width:110px}
input[type=time]:focus{border-color:var(--ac)}
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer}
input[type=range]{accent-color:var(--ac)}
@keyframes sright{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes sleft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes lprog{0%{width:0}15%{width:18%}40%{width:50%}70%{width:75%}95%{width:93%}100%{width:93%}}
.aFwd{animation:sright .22s ease-out both}
.aBwd{animation:sleft .22s ease-out both}
.aUp{animation:fadeUp .25s ease-out both}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--bg1);border-bottom:1px solid var(--bd);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--acd2);border:1px solid rgba(0,212,170,.35);display:flex;align-items:center;justify-content:center}
.logo-text{font-weight:800;font-size:15px;letter-spacing:.01em}
.logo-text span{color:var(--ac)}
.prog-bar{display:flex;align-items:center;gap:0;flex:1;justify-content:center;overflow:hidden}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s;border:none;background:none;color:inherit}
.prog-step:hover:not(:disabled){background:var(--bg2)}
.prog-step:disabled{cursor:default}
.prog-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.prog-circle.done{background:var(--pr);border-color:var(--pr)}
.prog-circle.active{background:var(--ac);border-color:var(--ac)}
.prog-label{font-size:10px;font-weight:500;color:var(--txm);white-space:nowrap;transition:color .2s}
.prog-label.active{color:var(--ac)}
.prog-label.done{color:var(--pr)}
.prog-line{width:16px;height:1px;background:var(--bd);flex-shrink:0;margin-bottom:14px;transition:background .3s}
.prog-line.done{background:var(--pr)}
.avatar{width:30px;height:30px;border-radius:15px;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center}
main{flex:1;padding:24px 20px;max-width:1060px;width:100%;margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
@media(max-width:800px){.two-col{grid-template-columns:1fr}.side-panel{display:none!important}}

/* Cards */
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;transition:border-color .15s,background .15s}
.card.sel{border-color:var(--ac)!important;background:var(--acd)!important}
.card.seld{border-color:var(--dg)!important;background:var(--dgd)!important}
.card.selp{border-color:var(--pr)!important;background:var(--prd)!important}
.card.pick{cursor:pointer}.card.pick:hover{border-color:var(--bdh)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;font-weight:500;transition:all .16s;border-radius:8px;white-space:nowrap;font-size:14px}
.btnP{background:var(--ac);color:var(--bg0);padding:11px 22px;font-weight:700}
.btnP:hover{background:#00ecc0;box-shadow:0 0 24px rgba(0,212,170,.28);transform:translateY(-1px)}
.btnP:active{transform:translateY(0)}
.btnS{background:transparent;color:var(--txs);padding:11px 16px;border:1px solid var(--bd)}
.btnS:hover{color:var(--tx);border-color:var(--bdh);background:var(--bg2)}
.btnGh{background:transparent;border:1px solid var(--bd);color:var(--txs);padding:4px 8px;font-size:12px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .13s;font-weight:500}
.btnGh:hover{color:var(--tx);border-color:var(--bdh)}

/* Chips */
.chip{padding:5px 13px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:1px solid var(--bd);background:var(--bg1);color:var(--txs);transition:all .13s;user-select:none;display:inline-block}
.chip:hover{border-color:var(--bdh);color:var(--tx)}
.chip.on{background:var(--ac);border-color:var(--ac);color:var(--bg0);font-weight:700}

/* Form */
.slabel{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:5px;margin-bottom:9px}
.stepper{display:flex;align-items:center;gap:6px}
.step-btn{background:var(--bg2);border:1px solid var(--bd);color:var(--tx);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .13s;flex-shrink:0;font-family:inherit}
.step-btn:hover{background:var(--bd)}
.step-val{min-width:48px;width:64px;text-align:center;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;font-size:13px;color:var(--tx);font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
.step-val:focus{border-color:var(--ac)}
.step-unit{font-size:12px;color:var(--txs);flex-shrink:0}
.ckbox{width:17px;height:17px;border-radius:4px;border:2px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .14s}
.ckbox.on{background:var(--ac);border-color:var(--ac)}
.cring{width:17px;height:17px;border-radius:50%;border:2px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.cring.on{background:var(--ac);border-color:var(--ac)}
.cring.dg.on{background:var(--dg);border-color:var(--dg)}
.toggle{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:8px;background:#fff;transition:left .18s}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);gap:0;overflow-x:auto}
.tab{padding:8px 13px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txs);border-bottom:2px solid transparent;transition:all .13s;user-select:none;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit}
.tab:hover{color:var(--tx)}.tab.on{color:var(--ac);border-bottom-color:var(--ac)}

/* Step header */
.step-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.step-icon{width:32px;height:32px;border-radius:9px;background:var(--acd2);border:1px solid rgba(0,212,170,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:17px;font-weight:700;color:var(--tx)}
.step-sub{font-size:12px;color:var(--txm)}

/* Nav footer */
.nav-footer{display:flex;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:1px solid var(--bd)}

/* Radio row */
.radio-row{display:flex;align-items:flex-start;gap:11px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:background .12s}
.radio-row:hover{background:var(--bg2)}
.radio-row.on{background:var(--acd)}

/* Alert banner */
.banner{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:9px;margin-bottom:16px}
.banner.warn{background:var(--wnd);border:1px solid rgba(245,158,11,.2)}

/* Mgmt block */
.mgmt-block{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.mgmt-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:15px 17px}
.mgmt-body{padding:0 17px 17px;border-top:1px solid var(--bd)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:800;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeUp .18s ease-out}
.modal{background:var(--bg1);border:1px solid var(--bd);border-radius:16px;width:100%;max-width:580px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 28px 64px rgba(0,0,0,.8)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px}
.modal-footer{padding:13px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:9px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px}
.cond-preview{background:#0E0E14;border:1px solid #1A1A28;border-radius:10px;padding:8px;margin-bottom:4px}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:28px;text-align:center}
.spinner{width:62px;height:62px;position:relative}
.spinner-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--ac);animation:spin .7s linear infinite}
.spinner-inner{position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,212,170,.15)}
.load-bar{width:260px;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;margin:0 auto}
.load-fill{height:100%;background:var(--ac);border-radius:2px;animation:lprog 4.5s ease-out forwards}

/* Results */
.verdict{border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.verdict.ok{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(16,185,129,.03));border:1px solid rgba(16,185,129,.22)}
.verdict.bad{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.03));border:1px solid rgba(239,68,68,.22)}
.verdict-icon{width:50px;height:50px;border-radius:25px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
@media(max-width:700px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
.metric-card{background:var(--bg1);border:1px solid var(--bd);border-radius:11px;padding:13px 15px}
.metric-label{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.metric-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.chart-card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.chart-label{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Confirmation */
.confirm-row{padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--bd)}
.confirm-key{font-size:10px;font-weight:800;color:var(--txs);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.confirm-val{font-size:14px;color:var(--tx);line-height:1.6}

/* ─── AUTH ───────────────────────────────────────────────────── */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.auth-modal{background:var(--bg1);border:1px solid var(--bd);border-radius:18px;width:100%;max-width:420px;padding:36px 32px;box-shadow:0 28px 64px rgba(0,0,0,.8)}
.auth-logo{display:flex;align-items:center;gap:9px;margin-bottom:28px;justify-content:center}
.auth-logo-icon{width:34px;height:34px;border-radius:9px;background:var(--acd2);border:1px solid rgba(0,212,170,.3);display:flex;align-items:center;justify-content:center}
.auth-logo-text{font-weight:800;font-size:16px;color:var(--tx)}
.auth-logo-text span{color:var(--ac)}
.auth-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:var(--txs);text-align:center;margin-bottom:24px;line-height:1.5}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.auth-input{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.auth-input:focus{border-color:var(--ac)}
.auth-input::placeholder{color:var(--txm)}
.auth-btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--ac);color:#0A0A0F;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:4px}
.auth-btn:hover{background:#00ecc0}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:#EF4444;margin-bottom:14px;display:none}
.auth-error.show{display:block}
.auth-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--txm);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.auth-google{width:100%;padding:11px;border-radius:9px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:9px;box-sizing:border-box}
.auth-google:hover{color:var(--tx);border-color:var(--bdh)}
.auth-toggle{text-align:center;margin-top:20px;font-size:13px;color:var(--txs)}
.auth-toggle a{color:var(--ac);cursor:pointer;font-weight:600}
.avatar-wrap{position:relative}
.avatar-menu{position:absolute;top:48px;right:0;background:var(--bg1);border:1px solid var(--bd);border-radius:11px;padding:8px;min-width:200px;box-shadow:0 12px 36px rgba(0,0,0,.6);z-index:500;display:none}
.avatar-menu.open{display:block}
.avatar-name{font-size:12px;color:var(--txs);padding:8px 10px 10px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.avatar-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--txs);transition:background .12s;background:none;border:none;width:100%;font-family:inherit;text-align:left}
.avatar-item:hover{background:var(--bg2);color:var(--tx)}
.avatar-item.danger{color:var(--dg)}
.avatar-item.danger:hover{background:rgba(239,68,68,.08)}
/* ─── PLANOS ─────────────────────────────────────────────────── */
.plans-screen{max-width:860px;margin:0 auto;padding:32px 20px}
.plans-title{font-size:24px;font-weight:800;color:var(--tx);margin-bottom:6px;text-align:center}
.plans-sub{font-size:14px;color:var(--txs);text-align:center;margin-bottom:28px}
.cycle-toggle{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.cycle-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.cycle-btn.active{background:var(--ac);border-color:var(--ac);color:#0A0A0F;font-weight:700}
.plans-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:600px){.plans-grid{grid-template-columns:1fr}}
.plan-card{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:26px;position:relative;overflow:hidden;transition:all .15s}
.plan-card.featured{border-color:rgba(0,212,170,.35);background:linear-gradient(160deg,rgba(0,212,170,.04),var(--bg1))}
.plan-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),var(--in))}
.plan-popular{position:absolute;top:16px;right:16px;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:800;background:var(--ac);color:#0A0A0F}
.plan-name{font-size:12px;font-weight:800;color:var(--txs);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.plan-price{font-size:36px;font-weight:800;color:var(--tx);font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.plan-price span{font-size:16px;font-weight:500;color:var(--txs)}
.plan-cycle-note{font-size:11px;color:var(--txm);margin-bottom:18px}
.plan-divider{height:1px;background:var(--bd);margin-bottom:16px}
.plan-features{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.plan-feat{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--txs)}
.plan-feat-check{color:var(--ac);flex-shrink:0}
.plan-feat-dash{color:var(--txm);flex-shrink:0}
.plan-cta{width:100%;padding:11px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;border:none}
.plan-cta.primary{background:var(--ac);color:#0A0A0F}
.plan-cta.primary:hover{background:#00ecc0}
.plan-cta.secondary{background:transparent;color:var(--txs);border:1px solid var(--bd)}
.plan-cta.secondary:hover{color:var(--tx);border-color:var(--bdh)}
/* ─── PAGAMENTO ──────────────────────────────────────────────── */
.pay-screen{max-width:520px;margin:0 auto;padding:32px 20px}
.pay-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--txs);cursor:pointer;background:none;border:none;font-family:inherit;margin-bottom:20px;transition:color .13s}
.pay-back:hover{color:var(--tx)}
.pay-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:4px}
.pay-sub{font-size:13px;color:var(--txs);margin-bottom:24px}
.pay-summary{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
.pay-summary-label{font-size:13px;color:var(--txs)}
.pay-summary-val{font-size:16px;font-weight:700;color:var(--ac);font-family:'JetBrains Mono',monospace}
.pay-methods{display:flex;gap:8px;margin-bottom:22px}
.pay-method-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--txs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.pay-method-btn.active{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.pay-field{margin-bottom:14px}
.pay-field label{display:block;font-size:11px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.pay-input{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.pay-input:focus{border-color:var(--ac)}
.pay-input::placeholder{color:var(--txm)}
.pay-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-btn{width:100%;padding:14px;border-radius:9px;border:none;background:var(--ac);color:#0A0A0F;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:6px}
.pay-btn:hover{background:#00ecc0}
.pay-btn:disabled{opacity:.5;cursor:not-allowed}

function generateEQ(seed,n,bias) {
  // Seeded pseudo-random for reproducible mock data
  let s=seed;const rng=()=>{s=(s*16807+0)%2147483647;return(s&0x7fffffff)/2147483647;};
  const d=[];for(let i=0;i<n;i++){const base=(rng()-0.48+bias)*2000;d.push(Math.round(base));}
  let v=0,peak=0;
  return d.map((x,i)=>{v+=x;if(v>peak)peak=v;const yr=2019+Math.floor(i*87/n/12),mo=Math.floor((i*87/n)%12);return{v:Math.round(v),dd:Math.round(Math.min(0,v-peak)),pnl:x,t:(new Date(2019+Math.floor(i*87/n/12),Math.floor((i*87/n)%12))).toLocaleDateString('pt-BR',{month:'short'}).replace('.','')+" '"+String(2019+Math.floor(i*87/n/12)).slice(2)};});
}

function computeAnalysis(eq,cap) {
  let peak=cap,peakIdx=0,maxDDPct=0,maxDDVal=0,maxDDIdx=0,maxDDPeakIdx=0;
  for(let i=0;i<eq.length;i++){
    const e=cap+eq[i].v;
    if(e>peak){peak=e;peakIdx=i;}
    else{const ddv=peak-e,ddp=peak>0?(ddv/peak)*100:0;if(ddp>maxDDPct){maxDDPct=ddp;maxDDVal=ddv;maxDDIdx=i;maxDDPeakIdx=peakIdx;}}
  }
  peak=cap;let uwStart=null;const uwPeriods=[];
  for(let i=0;i<eq.length;i++){const e=cap+eq[i].v;if(e>=peak){if(uwStart!==null){uwPeriods.push({s:uwStart,e:i-1});uwStart=null;}peak=e;}else{if(uwStart===null)uwStart=i;}}
  if(uwStart!==null)uwPeriods.push({s:uwStart,e:eq.length-1});
  const uwLens=uwPeriods.map(p=>p.e-p.s+1);
  const tuwMax=uwLens.length?Math.max(...uwLens):0;
  const tuwAvg=uwLens.length?uwLens.reduce((a,b)=>a+b,0)/uwLens.length:0;
  let maxStreak=0,curStreak=0,streakStart=0,mStreakS=0,mStreakE=0;
  for(let i=0;i<eq.length;i++){if(eq[i].pnl<0){if(curStreak===0)streakStart=i;curStreak++;if(curStreak>maxStreak){maxStreak=curStreak;mStreakS=streakStart;mStreakE=i;}}else curStreak=0;}
  const wins=eq.filter(d=>d.pnl>0),losses=eq.filter(d=>d.pnl<0);
  const avgWin=wins.length?wins.reduce((a,b)=>a+b.pnl,0)/wins.length:0;
  const avgLoss=losses.length?Math.abs(losses.reduce((a,b)=>a+b.pnl,0)/losses.length):0;
  const totalProfit=wins.reduce((a,b)=>a+b.pnl,0);
  const totalLoss=Math.abs(losses.reduce((a,b)=>a+b.pnl,0));
  const payoff=avgLoss>0?avgWin/avgLoss:0;
  const profitFactor=totalLoss>0?totalProfit/totalLoss:0;
  const recoveryFactor=maxDDVal>0?(cap+eq[eq.length-1].v-cap)/maxDDVal:0;
  const winRate=eq.length>0?(wins.length/eq.length)*100:0;
  const viés=(winRate/100)*avgWin-((100-winRate)/100)*avgLoss;
  return{maxDDPct,maxDDVal,maxDDIdx,maxDDPeakIdx,uwPeriods,tuwMax,tuwAvg,maxStreak,mStreakS,mStreakE,wins:wins.length,losses:losses.length,avgWin,avgLoss,payoff,profitFactor,recoveryFactor,winRate,viés,totalProfit,totalLoss,cap};
}

function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==='class') el.className=v;
    else if (k==='style' && typeof v==='object') Object.assign(el.style,v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for (const c of children.flat(99)) {
    if (c==null||c===false) continue;
    if (typeof c === 'string'||typeof c==='number') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}
function hsvg(tag,attrs={}) {
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
function div(cls,...ch) { return h('div',{class:cls},...ch); }
function btn(cls,ic,label,onclick) {
  const b=h('button',{class:'btn '+cls,onclick});
  if(ic) b.innerHTML=IC[ic]+' ';
  if(label) b.appendChild(document.createTextNode(label));
  return b;
}
function icon(name,color='currentColor') {
  const wrap=div('');
  wrap.innerHTML=IC[name];
  if(color!=='currentColor'&&wrap.firstChild) wrap.firstChild.style.color=color;
  return wrap.firstChild;
}
function stepper(val,min=0,max=9999,unit='',onChange) {
  const inp=h('input',{type:'text',inputmode:'numeric',class:'step-val',value:String(val)});
  function readVal(){const n=parseInt(inp.value.replace(/[^\d\-]/g,''),10);return isNaN(n)?val:n;}
  function clamp(n){return Math.max(min,Math.min(max,Math.round(n)));}
  function commit(){const nv=clamp(readVal());inp.value=nv;onChange(nv);}
  inp.addEventListener('change',commit);
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});
  const dec=h('button',{class:'step-btn',type:'button'});
  dec.textContent='−';
  dec.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();const nv=clamp(readVal()-1);inp.value=nv;onChange(nv);});
  const inc=h('button',{class:'step-btn',type:'button'});
  inc.textContent='+';
  inc.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();const nv=clamp(readVal()+1);inp.value=nv;onChange(nv);});
  const wrap=div('stepper',dec,inp,inc);
  if(unit) {const u=div('step-unit');u.textContent=unit;wrap.appendChild(u);}
  return wrap;
}
function ckbox(on,label,onChange) {
  const box=div('ckbox'+(on?' on':''));
  if(on) box.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#0A0A0F" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const lb=h('label',{style:{display:'flex',alignItems:'center',gap:'9px',cursor:'pointer'}},box);
  lb.appendChild(document.createTextNode(label));
  lb.addEventListener('click',()=>onChange(!on));
  return lb;
}
function cring(on,isDanger=false) {
  const b=div('cring'+(on?' on':'')+(isDanger?' dg':''));
  if(on) b.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="${isDanger?'#EF4444':'#0A0A0F'}" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  return b;
}
function toggle(on,onChange) {
  const t=h('button',{class:'toggle',style:{background:on?'#00D4AA':'#1E1E2E'},onclick:()=>onChange(!on)});
  const thumb=div('toggle-thumb');
  thumb.style.left=on?'21px':'3px';
  t.appendChild(thumb);
  return t;
}
function slabel(text,tip) {
  const sl=div('slabel');
  sl.textContent=text;
  if(tip) {
    const tw=div('tip-wrap');
    tw.innerHTML=IC.help;
    const tb=div('tip-box');
    tb.textContent=tip;
    tb.style.display='none';
    tw.appendChild(tb);
    tw.addEventListener('mouseenter',()=>tb.style.display='block');
    tw.addEventListener('mouseleave',()=>tb.style.display='none');
    sl.appendChild(tw);
  }
  return sl;
}
function chips(items,active,onChange) {
  const wrap=div('');
  wrap.style.display='flex';wrap.style.gap='7px';wrap.style.flexWrap='wrap';
  items.forEach(it=>{
    const c=div('chip'+(it===active?' on':''));
    c.textContent=it;
    c.addEventListener('click',()=>onChange(it));
    wrap.appendChild(c);
  });
  return wrap;
}

// ─── SVG CHARTS ───────────────────────────────────────────────
function buildEquityChart() {
  const A=EQ_ANALYSIS;
  const W=560,H=170,PL=45,PR=10,PT=8,PB=24;
  const vals=EQ.map(d=>d.v);
  const min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const iW=W-PL-PR,iH=H-PT-PB,n=EQ.length-1;
  const txf=i=>PL+i/n*iW, tyf=v=>PT+(1-(v-min)/rng)*iH;
  const pts=EQ.map((d,i)=>`${txf(i).toFixed(1)},${tyf(d.v).toFixed(1)}`);
  const linePath='M'+pts.join(' L');
  const areaPath=`M${txf(0).toFixed(1)},${(PT+iH).toFixed(1)} L`+pts.join(' L')+` L${txf(n).toFixed(1)},${(PT+iH).toFixed(1)} Z`;
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  // Grid
  for(let i=0;i<4;i++){const y=PT+i*(iH/3);svgEl.appendChild(hsvg('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#2A2A3C','stroke-width':'0.5','stroke-dasharray':'3,3'}));}
  // Zero line
  const zy=tyf(0);
  if(zy>PT&&zy<PT+iH) svgEl.appendChild(hsvg('line',{x1:PL,y1:zy,x2:W-PR,y2:zy,stroke:'#3A3A52','stroke-width':'1'}));
  // Max losing streak shading
  if(A.maxStreak>0){
    const x1=txf(A.mStreakS),x2=txf(A.mStreakE);
    svgEl.appendChild(hsvg('rect',{x:x1,y:PT,width:x2-x1,height:iH,fill:'#F59E0B','fill-opacity':'0.06',rx:3}));
    const lt=hsvg('text',{x:(x1+x2)/2,y:PT+10,'text-anchor':'middle',fill:'#F59E0B','font-size':'7','font-family':'JetBrains Mono','font-weight':'600'});
    lt.textContent=`Seq.Neg (${A.maxStreak})`;svgEl.appendChild(lt);
  }
  // Gradient
  const defs=hsvg('defs',{});
  const grad=hsvg('linearGradient',{id:'eqg',x1:'0',y1:'0',x2:'0',y2:'1'});
  grad.appendChild(hsvg('stop',{offset:'0%','stop-color':'#10B981','stop-opacity':'0.3'}));
  grad.appendChild(hsvg('stop',{offset:'100%','stop-color':'#10B981','stop-opacity':'0.02'}));
  defs.appendChild(grad);svgEl.appendChild(defs);
  // Area + Line
  svgEl.appendChild(hsvg('path',{d:areaPath,fill:'url(#eqg)'}));
  svgEl.appendChild(hsvg('path',{d:linePath,fill:'none',stroke:'#10B981','stroke-width':'1.8'}));
  // Max Drawdown marker
  if(A.maxDDPct>0){
    const px=txf(A.maxDDPeakIdx),py=tyf(EQ[A.maxDDPeakIdx].v);
    const dx=txf(A.maxDDIdx),dy=tyf(EQ[A.maxDDIdx].v);
    // Peak to trough horizontal line
    svgEl.appendChild(hsvg('line',{x1:px,y1:py,x2:dx,y2:py,stroke:'#EF4444','stroke-width':'0.8','stroke-dasharray':'3,2','stroke-opacity':'0.6'}));
    // Vertical drop line
    svgEl.appendChild(hsvg('line',{x1:dx,y1:py,x2:dx,y2:dy,stroke:'#EF4444','stroke-width':'1','stroke-dasharray':'3,2','stroke-opacity':'0.6'}));
    // Trough marker
    svgEl.appendChild(hsvg('circle',{cx:dx,cy:dy,r:4,fill:'#EF4444','fill-opacity':'0.2',stroke:'#EF4444','stroke-width':'1.5'}));
    const ddLabel=hsvg('text',{x:dx+6,y:dy+4,fill:'#EF4444','font-size':'8','font-family':'JetBrains Mono','font-weight':'700'});
    ddLabel.textContent=`-${A.maxDDPct.toFixed(1)}%`;svgEl.appendChild(ddLabel);
  }
  // X labels
  [0,12,24,36,48,60,72,84].forEach(i=>{
    if(i<EQ.length){const t=hsvg('text',{x:txf(i),y:H-6,'text-anchor':'middle',fill:'#44445A','font-size':'9','font-family':'JetBrains Mono'});t.textContent=EQ[i].t.split(' ')[1];svgEl.appendChild(t);}
  });
  // Y labels
  [0,0.5,1].forEach(f=>{const v=min+f*rng;const t=hsvg('text',{x:PL-4,y:tyf(v)+4,'text-anchor':'end',fill:'#44445A','font-size':'9','font-family':'JetBrains Mono'});t.textContent=(v>=0?'+':'')+Math.round(v/1000)+'k';svgEl.appendChild(t);});
  return svgEl;
}

function buildTUWChart() {
  const A=EQ_ANALYSIS;
  const W=560,H=170,PL=45,PR=10,PT=8,PB=24;
  const vals=EQ.map(d=>d.v);
  const min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const iW=W-PL-PR,iH=H-PT-PB,n=EQ.length-1;
  const txf=i=>PL+i/n*iW, tyf=v=>PT+(1-(v-min)/rng)*iH;
  const pts=EQ.map((d,i)=>`${txf(i).toFixed(1)},${tyf(d.v).toFixed(1)}`);
  const linePath='M'+pts.join(' L');
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  // Grid
  for(let i=0;i<4;i++){const y=PT+i*(iH/3);svgEl.appendChild(hsvg('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#2A2A3C','stroke-width':'0.5','stroke-dasharray':'3,3'}));}
  // TUW shading
  A.uwPeriods.forEach(p=>{
    const x1=txf(p.s),x2=txf(p.e);
    svgEl.appendChild(hsvg('rect',{x:x1,y:PT,width:Math.max(2,x2-x1),height:iH,fill:'#EF4444','fill-opacity':'0.08'}));
    if(p.e-p.s>=4){const lt=hsvg('text',{x:(x1+x2)/2,y:PT+10,'text-anchor':'middle',fill:'#EF4444','font-size':'6','font-family':'JetBrains Mono','fill-opacity':'0.6'});lt.textContent='TUW';svgEl.appendChild(lt);}
  });
  // Equity line
  svgEl.appendChild(hsvg('path',{d:linePath,fill:'none',stroke:'#1E90FF','stroke-width':'1.8'}));
  // Peak markers
  let peak=EQ[0].v;
  EQ.forEach((d,i)=>{if(d.v>=peak){peak=d.v;svgEl.appendChild(hsvg('circle',{cx:txf(i),cy:tyf(d.v),r:2.5,fill:'#10B981'}));}});
  // X labels
  [0,12,24,36,48,60,72,84].forEach(i=>{
    if(i<EQ.length){const t=hsvg('text',{x:txf(i),y:H-6,'text-anchor':'middle',fill:'#44445A','font-size':'9','font-family':'JetBrains Mono'});t.textContent=EQ[i].t.split(' ')[1];svgEl.appendChild(t);}
  });
  // Y labels
  [0,0.5,1].forEach(f=>{const v=min+f*rng;const t=hsvg('text',{x:PL-4,y:tyf(v)+4,'text-anchor':'end',fill:'#44445A','font-size':'9','font-family':'JetBrains Mono'});t.textContent=(v>=0?'+':'')+Math.round(v/1000)+'k';svgEl.appendChild(t);});
  return svgEl;
}

function buildDDChart() {
  const W=560,H=80,PL=45,PR=10,PT=4,PB=18;
  const vals=EQ.map(d=>d.dd);
  const min=Math.min(...vals,0),rng=-min||1;
  const iW=W-PL-PR,iH=H-PT-PB,n=EQ.length-1;
  const tx=i=>PL+i/n*iW, ty=v=>PT+(v-0)/min*(iH);
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  const defs=hsvg('defs',{});
  const grad=hsvg('linearGradient',{id:'ddg',x1:'0',y1:'0',x2:'0',y2:'1'});
  grad.appendChild(hsvg('stop',{offset:'0%','stop-color':'#EF4444','stop-opacity':'0.35'}));
  grad.appendChild(hsvg('stop',{offset:'100%','stop-color':'#EF4444','stop-opacity':'0.04'}));
  defs.appendChild(grad);svgEl.appendChild(defs);
  const pts=EQ.map((d,i)=>`${tx(i).toFixed(1)},${ty(d.dd).toFixed(1)}`);
  svgEl.appendChild(hsvg('path',{d:`M${tx(0)},${PT} L`+pts.join(' L')+` L${tx(n)},${PT} Z`,fill:'url(#ddg)'}));
  svgEl.appendChild(hsvg('path',{d:'M'+pts.join(' L'),fill:'none',stroke:'#EF4444','stroke-width':'1.4'}));
  return svgEl;
}
function buildHistChart() {
  const W=520,H=90,PL=10,PT=8,PB=22;
  const maxC=Math.max(...HIST.map(d=>d.c));
  const barW=(W-PL*2)/HIST.length-4;
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  HIST.forEach((d,i)=>{
    const x=PL+i*(W-PL*2)/HIST.length;
    const bh=(d.c/maxC)*(H-PT-PB);
    const by=H-PB-bh;
    const fill=d.t==='profit'?'#10B981':d.t==='loss'?'#EF4444':'#2A2A3C';
    svgEl.appendChild(hsvg('rect',{x,y:by,width:barW,height:Math.max(0,bh),rx:'2',fill,opacity:'0.82'}));
    const lbl=hsvg('text',{x:x+barW/2,y:H-5,'text-anchor':'middle',fill:'#44445A','font-size':'8.5','font-family':'JetBrains Mono'});
    lbl.textContent=d.r;svgEl.appendChild(lbl);
  });
  return svgEl;
}

// ─── PREVIEW SVG ─────────────────────────────────────────────
function buildPreview(step,cfg) {
  const conds=cfg.conditions||[];
  // Classify conditions
  const overlayConds=conds.filter(c=>['sma','ema','bb','vwap','sar','hilo','prevday','hilon','fib'].includes(c.id));
  const oscConds=conds.filter(c=>['rsi','stoch','cci','williams','macd','adx','atr'].includes(c.id));
  const volConds=conds.filter(c=>['vol','avgvol','obv'].includes(c.id));
  const otherConds=conds.filter(c=>['price','range','gap','candle'].includes(c.id));

  const panelCount=Math.min(oscConds.length+volConds.length,2);
  const panelH=32;
  const chartH=panelCount>0?148:185;
  const totalH=chartH+(panelCount>0?8+panelCount*panelH+(panelCount-1)*4:0)+8;
  const svgEl=hsvg('svg',{width:'100%',viewBox:`0 0 300 ${totalH}`});

  // Helpers
  const ln=(x1,y1,x2,y2,c,w,d)=>{const a={x1,y1,x2,y2,stroke:c,'stroke-width':w||1};if(d)a['stroke-dasharray']=d;svgEl.appendChild(hsvg('line',a));};
  const pl=(p,c,w,d)=>{const a={points:p,fill:'none',stroke:c,'stroke-width':w||1.5};if(d)a['stroke-dasharray']=d;svgEl.appendChild(hsvg('polyline',a));};
  const rc=(x,y,w,h,c,o,r)=>svgEl.appendChild(hsvg('rect',{x,y,width:w,height:h,fill:c,'fill-opacity':o!=null?o:1,rx:r||0}));
  const tx=(x,y,t,c,s,a)=>{const e=hsvg('text',{x,y,fill:c,'font-size':s||7,'font-family':'JetBrains Mono','font-weight':500,'text-anchor':a||'start'});e.textContent=t;svgEl.appendChild(e);};
  const pa=(d,c,o)=>svgEl.appendChild(hsvg('path',{d,fill:c,'fill-opacity':o||0.12}));
  const cir=(x,y,c,r)=>svgEl.appendChild(hsvg('circle',{cx:x,cy:y,r:r||3,fill:c,'fill-opacity':0.3,stroke:c,'stroke-width':1}));

  const candles=[{x:10,o:140,c:128,h:148,l:120},{x:38,o:128,c:145,h:152,l:122},{x:66,o:145,c:137,h:158,l:130},{x:94,o:137,c:152,h:162,l:130},{x:122,o:152,c:142,h:168,l:136},{x:150,o:142,c:158,h:172,l:136},{x:178,o:158,c:148,h:176,l:140},{x:206,o:148,c:162,h:180,l:140},{x:234,o:162,c:150,h:184,l:142},{x:262,o:150,c:165,h:188,l:143}];

  // Grid
  [50,90,130,170].forEach(y=>{if(y<chartH)ln(5,y,295,y,'#2A2A3C',0.5,'3,3');});

  // ── Overlay indicators (on price chart) ──
  const colors=['#F59E0B','#6366F1','#EC4899','#06B6D4','#8B5CF6'];
  let colorIdx=0;
  const nextCol=()=>colors[colorIdx++%colors.length];

  overlayConds.forEach(cond=>{
    const col=nextCol();
    const ct=(cond.params?.cond||'').toLowerCase();
    const up=ct.includes('acima')||ct.includes('sup')||ct.includes('alta')||ct.includes('compra')||ct.includes('maior');

    if(['sma','ema'].includes(cond.id)){
      const maY=[165,160,155,150,145,140,136,138,142,148];
      const pts=candles.map((c,i)=>`${c.x+9},${maY[i]}`).join(' ');
      pl(pts,col,1.5);
      tx(candles[0].x,maY[0]-6,cond.id.toUpperCase()+(cond.params?.per?'('+cond.params.per+')':''),col,6);
      // Signal dot at crossover area
      if(ct.includes('cruza')){cir(candles[6].x+9,maY[6],'#00D4AA',4);}
    }
    else if(cond.id==='bb'){
      const mid=[140,145,150,154,156,155,152,148,144,140];
      const bw=14;
      // Band fill
      let bp=`M${candles[0].x+9},${mid[0]-bw}`;
      for(let i=1;i<10;i++)bp+=` L${candles[i].x+9},${mid[i]-bw}`;
      for(let i=9;i>=0;i--)bp+=` L${candles[i].x+9},${mid[i]+bw}`;
      bp+=' Z';pa(bp,col,0.06);
      pl(mid.map((y,i)=>`${candles[i].x+9},${y-bw}`).join(' '),col,0.8,'3,2');
      pl(mid.map((y,i)=>`${candles[i].x+9},${y+bw}`).join(' '),col,0.8,'3,2');
      pl(mid.map((y,i)=>`${candles[i].x+9},${y}`).join(' '),col,0.8);
      tx(candles[0].x,mid[0]-bw-4,'BB'+(cond.params?.per?'('+cond.params.per+')':''),col,6);
      const isUp=ct.includes('sup');
      cir(candles[5].x+9,mid[5]+(isUp?-bw:bw),'#00D4AA',4);
    }
    else if(cond.id==='vwap'){
      const vwY=[152,150,148,147,146,146,147,148,149,150];
      pl(vwY.map((y,i)=>`${candles[i].x+9},${y}`).join(' '),col,1.5);
      tx(candles[0].x,vwY[0]-6,'VWAP',col,6);
    }
    else if(cond.id==='sar'){
      candles.forEach((cd,i)=>{
        const above=i<5;
        const dy=above?cd.l+10:cd.h-10;
        svgEl.appendChild(hsvg('circle',{cx:cd.x+9,cy:dy,r:2,fill:above?'#EF4444':'#10B981'}));
      });
      tx(candles[0].x,candles[0].l+18,'SAR',col,6);
    }
    else if(cond.id==='hilo'){
      for(let i=0;i<10;i++){
        const sell=i<5;const y=sell?candles[i].l+8:candles[i].h-8;
        ln(candles[i].x,y,candles[i].x+18,y,sell?'#EF4444':'#10B981',1.5);
      }
      tx(candles[0].x,candles[0].l+16,'HiLo',col,6);
    }
    else if(cond.id==='prevday'){
      const maxY=125,minY=175;
      ln(5,maxY,295,maxY,'#10B981',0.8,'4,3');ln(5,minY,295,minY,'#EF4444',0.8,'4,3');
      tx(270,maxY-3,'MÁX','#10B981',5.5);tx(270,minY+8,'MÍN','#EF4444',5.5);
    }
    else if(cond.id==='hilon'){
      const levelY=up?Math.min(...candles.slice(0,7).map(c=>c.h)):Math.max(...candles.slice(0,7).map(c=>c.l));
      ln(candles[0].x,levelY,candles[7].x+18,levelY,col,1,'4,3');
      cir(candles[7].x+9,levelY,'#00D4AA',4);
      tx(candles[0].x,levelY+(up?-6:10),'N per.',col,5.5);
    }
    else if(cond.id==='fib'){
      const top=125,bot=180,rng=bot-top;
      const lvs=[{p:'38.2%',f:0.382},{p:'50%',f:0.5},{p:'61.8%',f:0.618}];
      lvs.forEach(lv=>{
        const y=bot-rng*lv.f;
        const hl=ct.includes(lv.p.replace('%',''));
        ln(5,y,295,y,hl?'#F59E0B':'#2A2A3C',hl?1:0.5,hl?'':'3,3');
        if(hl)tx(270,y-3,lv.p,'#F59E0B',5.5);
      });
    }
  });

  // Candles (drawn after overlays so they're on top)
  candles.forEach(cd=>{
    const bull=cd.c>cd.o;const col=bull?'#10B981':'#EF4444';
    const top=Math.min(cd.o,cd.c),bh=Math.max(2,Math.abs(cd.o-cd.c));
    svgEl.appendChild(hsvg('line',{x1:cd.x+9,y1:cd.h,x2:cd.x+9,y2:cd.l,stroke:col,'stroke-width':'1'}));
    svgEl.appendChild(hsvg('rect',{x:cd.x,y:top,width:'18',height:bh,rx:'1.5',fill:col,'fill-opacity':'0.85'}));
  });

  // ── Step 0: time window ──
  if(step===0){
    // Active trading zone (start → last entry)
    rc(60,0,140,chartH,'#00D4AA',0.04,0);
    // Close-only zone (last entry → end)
    rc(200,0,46,chartH,'#F59E0B',0.04,0);
    // Lines
    ln(60,0,60,chartH,'#00D4AA',1);
    ln(200,0,200,chartH,'#F59E0B',1,'3,2');
    ln(246,0,246,chartH,'#EF4444',1);
    // Labels
    tx(64,chartH+10,cfg.tStart,'#00D4AA',6.5);
    tx(168,chartH+10,cfg.tLastEntry,'#F59E0B',6.5);
    tx(218,chartH+10,cfg.tEnd,'#EF4444',6.5);
  }

  // ── Steps 1+: entry marker ──
  if(step>=1&&conds.length>0){
    // Signal candle highlight
    rc(candles[6].x-2,candles[6].h-6,22,candles[6].l-candles[6].h+12,'#00D4AA',0.06,3);
    ln(candles[6].x+9,candles[6].h-10,candles[6].x+9,candles[6].h-20,'#00D4AA',1);
    tx(candles[6].x-4,candles[6].h-22,'SINAL','#00D4AA',6,'middle');
  }

  // ── Steps 3+: stop/target ──
  if(step>=3){
    const entryY=candles[7].o;
    const stopDist=cfg.stopType==='fixed'?cfg.stopPts/15:20;
    const stopY=Math.min(entryY+stopDist,chartH-5);
    ln(candles[7].x,stopY,295,stopY,'#EF4444',1.2,'4,2');
    tx(270,stopY-3,'STOP','#EF4444',6);

    let targetY=entryY;
    if(cfg.tpType==='fixed') targetY=Math.max(entryY-cfg.tpPts/15,10);
    else if(cfg.tpType==='rr') targetY=Math.max(entryY-stopDist*cfg.tpRR,10);
    else targetY=entryY-30;
    ln(candles[7].x,targetY,295,targetY,'#10B981',1.2,'4,2');
    tx(270,targetY-3,'ALVO','#10B981',6);

    // Entry line
    ln(candles[7].x,entryY,295,entryY,'#00D4AA',1,'4,2');
    tx(270,entryY-3,'ENTR','#00D4AA',6);
  }

  // ── Step 4: trailing ──
  if(step>=4&&cfg.trailing){
    const entryY=candles[7].o;
    const pts=[0,1,2,3,4].map(i=>{
      const cd=candles[7+Math.min(i,2)];
      return `${candles[7].x+i*20},${entryY-i*4}`;
    }).join(' ');
    pl(pts,'#F59E0B',1.2,'3,2');
    tx(candles[7].x+60,entryY-22,'TRAIL','#F59E0B',5.5);
  }

  // ── Oscillator panels (below chart) ──
  let panelY=chartH+6;
  const drawOscPanel=(cond,yOff)=>{
    const col=cond.id==='macd'?'#00D4AA':'#6366F1';

    rc(60,60,180,40,'#1A1A28',0.6,8);
    tx(150,74,'Adicione condições','#8888A0',11,'middle');
    tx(150,90,'para ver o preview','#6B6B80',9,'middle');
  }

  return svgEl;
}

    else{const tl=lvs.find(l=>ct.includes(l.p.replace('%','')));if(tl){ci(160,tl.y,sc,6);if(cross)aw(176,tl.y,up,sc);}}
    tx(16,16,'FIBONACCI','#F59E0B',9);

  // ═══ CANDLE PATTERNS ═══

    if(ct.includes('martelo')&&!ct.includes('invertido')){dc(cx,42,38,34,80,20);tx(cx,96,'Martelo','#10B981',9,'middle');}
    else if(ct.includes('invertido')){dc(cx,72,76,30,80,20);tx(cx,96,'Martelo Inv.','#10B981',9,'middle');}
    else if(ct.includes('engolfo')&&up){dc(cx-18,50,62,46,66,14);dc(cx+18,66,42,38,70,20);tx(cx,96,'Engolfo Alta','#10B981',9,'middle');}
    else if(ct.includes('engolfo')){dc(cx-18,60,50,46,64,14);dc(cx+18,46,68,42,72,20);tx(cx,96,'Engolfo Baixa','#EF4444',9,'middle');}

    else if(ct.includes('manhã')){dc(cx-40,40,65,36,70,14);dc(cx,74,70,66,80,10);dc(cx+40,68,44,40,72,14);tx(cx,100,'Estrela da Manhã','#10B981',8,'middle');}
    else if(ct.includes('noite')){dc(cx-40,65,42,38,70,14);dc(cx,36,40,32,44,10);dc(cx+40,42,66,38,70,14);tx(cx,100,'Estrela da Noite','#EF4444',8,'middle');}
    else if(ct.includes('harami')&&up){dc(cx-14,38,72,34,76,22);dc(cx+14,64,50,46,68,12);tx(cx,100,'Harami Alta','#10B981',9,'middle');}
    else if(ct.includes('harami')){dc(cx-14,72,38,34,76,22);dc(cx+14,48,62,44,66,12);tx(cx,100,'Harami Baixa','#EF4444',9,'middle');}
    else if(ct.includes('marubozu')&&up){rc(cx-10,30,20,60,'#10B981',0.85,2);tx(cx,104,'Marubozu Alta','#10B981',9,'middle');}

    else if(ct.includes('spinning')){ln(cx,25,cx,95,'#F59E0B',1);rc(cx-10,52,20,16,'#F59E0B',0.85,2);tx(cx,108,'Spinning Top','#F59E0B',9,'middle');}
    else{dc(cx,50,40,34,70,20);tx(cx,96,'Padrão',sc,9,'middle');}
    return svg;
  }

  // ═══ FALLBACK ═══
  drawCds(CDS,0.5);ci(CDS[6].x+6,60,sc,6);aw(CDS[6].x+22,60,up,sc);tx(16,16,indId.toUpperCase(),'#44445A',9);

}

let modalState = { open:false, page:0, tab:'Osciladores', ind:null, params:{} };

function openModal(forExitCond=false) {
  modalState = { open:true, page:0, tab:'Osciladores', ind:null, params:{}, forExitCond };
  renderModal();
}
function closeModal() { modalState.open=false; const m=document.getElementById('modal-container'); if(m) m.remove(); }

function renderModal() {
  let existing=document.getElementById('modal-container');
  if(existing) existing.remove();
  if(!modalState.open) return;

  const ms=modalState;
  const tabs=Object.keys(INDS_BY_TAB);
  const inds=INDS_BY_TAB[ms.tab]||[];

  const modalEl=div('overlay');
  modalEl.id='modal-container';
  modalEl.addEventListener('click',e=>{if(e.target===modalEl)closeModal();});

  const modal=div('modal');

  // Header
  const hdr=div('modal-header');
  const htitle=div('');
  htitle.style.cssText='font-size:15px;font-weight:700;color:#E8E8ED';
  htitle.textContent=ms.page===0?'Adicionar Condição':'Configurar: '+ms.ind?.name;
  hdr.appendChild(htitle);
  if(ms.page===1){
    const backBtn=h('button',{class:'btnGh',onclick:()=>{ms.page=0;renderModal();}});
    backBtn.textContent='← Voltar';
    backBtn.style.marginTop='6px';
    htitle.appendChild(document.createElement('br'));
    htitle.appendChild(backBtn);
  }
  const xBtn=h('button',{class:'btnGh',onclick:closeModal});
  xBtn.innerHTML=IC.x;
  hdr.appendChild(xBtn);
  modal.appendChild(hdr);

  // Body
  const body=div('modal-body');

  if(ms.page===0) {
    // Tabs + Grid with local update
    const tabBar=div('tabs');
    const gridContainer=div('');
    gridContainer.id='modal-grid-container';

    function buildGrid(tabName){
      const inds=INDS_BY_TAB[tabName]||[];
      const grid=div('ind-grid');
      inds.forEach(ind=>{
        const card=div('card pick');
        card.style.padding='13px 15px';
        const nm=div('');nm.style.cssText='font-size:13px;font-weight:600;color:#E8E8ED;margin-bottom:4px';nm.textContent=ind.name;
        const ds=div('');ds.style.cssText='font-size:11px;color:#8888A0;line-height:1.4';ds.textContent=ind.desc;
        card.appendChild(nm);card.appendChild(ds);
        card.addEventListener('click',()=>{
          const conds=getCondsFor(ind.id);
          ms.ind=ind;
          ms.params={
            per:ind.defPer||ind.hasPer?14:undefined,
            cond:conds[0]||ind.defCond,
            val:ind.hasVal?ind.defVal:undefined
          };
          if(['sma','ema'].includes(ind.id)) ms.params.per=200;
          if(ind.id==='bb'){ ms.params.per=20; ms.params.dev=2; }
          ms.page=1;
          renderModal();
        });
        grid.appendChild(card);
      });
      return grid;
    }

    const tabBtns=[];
    tabs.forEach(t=>{
      const tb=h('button',{class:'tab'+(ms.tab===t?' on':'')});
      tb.textContent=t;
      tabBtns.push({el:tb,name:t});
      tb.addEventListener('click',()=>{
        ms.tab=t;
        tabBtns.forEach(b=>{b.el.className='tab'+(b.name===t?' on':'');});
        gridContainer.innerHTML='';
        gridContainer.appendChild(buildGrid(t));
      });
      tabBar.appendChild(tb);
    });
    body.appendChild(tabBar);
    body.style.paddingTop='16px';
    gridContainer.appendChild(buildGrid(ms.tab));
    body.appendChild(gridContainer);

  } else {
    // Config page
    const ind=ms.ind;
    const conds=getCondsFor(ind.id);
    const frag=div('');
    frag.style.cssText='display:flex;flex-direction:column;gap:20px';

    // ── Condition Preview SVG ──
    const previewWrap=div('cond-preview');
    previewWrap.id='cond-preview-wrap';
    previewWrap.appendChild(buildCondPreview(ind.id, ms.params.cond||conds[0]||''));
    frag.appendChild(previewWrap);

    if(ind.hasPer!==false && ms.params.per!==undefined) {
      const row=div('');
      row.appendChild(slabel('Período'));
      const s=stepper(ms.params.per,1,500,'',v=>{ms.params.per=v;});
      row.appendChild(s);
      frag.appendChild(row);
    }
    if(ind.id==='bb' && ms.params.dev!==undefined) {
      const row=div('');
      row.appendChild(slabel('Desvio padrão','Quantidade de desvios padrão para as bandas superior e inferior. Padrão: 2. Valores maiores = bandas mais largas.'));
      const s=stepper(ms.params.dev,1,5,'σ',v=>{ms.params.dev=v;});
      row.appendChild(s);
      frag.appendChild(row);
    }
    if(conds.length>0){
      const row=div('');
      row.appendChild(slabel('Condição'));
      const radios=[];
      conds.forEach(c=>{
        const r=div('radio-row'+(ms.params.cond===c?' on':''));
        const ring=cring(ms.params.cond===c);
        r.appendChild(ring);
        const t=div('');t.style.cssText='font-size:13px;color:#E8E8ED';t.textContent=c;
        r.appendChild(t);
        radios.push({el:r,ring,cond:c});
        r.addEventListener('click',()=>{
          ms.params.cond=c;
          radios.forEach(rd=>{
            const isOn=rd.cond===c;
            rd.el.className='radio-row'+(isOn?' on':'');
            rd.ring.className='cring'+(isOn?' on':'');
            rd.ring.innerHTML=isOn?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0A0A0F" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`:'';
          });
          // Update preview SVG
          const pw=document.getElementById('cond-preview-wrap');
          if(pw){pw.innerHTML='';pw.appendChild(buildCondPreview(ind.id,c));}
        });
        row.appendChild(r);
      });
      frag.appendChild(row);
    }
    if(ind.hasVal!==false && ms.params.val!==undefined) {
      const row=div('');
      const valLabel = ind.id==='gap' ? 'Tamanho mínimo (pontos)' : ind.id==='atr' ? 'Valor em pontos' : 'Valor de referência';
      row.appendChild(slabel(valLabel));
      const s=stepper(ms.params.val,-999,99999, ind.id==='gap'||ind.id==='atr'?'pts':'', v=>{ms.params.val=v;});
      row.appendChild(s);
      frag.appendChild(row);
    }
    body.appendChild(frag);
  }

  modal.appendChild(body);

  // Footer (page 1 only)
  if(ms.page===1){
    const foot=div('modal-footer');
    const cancelBtn=h('button',{class:'btn btnS',onclick:closeModal});cancelBtn.textContent='Cancelar';
    const confirmBtn=h('button',{class:'btn btnP',onclick:()=>{
      const newCond={id:ms.ind.id,name:ms.ind.name,params:{...ms.params}};
      if(ms.forExitCond) { state.cfg.exitCondition=newCond; }
      else { state.cfg.conditions.push(newCond); }
      closeModal();
      renderApp();
    }});
    confirmBtn.innerHTML=IC.check+' Confirmar';
    foot.appendChild(cancelBtn);foot.appendChild(confirmBtn);
    modal.appendChild(foot);
  }

  modalEl.appendChild(modal);
  document.body.appendChild(modalEl);
}

  state.animate=true;state.screen='loading';state.loadMsg=0;renderApp();

function getMetrics(){
  const A=EQ_ANALYSIS,last=EQ[EQ.length-1].v;
  return[
    {label:'Total de Trades',val:String(EQ.length),color:'#E8E8ED'},
    {label:'Taxa de Acerto',val:A.winRate.toFixed(1)+'%',color:'#F59E0B',pct:A.winRate},
    {label:'Lucro Total',val:(last>=0?'+':'')+'R$ '+Math.abs(last).toLocaleString('pt-BR'),color:last>=0?'#10B981':'#EF4444'},
    {label:'Max Drawdown',val:'−'+A.maxDDPct.toFixed(2)+'%',color:'#EF4444'},
    {label:'Profit Factor',val:A.profitFactor.toFixed(2),color:A.profitFactor>1?'#00D4AA':'#EF4444'},
    {label:'Payoff',val:A.payoff.toFixed(2),color:A.payoff>1?'#10B981':'#F59E0B'},
    {label:'Recovery Factor',val:A.recoveryFactor.toFixed(2),color:A.recoveryFactor>2?'#10B981':'#F59E0B'},
    {label:'Rentabilidade',val:((last/A.cap)*100).toFixed(2)+'%',color:last>=0?'#10B981':'#EF4444'},
  ];
}

function viewHistoryItem(id){
  const bt=MOCK_HISTORY.find(b=>b.id===id);
  if(!bt)return;
  viewingHistoryItem=bt;
  // Generate unique equity curve for this backtest
  const bias=bt.result>0?0.04:-0.02;
  EQ=generateEQ(bt.id*7919,bt.trades>200?90:bt.trades,bias);
  EQ_ANALYSIS=computeAnalysis(EQ,100000);
  state.screen='results';
  const main=document.getElementById('main');
  main.replaceChildren(renderResults());
}

function exitHistoryDetail(){
  viewingHistoryItem=null;
  // Restore default EQ
  EQ=(()=>{let v=0,peak=0;return DEFAULT_EQ_DATA.map((x,i)=>{v+=x;if(v>peak)peak=v;const yr=2019+Math.floor(i/12),mo=i%12;return{v:Math.round(v),dd:Math.round(Math.min(0,v-peak)),pnl:x,t:(new Date(yr,mo)).toLocaleDateString('pt-BR',{month:'short'}).replace('.','')+" '"+String(yr).slice(2)};});})();
  EQ_ANALYSIS=computeAnalysis(EQ,100000);
  showScreen('history');
}

// ─── PROGRESS BAR ─────────────────────────────────────────────
function renderProgressBar() {
  const pb=document.getElementById('prog-bar');
  pb.innerHTML='';
  if(state.screen!=='wizard') {
    const lbl=div('');lbl.style.cssText='font-size:13px;color:#8888A0;font-weight:500';
    lbl.textContent=state.screen==='confirm'?'Confirmar estratégia':state.screen==='loading'?'Processando...':'Resultado do backtest';
    pb.appendChild(lbl);return;
  }
  STEPS.forEach((s,i)=>{
    const done=i<state.maxDone;const active=i===state.step;
    const btn_=h('button',{class:'prog-step',disabled:i>state.maxDone});
    btn_.addEventListener('click',()=>{if(i<=state.maxDone&&i!==state.step){if(i>1&&state.cfg.conditions.length===0)return;state.dir=i>state.step?'fwd':'bwd';state.animate=true;state.step=i;renderApp();}});
    const circle=div('prog-circle'+(done?' done':active?' active':''));
    if(done) circle.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    else circle.innerHTML=IC[s.icon]||'';
    if(circle.querySelector('svg')){const sv=circle.querySelector('svg');sv.style.color=active?'#0A0A0F':done?'white':'#44445A';}
    const label=div('prog-label'+(done?' done':active?' active':''));label.textContent=s.label;
    btn_.append(circle,label);
    pb.appendChild(btn_);
    if(i<STEPS.length-1){const line=div('prog-line'+(done?' done':''));pb.appendChild(line);}
  });
}

  if(state.screen==='loading'){main.replaceChildren(renderLoading());state.animate=false;return;}

  if(state.screen==='results'){main.replaceChildren(renderResults());state.animate=false;return;}

  // Wizard
  const two=div('two-col');

  // Left: form
  const left=div('');
  // Step header
  const hdr=div('step-hdr');
  const ic=div('step-icon');

  const info=div('');

  const s=div('step-sub');s.textContent=STEP_SUBS[state.step];
  info.append(t,s);hdr.append(ic,info);left.appendChild(hdr);

  // Step content
  const stepRenderers=[renderStep1,renderStep2,renderStep3,renderStep4,renderStep5];

  // Nav
  const nav=div('nav-footer');

  if(state.step===0) backBtn.style.visibility='hidden';

  const fwdBtn=h('button',{class:'btn btnP',onclick:()=>{
    if(state.step<4){state.dir='fwd';state.animate=true;if(state.step>=state.maxDone)state.maxDone=state.step+1;state.step++;renderApp();}
    else{state.animate=true;state.screen='confirm';renderApp();}
  }});
  if(state.step<4) fwdBtn.innerHTML='Avançar '+IC.fwd;
  else fwdBtn.innerHTML='Confirmar estratégia '+IC.fwd;
  if(state.step===1 && state.cfg.conditions.length===0){fwdBtn.disabled=true;fwdBtn.style.opacity='0.35';fwdBtn.style.cursor='not-allowed';fwdBtn.style.pointerEvents='none';}

  nav.append(backBtn,fwdBtn);left.appendChild(nav);
  two.appendChild(left);

  // Right: preview panel
  const right=div('side-panel');right.style.cssText='position:sticky;top:72px';
  const previewCard=div('card');previewCard.style.padding='16px 18px';

  previewCard.appendChild(pLabel);
  previewCard.appendChild(buildPreview(state.step,state.cfg));

  // Mini summary
  const summ=div('');summ.style.cssText='margin-top:14px;border-top:1px solid #2A2A3C;padding-top:13px;display:flex;flex-direction:column;gap:6px';
  const pending='a definir';
  const md=state.maxDone, sc2=state.cfg;
  const summRows=[
    ['Ativo', sc2.asset+' · '+sc2.tf],
    ['Janela', sc2.tStart+' → '+sc2.tLastEntry+' → '+sc2.tEnd],
    ['Condições', md>=1?(sc2.conditions.length===0?'Nenhuma':sc2.conditions.length+' condição'+(sc2.conditions.length>1?'ões':'')):pending],
    ['Gatilho', md>=2?((sc2.direction==='long'?'Compra':sc2.direction==='short'?'Venda':'Ambos')+' · '+{breakout:'Rompimento',next_open:'Próx. abertura',sig_close:'Fechamento'}[sc2.entryType]):pending],
    ['Stop', md>=3?({fixed:sc2.stopPts+' pts',hl_candle:'Candle signal',n_candles:sc2.stopCandles+' candles'}[sc2.stopType]):pending],
    ['Alvo', md>=3?({fixed:sc2.tpPts+' pts',rr:sc2.tpRR+'× risco',fib_ext:'Fibo '+sc2.tpFibLevel+'%',none:'Por gestão'}[sc2.tpType]):pending],
  ];
  summRows.forEach(([k,v])=>{
    const r=div('');r.style.cssText='display:flex;justify-content:space-between';
    const kEl=div('');kEl.style.cssText='font-size:11px;color:#6B6B80';kEl.textContent=k;
    const vEl=div('');
    const isPending=v===pending;
    vEl.style.cssText=`font-size:11px;font-family:JetBrains Mono;${isPending?'color:#3A3A52;font-style:italic':'color:#E8E8ED'}`;
    vEl.textContent=v;
    r.append(kEl,vEl);summ.appendChild(r);
  });
  previewCard.appendChild(summ);
  right.appendChild(previewCard);
  two.appendChild(right);

  main.replaceChildren(two);
  state.animate=false;
}

async function loadSubscription(accessToken) {
  const now = new Date().toISOString();
  const res = await fetch(`${SUPA_URL}/rest/v1/subscriptions?select=*&user_id=eq.${currentUser.id}&status=eq.active&expires_at=gt.${encodeURIComponent(now)}&order=expires_at.desc&limit=1`, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${accessToken}`,
      'Content-Type': 'application/json',
    }
  });
  if (!res.ok) { console.error('subscriptions error:', res.status); currentSub = null; return; }
  const data = await res.json();
  currentSub = (Array.isArray(data) && data.length > 0) ? data[0] : null;
  console.log('subscription:', currentSub);
}

      <button class="pay-method-btn${payMethod==='debit_card'?' active':''}" onclick="switchPayMethod('debit_card',this)">Débito</button>
    </div>
    <div class="pay-error" id="pay-error"></div>
    <div id="pix-form-area" style="display:${payMethod==='pix'?'block':'none'}">
      <button class="pay-btn" id="pay-submit-pix" onclick="submitPix()">Gerar QR Code Pix</button>
    </div>
    <div id="cardPaymentBrick_container" style="display:${payMethod!=='pix'?'block':'none'}"></div>
    <div class="pay-secure">🔒 Pagamento seguro via Mercado Pago</div>`;

  if (payMethod !== 'pix') {
    setTimeout(() => initCardBrick(), 50);
  }
  return el;
}

function switchPayMethod(method, btnEl) {
  document.querySelectorAll('.pay-method-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  const pixArea = document.getElementById('pix-form-area');
  const cardContainer = document.getElementById('cardPaymentBrick_container');
  if (method === 'pix') {
    payMethod = 'pix';
    if (pixArea) pixArea.style.display = 'block';
    if (cardContainer) cardContainer.style.display = 'none';
  } else {
    const needsRemount = payMethod !== method || !mpMounted;
    payMethod = method;
    if (pixArea) pixArea.style.display = 'none';
    if (cardContainer) cardContainer.style.display = 'block';
    if (needsRemount) {
      // Destroy and recreate Brick with correct card type
      if (window.cardPaymentBrickController) { try { window.cardPaymentBrickController.unmount(); } catch(e){} window.cardPaymentBrickController = null; }
      mpMounted = false;
      if (cardContainer) cardContainer.innerHTML = '';
      initCardBrick();
    }
  }
}

function initCardBrick() {
  if (!window.MercadoPago) {
    const s = document.createElement('script');
    s.src = 'https://sdk.mercadopago.com/js/v2';
    s.onload = () => setTimeout(renderCardBrick, 200);
    document.head.appendChild(s);
  } else {
    renderCardBrick();
  }
}

async function renderCardBrick() {
  const container = document.getElementById('cardPaymentBrick_container');
  if (!container) return;
  if (mpMounted) return;
  mpMounted = true;
  const price = PRICES[selectedPlan][selectedCycle];
  try {
    mpInstance = new MercadoPago(MP_PUBLIC_KEY, { locale: 'pt-BR' });
    const bricksBuilder = mpInstance.bricks();
    window.cardPaymentBrickController = await bricksBuilder.create('cardPayment', 'cardPaymentBrick_container', {
      initialization: {
        amount: price,
        payer: {
          email: currentUser.email,
        },
      },
      customization: {
        visual: {
          style: {
            theme: 'dark',
            customVariables: {
              formBackgroundColor: '#12121A',
              baseColor: '#00D4AA',
            }
          },
          hideFormTitle: true,
          hidePaymentButton: false,
        },
        paymentMethods: {
          maxInstallments: payMethod === 'credit_card' ? 12 : 1,
          ...(payMethod === 'credit_card' ? { debitCard: 'none' } : { creditCard: 'none' }),
        },
      },
      callbacks: {
        onReady: () => { console.log('MP: Card Payment Brick ready'); },
        onSubmit: async (formData) => {
          console.log('MP Brick formData:', JSON.stringify(formData));
          try {
            const { data: { session } } = await db.auth.getSession();
            const res = await fetch(`${SUPA_URL}/functions/v1/create-payment`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
              body: JSON.stringify({
                plan: selectedPlan,
                cycle: selectedCycle,
                payment_type: payMethod,
                payment_method_id: formData.payment_method_id,
                token: formData.token,
                issuer_id: formData.issuer_id || null,
                installments: formData.installments || 1,
                payer: {
                  email: currentUser.email,
                  identification: formData.payer?.identification || { type:'CPF', number:'' },
                },
              }),
            });
            const data = await res.json();
            if (!res.ok || data.error) { showPayError(data.error||'Erro no pagamento.'); return; }
            if (data.status==='approved') {
              const { data: { session: s } } = await db.auth.getSession();
              await loadSubscription(s.access_token);
              updateAvatarUI();
              showPaySuccess();
            } else {
              showPayError('Pagamento recusado. Verifique os dados ou tente outro método.');
            }
          } catch(e) { console.error('Payment error:', e); showPayError('Erro ao processar pagamento.'); }
        },
        onError: (error) => { console.error('MP Brick error:', error); },
      },
    });
    console.log('MP: Card Payment Brick created');
  } catch(e) { console.error('MP Brick init error:', e); }
}

let tourActive=false, tourStepIdx=0, tourCurrentSteps=[];

function startTour(steps){
  if(!steps||!steps.length)return;
  tourActive=true;tourStepIdx=0;tourCurrentSteps=steps;
  showTourStep();
}

function startTourForCurrentScreen(){
  if(state.screen==='wizard') startTour(TOUR_STEPS.wizard);
  else if(state.screen==='results') startTour(TOUR_STEPS.results);
  else if(currentScreen==='history') startTour(TOUR_STEPS.history);
}

function showTourStep(){
  clearTour();
  if(tourStepIdx>=tourCurrentSteps.length){endTour();return;}
  const step=tourCurrentSteps[tourStepIdx];
  const target=document.querySelector(step.sel);
  if(!target){tourStepIdx++;showTourStep();return;}

  // Backdrop
  const backdrop=div('tour-backdrop');
  backdrop.id='tour-backdrop';
  backdrop.addEventListener('click',endTour);
  document.body.appendChild(backdrop);

  // Highlight
  const rect=target.getBoundingClientRect();
  const highlight=div('tour-highlight');
  highlight.id='tour-highlight';
  highlight.style.cssText=`position:fixed;left:${rect.left-4}px;top:${rect.top-4}px;width:${rect.width+8}px;height:${rect.height+8}px`;
  document.body.appendChild(highlight);

  // Ensure target is visible above backdrop
  target.style.position=target.style.position||'relative';
  target.style.zIndex='901';
  target.dataset.tourRestore='1';

  // Tooltip
  const tooltip=div('tour-tooltip');
  tooltip.id='tour-tooltip';

  const titleEl=div('tour-tooltip-title');
  titleEl.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="3"/></svg> ${step.title}`;
  const bodyEl=div('tour-tooltip-body');bodyEl.textContent=step.body;

  const footer=div('tour-tooltip-footer');
  const counter=div('tour-tooltip-counter');counter.textContent=`${tourStepIdx+1} de ${tourCurrentSteps.length}`;
  const btns=div('tour-tooltip-btns');
  const skipBtn=h('button',{class:'tour-skip',onclick:endTour});skipBtn.textContent='Pular';
  const nextBtn=h('button',{class:'tour-next',onclick:nextTourStep});
  nextBtn.textContent=tourStepIdx<tourCurrentSteps.length-1?'Próximo':'Entendi!';
  btns.append(skipBtn,nextBtn);footer.append(counter,btns);

  // Arrow
  const arrow=div('tour-arrow');

  tooltip.append(titleEl,bodyEl,footer);
  document.body.appendChild(tooltip);

  // Position tooltip
  const ttRect=tooltip.getBoundingClientRect();
  let left=rect.left, top;
  if(step.pos==='bottom'||!step.pos){
    top=rect.bottom+12;
    arrow.className='tour-arrow tour-arrow-bottom';
    tooltip.appendChild(arrow);
  } else {
    top=rect.top-ttRect.height-12;
    arrow.className='tour-arrow tour-arrow-top';
    tooltip.appendChild(arrow);
  }
  // Keep within viewport
  if(left+ttRect.width>window.innerWidth-16) left=window.innerWidth-ttRect.width-16;
  if(left<16) left=16;
  if(top<8) {top=rect.bottom+12;arrow.className='tour-arrow tour-arrow-bottom';}
  if(top+ttRect.height>window.innerHeight-8){top=rect.top-ttRect.height-12;arrow.className='tour-arrow tour-arrow-top';}

  tooltip.style.left=left+'px';tooltip.style.top=top+'px';tooltip.style.position='fixed';
}

function nextTourStep(){tourStepIdx++;showTourStep();}

function clearTour(){
  document.getElementById('tour-backdrop')?.remove();
  document.getElementById('tour-highlight')?.remove();
  document.getElementById('tour-tooltip')?.remove();
  document.querySelectorAll('[data-tour-restore]').forEach(el=>{el.style.zIndex='';delete el.dataset.tourRestore;});
}

function endTour(){
  clearTour();tourActive=false;tourStepIdx=0;tourCurrentSteps=[];
  try{localStorage.setItem('bt_tour_done','1');}catch(e){}
}

function maybeAutoTour(){
  try{if(localStorage.getItem('bt_tour_done'))return;}catch(e){}
  setTimeout(()=>{if(state.screen==='wizard')startTour(TOUR_STEPS.wizard);},600);
}

async function handleAuth(mode) {
  const email=document.getElementById('auth-email')?.value?.trim();
  const pass=document.getElementById('auth-pass')?.value;
  const name=document.getElementById('auth-name')?.value?.trim();
  const btn=document.getElementById('auth-submit');

  if(!email||!pass){errEl.textContent='Preencha e-mail e senha.';errEl.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Aguarde...';
  let result;
  if(mode==='login') result=await db.auth.signInWithPassword({email,password:pass});
  else result=await db.auth.signUp({email,password:pass,options:{data:{full_name:name||email.split('@')[0]}}});
  if(result.error){
    const msgs={'Invalid login credentials':'E-mail ou senha incorretos.','User already registered':'E-mail já cadastrado. Faça login.','Password should be at least 6 characters':'Senha deve ter pelo menos 6 caracteres.'};
    errEl.textContent=msgs[result.error.message]||result.error.message;errEl.classList.add('show');
    btn.disabled=false;btn.textContent=mode==='login'?'Entrar':'Criar conta';return;
  }
  if(mode==='signup'&&!result.data.session){
    document.getElementById('auth-overlay')?.remove();
    alert('Verifique seu e-mail para confirmar o cadastro.');
    showAuthModal('login');return;
  }
  // Login bem sucedido — onAuthStateChange vai cuidar do resto
}

// ─── BOOT ─────────────────────────────────────────────────────
// Único ponto de entrada de sessão — onAuthStateChange
let currentScreen = null; // Track current screen to prevent auth override

db.auth.onAuthStateChange(async (event, session) => {
  console.log('auth event:', event, session?.user?.email||'no user');
  if (event === 'SIGNED_IN' && session?.user) {
    currentUser = session.user;
    await loadSubscription(session.access_token);
    updateAvatarUI();
    document.getElementById('auth-overlay')?.remove();
    // Don't override if user is already on plans/payment screens
    if (currentScreen === 'plans' || currentScreen === 'payment' || currentScreen === 'history') return;
    if (currentSub) { renderApp(); } else { showScreen('nosub'); }
  }
  if (event === 'INITIAL_SESSION') {
    if (session?.user) {
      currentUser = session.user;
      await loadSubscription(session.access_token);
      updateAvatarUI();
      if (currentSub) { renderApp(); maybeAutoTour(); } else { showScreen('nosub'); }
    } else {
      showAuthModal('login');
    }
  }
  if (event === 'SIGNED_OUT') {
    currentUser=null; currentSub=null; currentScreen=null;
    showAuthModal('login');
  }
});
</script>
