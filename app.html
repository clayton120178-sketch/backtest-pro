}

function buildCondPreview(indId, condText, params={}) {
  const W=280,H=120;
  const TH=svgTheme();
  const svg=hsvg('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`});
  svg.appendChild(hsvg('rect',{x:0,y:0,width:W,height:H,rx:6,fill:TH.bg}));
  const ct=condText.toLowerCase();
  const up=ct.includes('acima')||ct.includes('sup')||ct.includes('alta')||ct.includes('subindo')||ct.includes('compra')||ct.includes('maior')||ct.includes('manhã');
  const cross=ct.includes('cruza')||ct.includes('rompe')||ct.includes('virou')||ct.includes('sai');
  const touch=ct.includes('toca');
  const sc=up?'#10B981':'#EF4444';
  const ln=(x1,y1,x2,y2,c,w,d)=>{const a={x1,y1,x2,y2,stroke:c,'stroke-width':w||0.5};if(d)a['stroke-dasharray']=d;svg.appendChild(hsvg('line',a));};
  const pl=(p,c,w,d)=>{const a={points:p,fill:'none',stroke:c,'stroke-width':w||1};if(d)a['stroke-dasharray']=d;svg.appendChild(hsvg('polyline',a));};
  const rc=(x,y,w,h,c,o,r)=>svg.appendChild(hsvg('rect',{x,y,width:w,height:h,fill:c,'fill-opacity':o!=null?o:1,rx:r||0}));
  const ci=(x,y,c,r)=>svg.appendChild(hsvg('circle',{cx:x,cy:y,r:r||3,fill:c,'fill-opacity':0.2,stroke:c,'stroke-width':1}));
  const tx=(x,y,t,c,s,a)=>{const e=hsvg('text',{x,y,fill:c,'font-size':s||7,'font-family':'JetBrains Mono','font-weight':500,'text-anchor':a||'start'});e.textContent=t;svg.appendChild(e);};
  const pa=(d,c,o)=>svg.appendChild(hsvg('path',{d,fill:c,'fill-opacity':o||0.1}));
  const aw=(x,y,isUp,c)=>{const d=isUp?-1:1;ln(x,y+d*2,x,y+d*8,c,1);pl(`${x-2},${y+d*6} ${x},${y+d*9} ${x+2},${y+d*6}`,c,1);};
  const badge=(x,y,t,c,s,a)=>{const fs=s||7;const tw=t.length*(fs*0.56);const ax=a==='end'?x-tw-2:a==='middle'?x-tw/2-1:x-1;rc(ax,y-fs+1,tw+2,fs+2,TH.badgeBg,0.92,2);tx(x,y,t,c,fs,a);};
  // 16 thin candles
  const CDS=[];const n=16;const cw=5;const sp=(W-20)/n;
  const prices=[52,48,54,50,56,60,58,64,68,66,62,58,54,50,46,42];
  for(let i=0;i<n;i++){const o=prices[i],c=i<n-1?prices[i+1]:prices[i]-4;const hi=Math.min(o,c)-2-Math.random()*4;const lo=Math.max(o,c)+2+Math.random()*4;CDS.push({x:10+i*sp,o,c,h:hi,l:lo,w:cw});}
  const drawCds=(data,op)=>{data.forEach(cd=>{const bull=cd.c<cd.o;const col=bull?'#10B981':'#EF4444';ln(cd.x+cd.w/2,cd.h,cd.x+cd.w/2,cd.l,col,0.5);const top=Math.min(cd.o,cd.c),bh=Math.max(1,Math.abs(cd.o-cd.c));rc(cd.x,top,cd.w,bh,col,op!=null?op:0.8,0.5);});};
  // Grid
  for(let y=30;y<H;y+=30)ln(6,y,W-6,y,TH.grid,0.4);

  // ═══ OSCILLATORS ═══
  if(['rsi','stoch','cci','williams','adx','atr'].includes(indId)){
    const labels={rsi:'RSI',stoch:'STOCH',cci:'CCI',williams:'W%R',adx:'ADX',atr:'ATR'};
    // Position threshold proportionally to val
    const val=params.val!=null?params.val:(up?70:30);
    const isWide=['cci','williams'].includes(indId);
    const range=isWide?400:100;
    const min=isWide?-200:0;
    const frac=1-((val-min)/range);
    const threshY=Math.max(15,Math.min(H-15, 15+frac*(H-30)));
    ln(12,threshY,W-12,threshY,'#F59E0B',0.6,'3,3');
    tx(W-8,threshY-3,String(val),'#F59E0B',6,'end');
    const oscY=[];for(let i=0;i<n;i++){oscY.push(up?82-Math.sin((i/n)*Math.PI)*56:30+Math.sin((i/n)*Math.PI)*56);}
    pl(oscY.map((y,i)=>`${CDS[i].x+cw/2},${y}`).join(' '),'#6366F1',1.2);
    const si=Math.floor(n*0.6);
    if(cross||touch){ci(CDS[si].x+cw/2,oscY[si],sc,4);aw(CDS[si].x+cw/2+10,oscY[si],up,sc);}
    else{let d=`M${CDS[si].x+cw/2},${threshY}`;for(let i=si;i<n;i++)d+=` L${CDS[i].x+cw/2},${oscY[i]}`;d+=` L${CDS[n-1].x+cw/2},${threshY} Z`;pa(d,sc,0.15);}
    tx(10,14,labels[indId],TH.txm,8);
    return svg;
  }

  // ═══ MOVING AVERAGES ═══
  if(['sma','ema'].includes(indId)){
    drawCds(CDS,0.4);
    const maCrossover=ct.includes('longa')||ct.includes('cruzamento de médias');
    if(maCrossover){
      const isBoth=ct.includes('cruzamento de médias');
      const shortMA=CDS.map((_,i)=>{const mid=H/2;return mid+Math.cos((i-n/2)*0.4)*(H/2-12);});
      const longMA=CDS.map((_,i)=>{const mid=H/2+3;return mid+Math.sin((i-4)*0.1)*8;});
      pl(CDS.map((c,i)=>`${c.x+cw/2},${shortMA[i]}`).join(' '),'#00D4AA',1.2);
      pl(CDS.map((c,i)=>`${c.x+cw/2},${longMA[i]}`).join(' '),'#F59E0B',1.2,'3,3');
      let cx1=Math.floor(n/3);for(let i=1;i<n;i++){if((shortMA[i-1]-longMA[i-1])*(shortMA[i]-longMA[i])<=0){cx1=i;break;}}
      ci(CDS[cx1].x+cw/2,(shortMA[cx1]+longMA[cx1])/2,isBoth?'#10B981':sc,4);
      if(isBoth){let cx2=n-1;for(let i=cx1+2;i<n;i++){if((shortMA[i-1]-longMA[i-1])*(shortMA[i]-longMA[i])<=0){cx2=i;break;}}ci(CDS[cx2].x+cw/2,(shortMA[cx2]+longMA[cx2])/2,'#EF4444',4);}
      tx(10,14,'CURTA','#00D4AA',7);tx(52,14,'LONGA','#F59E0B',7);
    } else {
      drawCds(CDS,0.5);
      const maY=CDS.map((_,i)=>{const mid=H/2+5;return mid+Math.sin((i-3)*0.25)*18;});
      pl(CDS.map((c,i)=>`${c.x+cw/2},${maY[i]}`).join(' '),'#F59E0B',1.2);
      const si=Math.floor(n*0.55);
      if(cross){ci(CDS[si].x+cw/2,maY[si],sc,4);aw(CDS[si].x+cw/2+10,maY[si],up,sc);}
      else{const s=up?si:0,e=up?n-1:si;let d=`M${CDS[s].x+cw/2},${maY[s]}`;for(let i=s;i<=e;i++)d+=` L${CDS[i].x+cw/2},${(CDS[i].o+CDS[i].c)/2}`;d+=` L${CDS[e].x+cw/2},${maY[e]}`;for(let i=e;i>=s;i--)d+=` L${CDS[i].x+cw/2},${maY[i]}`;d+=' Z';pa(d,sc,0.12);}
      tx(10,14,indId.toUpperCase(),'#F59E0B',8);
    }
    return svg;
  }

  // ═══ BOLLINGER BANDS ═══
  if(indId==='bb'){
    drawCds(CDS,0.4);
    const dev=params.dev||2;
    const bw=5+dev*3.5; // dev 1→8.5, dev 2→12, dev 3→15.5
    const mid=CDS.map(c=>(c.o+c.c)/2);
    let bp=`M${CDS[0].x+cw/2},${mid[0]-bw}`;for(let i=1;i<n;i++)bp+=` L${CDS[i].x+cw/2},${mid[i]-bw}`;for(let i=n-1;i>=0;i--)bp+=` L${CDS[i].x+cw/2},${mid[i]+bw}`;bp+=' Z';
    pa(bp,'#6366F1',0.06);
    pl(CDS.map((c,i)=>`${c.x+cw/2},${mid[i]-bw}`).join(' '),'#6366F1',0.6,'2,2');
    pl(CDS.map((c,i)=>`${c.x+cw/2},${mid[i]+bw}`).join(' '),'#6366F1',0.6,'2,2');
    pl(CDS.map((c,i)=>`${c.x+cw/2},${mid[i]}`).join(' '),'#6366F1',0.5);
    const isUpper=ct.includes('sup');const si=8;const bandY=isUpper?mid[si]-bw:mid[si]+bw;
    ci(CDS[si].x+cw/2,bandY,sc,4);
    tx(10,14,`BOLLINGER (${dev}σ)`,'#6366F1',7);
    return svg;
  }

  // ═══ VWAP ═══
  if(indId==='vwap'){
    drawCds(CDS,0.4);
    const vwY=CDS.map((_,i)=>{const mid=H/2+4;return mid+Math.sin((i-2)*0.15)*10;});
    pl(CDS.map((c,i)=>`${c.x+cw/2},${vwY[i]}`).join(' '),'#F59E0B',1.2);
    const si=Math.floor(n*0.55);
    if(cross){ci(CDS[si].x+cw/2,vwY[si],sc,4);aw(CDS[si].x+cw/2+10,vwY[si],up,sc);}
    else{const s=up?si:0,e=up?n-1:si;let d=`M${CDS[s].x+cw/2},${vwY[s]}`;for(let i=s;i<=e;i++)d+=` L${CDS[i].x+cw/2},${(CDS[i].o+CDS[i].c)/2}`;d+=` L${CDS[e].x+cw/2},${vwY[e]}`;for(let i=e;i>=s;i--)d+=` L${CDS[i].x+cw/2},${vwY[i]}`;d+=' Z';pa(d,sc,0.12);}
    tx(10,14,'VWAP','#F59E0B',8);
    return svg;
  }

  // ═══ MACD ═══
  if(indId==='macd'){
    const zero=60;ln(12,zero,W-12,zero,'#2A2A3C',0.5);
    const hist=[];for(let i=0;i<n;i++)hist.push(Math.sin((i/n)*Math.PI*2-1)*18);
    const bw=(W-24)/n;
    hist.forEach((v,i)=>{const x=12+i*bw,hgt=Math.abs(v),y=v<0?zero:zero-hgt;rc(x,y,bw-1,hgt,v>=0?'#10B981':'#EF4444',0.5,0.5);});
    const macdY=hist.map(v=>zero-v*1.2);pl(macdY.map((y,i)=>`${12+i*bw+bw/2},${y}`).join(' '),'#00D4AA',1);
    const sigY=hist.map((v,i)=>zero-Math.sin(((i-1)/n)*Math.PI*2-1)*14);pl(sigY.map((y,i)=>`${12+i*bw+bw/2},${y}`).join(' '),'#EF4444',0.8,'2,2');
    const isZero=ct.includes('zero');
    if(!isZero){const si=Math.floor(n*0.4);ci(12+si*bw+bw/2,macdY[si],sc,4);}
    tx(10,14,'MACD','#00D4AA',8);tx(W-35,14,'Signal','#EF4444',6);
    return svg;
  }

  // ═══ SAR ═══
  if(indId==='sar'){
    drawCds(CDS,0.4);
    const flip=Math.floor(n/2);
    CDS.forEach((cd,i)=>{const above=i<flip;const dy=above?cd.h-4:cd.l+4;svg.appendChild(hsvg('circle',{cx:cd.x+cw/2,cy:dy,r:1.5,fill:above?'#EF4444':'#10B981'}));});
    if(cross){ci(CDS[flip].x+cw/2,CDS[flip].l+4,sc,4);}
    tx(10,14,'SAR','#F59E0B',8);
    return svg;
  }

  // ═══ HILO ═══
  if(indId==='hilo'){
    drawCds(CDS,0.4);
    const flip=Math.floor(n/2);
    for(let i=0;i<n;i++){const sell=i<flip;const y=sell?CDS[i].h-3:CDS[i].l+3;ln(CDS[i].x,y,CDS[i].x+cw,y,sell?'#EF4444':'#10B981',1);}
    ci(CDS[flip].x+cw/2,CDS[flip].l+3,sc,4);
    tx(10,14,'HILO','#F59E0B',8);
    return svg;
  }





  // ═══ RANGE ═══
  if(indId==='range'){
    const cds2=[];for(let i=0;i<8;i++){const o=40+Math.random()*30,c=40+Math.random()*30,hi=Math.min(o,c)-3-Math.random()*8,lo=Math.max(o,c)+3+Math.random()*8;cds2.push({x:20+i*32,o,c,h:hi,l:lo,w:6});}
    drawCds(cds2,0.5);
    const tgt=up?2:5;const mx=cds2[tgt].x+cds2[tgt].w+3;
    ln(mx,cds2[tgt].h,mx,cds2[tgt].l,'#F59E0B',0.8);ln(mx-2,cds2[tgt].h,mx+2,cds2[tgt].h,'#F59E0B',0.6);ln(mx-2,cds2[tgt].l,mx+2,cds2[tgt].l,'#F59E0B',0.6);
    tx(10,14,'RANGE',TH.txm,8);
    return svg;
  }

  // ═══ HILON ═══
  if(indId==='hilon'){
    drawCds(CDS,0.4);const isMax=up;
    const lY=isMax?Math.min(...CDS.slice(0,10).map(c=>c.h)):Math.max(...CDS.slice(0,10).map(c=>c.l));
    ln(CDS[0].x,lY,CDS[10].x+cw,lY,sc,0.8,'3,3');
    ci(CDS[10].x+cw/2,lY,sc,4);
    tx(10,14,'MÁX/MÍN N',TH.txm,8);
    return svg;
  }

  // ═══ GAP ═══
  if(indId==='gap'){
    const pre=[];for(let i=0;i<4;i++){const o=50+i*5,c=52+i*5;pre.push({x:15+i*18,o,c,h:o-3,l:c+3,w:5});}
    drawCds(pre,0.5);
    if(up){const post=[];for(let i=0;i<4;i++){const o=40-i*4,c=38-i*4;post.push({x:130+i*18,o,c,h:o-3,l:c+3,w:5});}drawCds(post,0.5);rc(100,40,28,24,'#10B981',0.08,3);tx(114,54,'GAP','#10B981',7,'middle');}
    else{const post=[];for(let i=0;i<4;i++){const o=80+i*4,c=82+i*4;post.push({x:130+i*18,o,c,h:o-3,l:c+3,w:5});}drawCds(post,0.5);rc(100,64,28,20,'#EF4444',0.08,3);tx(114,76,'GAP','#EF4444',7,'middle');}
    tx(10,14,'GAP',TH.txm,8);
    return svg;
  }

  // ═══ PREVDAY ═══
  if(indId==='prevday'){
    drawCds(CDS,0.4);const maxY=25,minY=95;
    ln(10,maxY,W-10,maxY,'#10B981',0.6,'3,3');ln(10,minY,W-10,minY,'#EF4444',0.6,'3,3');
    tx(W-8,maxY-2,'MÁX','#10B981',6,'end');tx(W-8,minY+8,'MÍN','#EF4444',6,'end');
    tx(10,14,'DIA ANT',TH.txm,8);
    return svg;
  }

  // ═══ FIBONACCI ═══
  if(indId==='fib'){
    const top=18,bot=100,rng=bot-top;
    const lvs=[{p:'0%',y:bot},{p:'23.6%',y:bot-rng*0.236},{p:'38.2%',y:bot-rng*0.382},{p:'50%',y:bot-rng*0.5},{p:'61.8%',y:bot-rng*0.618},{p:'78.6%',y:bot-rng*0.786},{p:'100%',y:top}];
    pl(`25,${top} 70,${top} 110,${bot} 160,${bot}`,TH.txm,0.6);
    lvs.forEach(lv=>{const hl=ct.includes(lv.p.replace('%',''));ln(90,lv.y,W-10,lv.y,hl?'#F59E0B':TH.grid,hl?0.8:0.3,hl?'':'2,2');tx(W-6,lv.y-2,lv.p,hl?'#F59E0B':TH.txm,6,'end');});
    if(ct.includes('zona')){const zt=bot-rng*0.618,zb=bot-rng*0.5;rc(90,zt,W-100,zb-zt,sc,0.1,3);}
    else{const tl=lvs.find(l=>ct.includes(l.p.replace('%','')));if(tl){ci(140,tl.y,sc,4);}}
    tx(10,14,'FIBONACCI','#F59E0B',8);
    return svg;
  }

  // ═══ CANDLE PATTERNS ═══
  if(indId==='candle'){
    const cx=W/2,cy=H/2;
    const dc=(x,o,c,h,l,w)=>{const bull=c<o;const col=bull?'#10B981':'#EF4444';ln(x,h,x,l,col,0.6);const top=Math.min(o,c),bh=Math.max(1,Math.abs(o-c));rc(x-w/2,top,w,bh,col,0.8,0.5);};
    if(ct.includes('martelo')&&!ct.includes('invertido')){dc(cx,44,40,36,76,8);tx(cx,92,'Martelo','#10B981',8,'middle');}
    else if(ct.includes('invertido')){dc(cx,70,74,32,78,8);tx(cx,92,'Martelo Inv.','#10B981',8,'middle');}
    else if(ct.includes('engolfo')&&up){dc(cx-12,48,58,44,62,6);dc(cx+12,62,42,38,66,10);tx(cx,92,'Engolfo Alta','#10B981',8,'middle');}
    else if(ct.includes('engolfo')){dc(cx-12,58,48,44,62,6);dc(cx+12,44,64,40,68,10);tx(cx,92,'Engolfo Baixa','#EF4444',8,'middle');}
    else if(ct.includes('doji')&&!ct.includes('manhã')&&!ct.includes('noite')){ln(cx,30,cx,82,Y,0.6);rc(cx-6,55,12,2,Y,0.8,0.5);tx(cx,98,'Doji',Y,8,'middle');}
    else if(ct.includes('manhã')){dc(cx-30,38,60,34,64,6);dc(cx,68,66,62,72,5);dc(cx+30,64,42,38,68,6);tx(cx,96,ct.includes('doji')?'Doji Manhã':'Estrela Manhã','#10B981',7,'middle');}
    else if(ct.includes('noite')){dc(cx-30,60,40,36,64,6);dc(cx,36,40,32,42,5);dc(cx+30,40,62,36,66,6);tx(cx,96,ct.includes('doji')?'Doji Noite':'Estrela Noite','#EF4444',7,'middle');}
    else if(ct.includes('harami')&&up){dc(cx-8,36,68,32,72,10);dc(cx+8,60,48,44,64,5);tx(cx,92,'Harami Alta','#10B981',8,'middle');}
    else if(ct.includes('harami')){dc(cx-8,68,36,32,72,10);dc(cx+8,46,58,42,62,5);tx(cx,92,'Harami Baixa','#EF4444',8,'middle');}
    else if(ct.includes('marubozu')&&up){rc(cx-4,30,8,50,'#10B981',0.8,0.5);tx(cx,96,'Marubozu Alta','#10B981',8,'middle');}
    else if(ct.includes('marubozu')){rc(cx-4,30,8,50,'#EF4444',0.8,0.5);tx(cx,96,'Marubozu Baixa','#EF4444',8,'middle');}
    else if(ct.includes('spinning')){ln(cx,24,cx,86,Y,0.6);rc(cx-5,48,10,14,Y,0.8,0.5);tx(cx,100,'Spinning Top',Y,8,'middle');}
    else if(ct.includes('pivô')&&up){dc(cx-24,50,60,46,64,6);dc(cx,62,56,52,66,6);dc(cx+24,52,42,38,58,6);tx(cx,92,'Pivô Alta','#10B981',8,'middle');}
    else if(ct.includes('pivô')){dc(cx-24,52,44,40,56,6);dc(cx,42,48,38,52,6);dc(cx+24,48,58,44,62,6);tx(cx,92,'Pivô Baixa','#EF4444',8,'middle');}
    else if(ct.includes('3 soldados')){dc(cx-24,60,48,44,64,6);dc(cx,48,38,34,52,6);dc(cx+24,38,28,24,42,6);tx(cx,92,'3 Soldados','#10B981',7,'middle');}
    else if(ct.includes('3 corvos')){dc(cx-24,38,50,34,54,6);dc(cx,50,62,46,66,6);dc(cx+24,62,74,58,78,6);tx(cx,92,'3 Corvos','#EF4444',7,'middle');}
    else if(ct.includes('nuvem negra')){dc(cx-12,36,58,32,62,8);dc(cx+12,60,44,32,64,8);tx(cx,92,'Nuvem Negra','#EF4444',7,'middle');}
    else if(ct.includes('perfuração')){dc(cx-12,58,38,34,62,8);dc(cx+12,36,52,32,62,8);tx(cx,92,'Perfuração','#10B981',7,'middle');}
    else if(ct.includes('topo duplo')){dc(cx-36,50,38,34,54,5);dc(cx-18,40,50,36,54,5);dc(cx,50,38,34,54,5);dc(cx+18,40,50,36,54,5);dc(cx+36,50,58,46,62,5);ln(10,36,W-10,36,'#EF4444',0.5,'2,2');tx(cx,92,'Topo Duplo','#EF4444',7,'middle');}
    else if(ct.includes('fundo duplo')){dc(cx-36,48,58,44,62,5);dc(cx-18,56,48,44,62,5);dc(cx,48,58,44,62,5);dc(cx+18,56,48,44,62,5);dc(cx+36,48,40,36,54,5);ln(10,60,W-10,60,'#10B981',0.5,'2,2');tx(cx,92,'Fundo Duplo','#10B981',7,'middle');}
    else if(ct.includes('trap')&&up){dc(cx-24,50,58,46,62,6);dc(cx,60,34,30,64,6);dc(cx+24,36,50,32,54,6);tx(cx,92,'Trap Alta','#10B981',8,'middle');}
    else if(ct.includes('trap')){dc(cx-24,50,42,38,54,6);dc(cx,38,64,34,68,6);dc(cx+24,62,48,44,66,6);tx(cx,92,'Trap Baixa','#EF4444',8,'middle');}
    else{dc(cx,50,40,34,66,8);tx(cx,92,'Padrão',sc,8,'middle');}
    return svg;
  }

  // ═══ SMART MONEY ═══
  if(indId==='fvg'){
    const isMitigation = params.entryMode==='mitigation' || (params.cond||'').includes('retornar');
    if(!isMitigation){
      // Modo imediato: impulso + gap + entrada no candle seguinte
      drawCds(CDS.slice(0,8),0.35);
      const imp=[{x:CDS[8].x,o:65,c:28,h:22,l:68,w:5},{x:CDS[9].x,o:28,c:18,h:14,l:30,w:5}];
      drawCds(imp,0.85);
      const fvgTop=CDS[7].l+2, fvgBot=imp[0].h-2;
      rc(CDS[7].x,fvgBot,imp[1].x+5-CDS[7].x,fvgTop-fvgBot,'#6366F1',0.12,2);
      ln(CDS[7].x,fvgTop,imp[1].x+5,fvgTop,'#6366F1',0.7,'2,2');
      ln(CDS[7].x,fvgBot,imp[1].x+5,fvgBot,'#6366F1',0.7,'2,2');
      // Entry arrow
      const ex=CDS[10]?CDS[10].x:imp[1].x+18;
      const ey=imp[1].c-4;
      rc(ex,ey,5,14,'#10B981',0.85,1);
      svg.appendChild(hsvg('polygon',{points:`${ex+2.5},${ey-5} ${ex-2},${ey+1} ${ex+7},${ey+1}`,fill:'#10B981','fill-opacity':0.9}));
      tx(ex+8,ey+4,'ENTRADA','#00D4AA',6);
    } else {
      // Modo retorno: impulso + subida + recuo até o gap + entrada
      const pre=[{x:14,o:80,c:50,h:44,l:84,w:6}]; drawCds(pre,0.9);
      rc(10,52,22,28,'#6366F1',0.12,2);
      ln(10,52,32,52,'#6366F1',0.7,'2,2'); ln(10,80,32,80,'#6366F1',0.7,'2,2');
      tx(12,62,'FVG','#6366F1',7);
      // Continuação subindo
      const cont=[{x:36,o:46,c:30,h:26,l:48,w:5},{x:46,o:30,c:20,h:16,l:32,w:5},{x:56,o:20,c:14,h:10,l:22,w:5}];
      drawCds(cont,0.7);
      // Recuo (candles vermelhos descendo)
      const pb=[{x:70,o:20,c:30,h:18,l:32,w:5},{x:80,o:30,c:44,h:28,l:46,w:5},{x:90,o:44,c:58,h:42,l:60,w:5},{x:100,o:58,c:68,h:56,l:72,w:5}];
      drawCds(pb,0.65);
      // Chegada no gap + entrada
      rc(10,52,106,28,'#6366F1',0.06,2);
      svg.appendChild(hsvg('circle',{cx:114,cy:70,r:4,fill:'#00D4AA','fill-opacity':0.25,stroke:'#00D4AA','stroke-width':1}));
      ln(114,66,114,54,'#00D4AA',1.2); ln(111,58,114,54,'#00D4AA',1.2); ln(117,58,114,54,'#00D4AA',1.2);
      tx(120,60,'ENTRADA','#00D4AA',6);
    }
    tx(10,10,isMitigation?'FVG — Preço retorna ao gap':'FVG — Entrada imediata','#6366F1',7);
    return svg;
  }

  if(indId==='bos'){
    drawCds(CDS,0.3);
    const pivotY=up?CDS[4].l:CDS[4].h;
    ln(6,pivotY,W-6,pivotY,'#F59E0B',0.6,'3,3');
    ci(CDS[10].x+cw/2,pivotY,sc,4);aw(CDS[10].x+cw/2+10,pivotY,up,sc);
    badge(CDS[10].x+cw/2+14,pivotY+(up?-2:8),'BoS',sc,7);
    tx(10,14,'BoS','#F59E0B',8);
    return svg;
  }

  if(indId==='choch'){
    drawCds(CDS,0.3);
    const lvl=up?CDS[5].l:CDS[5].h;
    ln(6,lvl,W-6,lvl,'#EF4444',0.6,'3,3');
    ci(CDS[10].x+cw/2,lvl,'#F59E0B',4);aw(CDS[10].x+cw/2+10,lvl,up,'#F59E0B');
    badge(CDS[10].x+cw/2+14,lvl+(up?-2:8),'CHoCH','#F59E0B',7);
    tx(10,14,'CHoCH','#F59E0B',8);
    return svg;
  }

  if(indId==='ob'){
    drawCds(CDS.slice(0,6),0.3);
    const obCd=up?{x:CDS[6].x,o:52,c:60,h:48,l:64,w:5}:{x:CDS[6].x,o:60,c:52,h:48,l:64,w:5};
    drawCds([obCd],0.7);
    rc(obCd.x-1,Math.min(obCd.o,obCd.c)-1,W-obCd.x-6,Math.abs(obCd.o-obCd.c)+2,'#6366F1',0.08,2);
    const imp=up?[{x:CDS[7].x,o:50,c:36,h:32,l:54,w:5},{x:CDS[8].x,o:36,c:26,h:22,l:40,w:5}]:[{x:CDS[7].x,o:62,c:76,h:58,l:80,w:5},{x:CDS[8].x,o:76,c:86,h:72,l:90,w:5}];
    drawCds(imp,0.6);
    badge(obCd.x,(Math.min(obCd.o,obCd.c))-6,'OB','#6366F1',7);
    tx(10,14,'ORDER BLOCK','#6366F1',8);
    return svg;
  }

  if(indId==='sweep'){
    drawCds(CDS.slice(0,10),0.3);
    const lvlY=up?90:18;ln(6,lvlY,W-6,lvlY,'#F59E0B',0.6,'3,3');
    const sweepCd=up?{x:CDS[10].x,o:84,c:72,h:68,l:98,w:5}:{x:CDS[10].x,o:22,c:34,h:8,l:38,w:5};
    drawCds([sweepCd],0.8);
    aw(sweepCd.x+cw+6,(sweepCd.o+sweepCd.c)/2,!up,sc);
    const rev=up?[{x:CDS[11].x,o:74,c:62,h:58,l:78,w:5},{x:CDS[12].x,o:62,c:52,h:48,l:66,w:5}]:[{x:CDS[11].x,o:32,c:44,h:28,l:48,w:5},{x:CDS[12].x,o:44,c:54,h:40,l:58,w:5}];
    drawCds(rev,0.6);
    badge(sweepCd.x+cw/2,lvlY+(up?-6:8),'SWEEP',sc,7,'middle');
    tx(10,14,'SWEEP','#F59E0B',8);
    return svg;
  }

  // ═══ FALLBACK ═══
  drawCds(CDS,0.4);ci(CDS[10].x+cw/2,60,sc,4);tx(10,14,indId.toUpperCase(),TH.txm,8);
  return svg;
}

// ─── VALIDATION ENGINE ────────────────────────────────────────
const OSC_IDS        = ['rsi','stoch','macd','cci','williams'];
const MA_IDS         = ['sma','ema'];
const TREND_IDS      = ['sma','ema','bb','vwap','adx','sar','hilo'];
const CANDLE_IDS     = ['candle'];
const SMARTMONEY_IDS = ['fvg','bos','choch','sweep','grab'];

function oscZone(id, cond, val) {
  if (!OSC_IDS.includes(id)) return null;
  const mid = (id==='rsi'||id==='stoch') ? 50 : (id==='cci' ? 0 : -50);
  if (cond==='cruza acima de'||cond==='está acima de') return val <= mid ? 'sobrevenda' : 'sobrecompra';
  if (cond==='cruza abaixo de'||cond==='está abaixo de') return val >= mid ? 'sobrecompra' : 'sobrevenda';
  return null;
}

function validateNewCondition(newCond, existingConds) {
  const issues = [];
  const p = newCond.params, id = newCond.id;

  // R27-R31: Valores inválidos
  if ((id==='rsi'||id==='stoch') && p.val!=null && (p.val<0||p.val>100))
    issues.push({type:'block',rule:'R27',msg:'Este oscilador opera entre 0 e 100.'});
  if (id==='williams' && p.val!=null && (p.val<-100||p.val>0))
    issues.push({type:'block',rule:'R29',msg:'O Williams %R opera entre -100 e 0.'});
  if (id==='cci' && p.val!=null && Math.abs(p.val)>300)
    issues.push({type:'warn',rule:'R30',msg:'Valores de CCI nesta faixa são muito raros. O backtest pode não encontrar sinais suficientes no histórico.'});
  if (id==='range' && p.val!=null && p.val<=0)
    issues.push({type:'block',rule:'R31',msg:'O valor de referência deve ser maior que zero.'});

  // R44-R47: CROSS em extremos de range — condição matematicamente impossível
  // RSI e Estocástico: range 0-100
  if ((id==='rsi'||id==='stoch') && p.val!=null) {
    if (p.cond==='cruza acima de' && p.val<=0)
      issues.push({type:'block',rule:'R44',msg:'Cruzar acima de 0 é impossível — este oscilador nunca fica abaixo de 0.'});
    if (p.cond==='cruza abaixo de' && p.val>=100)
      issues.push({type:'block',rule:'R45',msg:'Cruzar abaixo de 100 é impossível — este oscilador nunca ultrapassa 100.'});
    if (p.cond==='cruza acima de' && p.val>=100)
      issues.push({type:'block',rule:'R44',msg:'Cruzar acima de 100 é impossível — este oscilador nunca ultrapassa 100.'});
    if (p.cond==='cruza abaixo de' && p.val<=0)
      issues.push({type:'block',rule:'R45',msg:'Cruzar abaixo de 0 é impossível — este oscilador nunca fica abaixo de 0.'});
  }
  // Williams %R: range -100 a 0
  if (id==='williams' && p.val!=null) {
    if (p.cond==='cruza acima de' && p.val>=0)
      issues.push({type:'block',rule:'R46',msg:'Cruzar acima de 0 é impossível — o Williams %R nunca ultrapassa 0.'});
    if (p.cond==='cruza abaixo de' && p.val<=-100)
      issues.push({type:'block',rule:'R46',msg:'Cruzar abaixo de -100 é impossível — o Williams %R nunca fica abaixo de -100.'});
    if (p.cond==='cruza abaixo de' && p.val>=0)
      issues.push({type:'block',rule:'R46',msg:'Cruzar abaixo de 0 é impossível — o Williams %R nunca ultrapassa 0.'});
    if (p.cond==='cruza acima de' && p.val<=-100)
      issues.push({type:'block',rule:'R46',msg:'Cruzar acima de -100 é impossível — o Williams %R nunca fica abaixo de -100.'});
  }
  // ADX: range 0-100
  if (id==='adx' && p.val!=null) {
    if (p.cond==='cruza acima de' && p.val<=0)
      issues.push({type:'block',rule:'R47',msg:'Cruzar acima de 0 é impossível — o ADX nunca fica abaixo de 0.'});
    if (p.cond==='cruza abaixo de' && p.val>=100)
      issues.push({type:'block',rule:'R47',msg:'Cruzar abaixo de 100 é impossível — o ADX nunca ultrapassa 100.'});
    if (p.cond==='cruza acima de' && p.val>=100)
      issues.push({type:'block',rule:'R47',msg:'Cruzar acima de 100 é impossível — o ADX nunca ultrapassa 100.'});
    if (p.cond==='cruza abaixo de' && p.val<=0)
      issues.push({type:'block',rule:'R47',msg:'Cruzar abaixo de 0 é impossível — o ADX nunca fica abaixo de 0.'});
  }

  // R48: Bollinger período mínimo 6
  if (id==='bb' && p.per!=null && p.per < 6)
    issues.push({type:'block',rule:'R48',msg:'O período mínimo das Bandas de Bollinger é 6. Com períodos menores as bandas recalculam rápido demais e o preço raramente fecha fora delas.'});

  // R26: 4+ condições simultâneas
  if (existingConds.length >= 3)
    issues.push({type:'warn',rule:'R26',msg:'Com 4 ou mais condições simultâneas, o número de sinais pode ser insuficiente para análise estatística confiável.'});

  // R40: Osciladores — máximo 1 por backtest
  if (OSC_IDS.includes(id)) {
    const existingOsc = existingConds.filter(c => OSC_IDS.includes(c.id));
    if (existingOsc.length >= 1)
      issues.push({type:'block',rule:'R40',msg:'Limite de 1 oscilador por backtest. Remova o oscilador existente para adicionar outro.'});
  }

  // R41: Tendência — máximo 2 (ou 3 se forem apenas médias SMA/EMA)
  if (TREND_IDS.includes(id)) {
    const existingTrend = existingConds.filter(c => TREND_IDS.includes(c.id));
    const newIsMa = MA_IDS.includes(id);
    const allAreMa = existingTrend.every(c => MA_IDS.includes(c.id));
    const limit = (newIsMa && allAreMa) ? 3 : 2;
    if (existingTrend.length >= limit) {
      if (limit === 3)
        issues.push({type:'block',rule:'R41',msg:'Limite de 3 médias móveis por backtest atingido.'});
      else
        issues.push({type:'block',rule:'R41',msg:'Limite de 2 indicadores de tendência por backtest. Para adicionar 3, use apenas médias móveis (SMA/EMA).'});
    }
  }

  // R42: Padrões de Candle — máximo 1 por backtest
  if (CANDLE_IDS.includes(id)) {
    const existingCandle = existingConds.filter(c => CANDLE_IDS.includes(c.id));
    if (existingCandle.length >= 1)
      issues.push({type:'block',rule:'R42',msg:'Limite de 1 padrão de candle por backtest. Remova o padrão existente para adicionar outro.'});
  }

  // R43: Smart Money — máximo 1 por backtest
  if (SMARTMONEY_IDS.includes(id)) {
    const existingSM = existingConds.filter(c => SMARTMONEY_IDS.includes(c.id));
    if (existingSM.length >= 1)
      issues.push({type:'block',rule:'R43',msg:'Limite de 1 conceito Smart Money por backtest. Remova o existente para adicionar outro.'});
  }

  for (const ex of existingConds) {
    const ep = ex.params;

    // R01: Condição idêntica
    if (id===ex.id && JSON.stringify(p)===JSON.stringify(ep))
      { issues.push({type:'block',rule:'R01',msg:'Esta condição já foi adicionada.'}); continue; }

    // R02-R04: Osciladores
    if (OSC_IDS.includes(id) && id===ex.id && p.per===ep.per) {
      if (p.cond==='está acima de' && ep.cond==='está abaixo de' && ep.val<=p.val)
        issues.push({type:'block',rule:'R02',msg:`${newCond.name}(${p.per}) não pode estar acima de ${p.val} e abaixo de ${ep.val} ao mesmo tempo.`});
      if (p.cond==='está abaixo de' && ep.cond==='está acima de' && p.val<=ep.val)
        issues.push({type:'block',rule:'R02',msg:`${newCond.name}(${p.per}) não pode estar abaixo de ${p.val} e acima de ${ep.val} ao mesmo tempo.`});
      if ((p.cond==='cruza acima de'&&ep.cond==='cruza abaixo de')||(p.cond==='cruza abaixo de'&&ep.cond==='cruza acima de'))
        issues.push({type:'block',rule:'R03',msg:`${newCond.name}(${p.per}) não pode cruzar para cima e para baixo no mesmo candle.`});
      if (p.cond==='cruza acima de' && ep.cond==='está abaixo de' && ep.val<=p.val)
        issues.push({type:'block',rule:'R04',msg:`Se ${newCond.name}(${p.per}) cruzou acima de ${p.val}, não pode estar abaixo de ${ep.val}.`});
      if (p.cond==='está abaixo de' && ep.cond==='cruza acima de' && p.val<=ep.val)
        issues.push({type:'block',rule:'R04',msg:`Se ${newCond.name}(${p.per}) cruzou acima de ${ep.val}, não pode estar abaixo de ${p.val}.`});
      if (p.cond==='cruza abaixo de' && ep.cond==='está acima de' && ep.val>=p.val)
        issues.push({type:'block',rule:'R04',msg:`Se ${newCond.name}(${p.per}) cruzou abaixo de ${p.val}, não pode estar acima de ${ep.val}.`});
      if (p.cond==='está acima de' && ep.cond==='cruza abaixo de' && p.val>=ep.val)
        issues.push({type:'block',rule:'R04',msg:`Se ${newCond.name}(${p.per}) cruzou abaixo de ${ep.val}, não pode estar acima de ${p.val}.`});
    }

    // R05-R07, R19, R22: Médias móveis
    if (MA_IDS.includes(id) && MA_IDS.includes(ex.id)) {
      if (id===ex.id && p.per===ep.per && !p.per2 && !ep.per2) {
        if ((p.cond==='Preço está acima'&&ep.cond==='Preço está abaixo')||(p.cond==='Preço está abaixo'&&ep.cond==='Preço está acima'))
          issues.push({type:'block',rule:'R05',msg:`Preço não pode estar acima e abaixo da ${id.toUpperCase()}(${p.per}) ao mesmo tempo.`});
        if ((p.cond==='Preço cruza acima'&&ep.cond==='Preço cruza abaixo')||(p.cond==='Preço cruza abaixo'&&ep.cond==='Preço cruza acima'))
          issues.push({type:'block',rule:'R06',msg:`Preço não pode cruzar a ${id.toUpperCase()}(${p.per}) para cima e para baixo no mesmo candle.`});
        if ((p.cond==='Preço cruza acima'&&ep.cond==='Preço está abaixo')||(p.cond==='Preço está abaixo'&&ep.cond==='Preço cruza acima'))
          issues.push({type:'block',rule:'R07',msg:`Se o preço cruzou acima da ${id.toUpperCase()}(${p.per}), por definição está acima dela.`});
        if ((p.cond==='Preço cruza abaixo'&&ep.cond==='Preço está acima')||(p.cond==='Preço está acima'&&ep.cond==='Preço cruza abaixo'))
          issues.push({type:'block',rule:'R07',msg:`Se o preço cruzou abaixo da ${id.toUpperCase()}(${p.per}), por definição está abaixo dela.`});
      }
      if (id===ex.id && p.per!==ep.per && !p.per2 && !ep.per2 && Math.abs((p.per||200)-(ep.per||200))<10)
        issues.push({type:'warn',rule:'R22',msg:`${id.toUpperCase()}(${p.per}) e ${ex.id.toUpperCase()}(${ep.per}) têm períodos muito próximos e produzem resultados quase idênticos.`});
      if (id!==ex.id && (p.per||200)===(ep.per||200) && p.cond===ep.cond && !p.per2 && !ep.per2)
        issues.push({type:'warn',rule:'R19',msg:`SMA e EMA com mesmo período e condição produzem sinais quase idênticos. Considere usar apenas uma.`});
    }

    // R49: MA mesmo indicador + mesmo período + condições incoerentes ou impossíveis
    if (MA_IDS.includes(id) && MA_IDS.includes(ex.id) && id===ex.id && p.per===ep.per && !p.per2 && !ep.per2) {
      // IMPOSSÍVEL: cruza acima da longa e cruza abaixo da longa no mesmo candle
      if ((p.cond==='Média curta cruza acima da longa'&&ep.cond==='Média curta cruza abaixo da longa')||
          (p.cond==='Média curta cruza abaixo da longa'&&ep.cond==='Média curta cruza acima da longa'))
        issues.push({type:'block',rule:'R49',msg:`A média curta não pode cruzar para cima e para baixo da ${id.toUpperCase()}(${p.per}) no mesmo candle.`});
      // INCOERENTE: direções opostas — preço cruzando acima + média cruzando abaixo
      if ((p.cond==='Preço cruza acima'&&ep.cond==='Média curta cruza abaixo da longa')||
          (p.cond==='Média curta cruza abaixo da longa'&&ep.cond==='Preço cruza acima'))
        issues.push({type:'block',rule:'R49',msg:`Preço cruzando acima e média cruzando abaixo da ${id.toUpperCase()}(${p.per}) são condições contraditórias.`});
      // INCOERENTE: direções opostas — preço cruzando abaixo + média cruzando acima
      if ((p.cond==='Preço cruza abaixo'&&ep.cond==='Média curta cruza acima da longa')||
          (p.cond==='Média curta cruza acima da longa'&&ep.cond==='Preço cruza abaixo'))
        issues.push({type:'block',rule:'R49',msg:`Preço cruzando abaixo e média cruzando acima da ${id.toUpperCase()}(${p.per}) são condições contraditórias.`});
      // INCOERENTE: preço está acima + média cruzando abaixo (sinais opostos)
      if ((p.cond==='Preço está acima'&&ep.cond==='Média curta cruza abaixo da longa')||
          (p.cond==='Média curta cruza abaixo da longa'&&ep.cond==='Preço está acima'))
        issues.push({type:'block',rule:'R49',msg:`Preço acima (tendência de alta) e média cruzando abaixo (sinal de baixa) da ${id.toUpperCase()}(${p.per}) são condições contraditórias.`});
      // INCOERENTE: preço está abaixo + média cruzando acima (sinais opostos)
      if ((p.cond==='Preço está abaixo'&&ep.cond==='Média curta cruza acima da longa')||
          (p.cond==='Média curta cruza acima da longa'&&ep.cond==='Preço está abaixo'))
        issues.push({type:'block',rule:'R49',msg:`Preço abaixo (tendência de baixa) e média cruzando acima (sinal de alta) da ${id.toUpperCase()}(${p.per}) são condições contraditórias.`});
      // INCOERENTE: preço cruza acima + MA_CROSS com mesmo período (mistura de comparações)
      if ((p.cond==='Preço cruza acima'&&ep.cond==='Média curta cruza acima da longa')||
          (p.cond==='Média curta cruza acima da longa'&&ep.cond==='Preço cruza acima'))
        issues.push({type:'block',rule:'R49',msg:`Não é possível comparar preço vs ${id.toUpperCase()} e média vs média usando o mesmo período (${p.per}).`});
      if ((p.cond==='Preço cruza abaixo'&&ep.cond==='Média curta cruza abaixo da longa')||
          (p.cond==='Média curta cruza abaixo da longa'&&ep.cond==='Preço cruza abaixo'))
        issues.push({type:'block',rule:'R49',msg:`Não é possível comparar preço vs ${id.toUpperCase()} e média vs média usando o mesmo período (${p.per}).`});
      // INCOERENTE: bidirecional (compra e venda) + qualquer condição direcional com mesmo período
      const bidir = 'Cruzamento de médias (compra e venda)';
      const dirConds = ['Preço cruza acima','Preço cruza abaixo','Preço está acima','Preço está abaixo',
                        'Média curta cruza acima da longa','Média curta cruza abaixo da longa'];
      if ((p.cond===bidir && dirConds.includes(ep.cond))||(ep.cond===bidir && dirConds.includes(p.cond)))
        issues.push({type:'block',rule:'R49',msg:`'Cruzamento de médias (compra e venda)' não pode ser combinado com condição direcional da ${id.toUpperCase()}(${p.per}) — use períodos diferentes.`});
    }

    // R08-R10: VWAP
    if (id==='vwap' && ex.id==='vwap') {
      if ((p.cond==='Preço está acima do VWAP'&&ep.cond==='Preço está abaixo do VWAP')||(p.cond==='Preço está abaixo do VWAP'&&ep.cond==='Preço está acima do VWAP'))
        issues.push({type:'block',rule:'R08',msg:'Preço não pode estar acima e abaixo do VWAP ao mesmo tempo.'});
      if ((p.cond==='Preço cruza acima do VWAP'&&ep.cond==='Preço cruza abaixo do VWAP')||(p.cond==='Preço cruza abaixo do VWAP'&&ep.cond==='Preço cruza acima do VWAP'))
        issues.push({type:'block',rule:'R09',msg:'Preço não pode cruzar o VWAP para cima e para baixo no mesmo candle.'});
      if ((p.cond==='Preço cruza acima do VWAP'&&ep.cond==='Preço está abaixo do VWAP')||(p.cond==='Preço está abaixo do VWAP'&&ep.cond==='Preço cruza acima do VWAP'))
        issues.push({type:'block',rule:'R10',msg:'Se o preço cruzou acima do VWAP, por definição está acima dele.'});
      if ((p.cond==='Preço cruza abaixo do VWAP'&&ep.cond==='Preço está acima do VWAP')||(p.cond==='Preço está acima do VWAP'&&ep.cond==='Preço cruza abaixo do VWAP'))
        issues.push({type:'block',rule:'R10',msg:'Se o preço cruzou abaixo do VWAP, por definição está abaixo dele.'});
    }

    // R11: MACD
    if (id==='macd' && ex.id==='macd') {
      if ((p.cond==='MACD cruza acima do sinal'&&ep.cond==='MACD cruza abaixo do sinal')||(p.cond==='MACD cruza abaixo do sinal'&&ep.cond==='MACD cruza acima do sinal'))
        issues.push({type:'block',rule:'R11',msg:'MACD não pode cruzar o sinal para cima e para baixo no mesmo candle.'});
      if ((p.cond==='MACD acima de zero'&&ep.cond==='MACD abaixo de zero')||(p.cond==='MACD abaixo de zero'&&ep.cond==='MACD acima de zero'))
        issues.push({type:'block',rule:'R11',msg:'MACD não pode estar acima e abaixo de zero ao mesmo tempo.'});
    }



    // R14: Range
    if (id==='range' && ex.id==='range') {
      if ((p.cond==='é maior que'&&ep.cond==='é menor que'&&ep.val<=p.val)||(p.cond==='é menor que'&&ep.cond==='é maior que'&&p.val<=ep.val))
        issues.push({type:'block',rule:'R14',msg:`Range não pode ser maior que ${Math.max(p.val,ep.val)} e menor que ${Math.min(p.val,ep.val)} ao mesmo tempo.`});
    }

    // R18: Bollinger bandas opostas
    if (id==='bb' && ex.id==='bb' && (p.per||20)===(ep.per||20)) {
      const sup=['Preço toca banda superior','Preço cruza banda superior'];
      const inf=['Preço toca banda inferior','Preço cruza banda inferior'];
      if ((sup.includes(p.cond)&&inf.includes(ep.cond))||(inf.includes(p.cond)&&sup.includes(ep.cond)))
        issues.push({type:'block',rule:'R18',msg:'Banda superior e inferior ao mesmo tempo não define um setup claro. Separe em condições distintas.'});
    }
  }

  // R20/R21 removidas: substituídas pela R40 (limite de 1 oscilador por backtest)

  // R24: Cruzamento + posição incompatível
  if (OSC_IDS.includes(id) && p.cond==='está acima de') {
    existingConds.filter(c=>c.id===id&&c.params.per===p.per&&c.params.cond==='cruza acima de').forEach(cross=>{
      if (p.val > cross.params.val + 20)
        issues.push({type:'warn',rule:'R24',msg:`'Cruzar acima de ${cross.params.val}' e 'estar acima de ${p.val}' raramente ocorrem no mesmo candle. O backtest pode gerar pouquíssimos sinais.`});
    });
  }

  return issues;
}

function validateExitCondition(exitCond, entryConds) {
  for (const ec of entryConds) {
    if (exitCond.id===ec.id && JSON.stringify(exitCond.params)===JSON.stringify(ec.params))
      return [{type:'block',rule:'R32',msg:'A condição de saída não pode ser idêntica a uma condição de entrada.'}];
  }
  return [];
}

function validateStep1(cfg) {
  const issues = [];
  if (cfg.tStart >= cfg.tEnd)
    issues.push({type:'block',rule:'R34',msg:'O horário de início deve ser anterior ao horário de fim.'});
  const tfMin={'1m':1,'2m':2,'5m':5,'10m':10,'15m':15,'30m':30,'60m':60,'D':480};
  const [sh,sm]=cfg.tStart.split(':').map(Number);
  const [lh,lm]=cfg.tLastEntry.split(':').map(Number);
  const win=(lh*60+lm)-(sh*60+sm);
  if (win>0 && tfMin[cfg.tf] && win<tfMin[cfg.tf])
    issues.push({type:'block',rule:'R35',msg:`A janela de leitura (${win} min) é menor que o timeframe selecionado (${cfg.tf}). Nenhum candle completo caberá neste período. Aumente a janela ou reduza o timeframe.`});
  return issues;
}

function renderIssues(issues) {
  const wrap = div('');
  issues.forEach(issue => {
    const el = div('');
    el.style.cssText = `display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:8px;margin-top:7px;font-size:12px;line-height:1.5;${
      issue.type==='block'
        ? 'background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#EF4444'
        : 'background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#F59E0B'
    }`;
    const icEl = div('');icEl.style.cssText='flex-shrink:0;margin-top:1px';
    icEl.innerHTML = issue.type==='block'
      ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`
      : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>`;
    const txt = div('');txt.textContent = issue.msg;
    el.append(icEl,txt);wrap.appendChild(el);
  });
  return wrap;
}

  let existing=document.getElementById('modal-container');
  if(existing) existing.remove();
  if(!modalState.open) return;

  const ms=modalState;
  const tabs=Object.keys(INDS_BY_TAB);
  const inds=INDS_BY_TAB[ms.tab]||[];

  const modalEl=div('overlay');
  modalEl.id='modal-container';
  modalEl.addEventListener('click',e=>{if(e.target===modalEl)closeModal();});

  const modal=div('modal');

  // Header
  const hdr=div('modal-header');
  const htitle=div('');
  htitle.style.cssText='font-size:15px;font-weight:700;color:var(--tx)';

function renderStep1() {
  const cfg=state.cfg;
  const el=div(state.animate?'aFwd':'');el.style.cssText='display:flex;flex-direction:column;gap:24px';

  // Market toggle
  const mktBlock=div('');
  mktBlock.appendChild(slabel('Mercado'));
  const mktRow=div('');mktRow.style.cssText='display:flex;gap:7px;margin-bottom:4px';
  ['local','internacional'].forEach(m=>{
    const c=div('chip'+(cfg.market===m?' on':''));
    c.textContent=m==='local'?'🇧🇷 Brasil (B3)':'🌎 Internacional';
    c.addEventListener('click',()=>{cfg.market=m;cfg.asset=m==='local'?'WIN$N':'EURUSD';renderApp();});
    mktRow.appendChild(c);
  });
  mktBlock.appendChild(mktRow);
  el.appendChild(mktBlock);

  // Asset combobox
  const assetBlock=div('');
  assetBlock.appendChild(slabel('Ativo','Busque por ticker ou nome do ativo. Use o campo de busca abaixo.'));
  const combo=div('asset-combo');
  const searchIcon=div('asset-search-icon');
  searchIcon.innerHTML=IC.search;
  const searchInput=h('input',{type:'text',class:'asset-search',placeholder:'Buscar ativo... ex: WIN, PETR4, EURUSD'});
  const dropdown=div('asset-dropdown');
  combo.append(searchIcon,searchInput);
  document.body.appendChild(dropdown);

  function renderDropdown(filter='') {
    dropdown.innerHTML='';
    const q=filter.toLowerCase();
    const mktData=ASSETS_DATA[cfg.market];
    let hasResults=false;
    for (const [cat,items] of Object.entries(mktData)) {
      const filtered=items.filter(a=>a.t.toLowerCase().includes(q)||a.n.toLowerCase().includes(q));
      if(filtered.length===0) continue;
      hasResults=true;
      const catLabel=div('asset-cat');catLabel.textContent=CAT_LABELS[cat]||cat;
      dropdown.appendChild(catLabel);
      filtered.forEach(a=>{
        const item=div('asset-item'+(cfg.asset===a.t?' active':''));
        const tk=div('asset-ticker');tk.textContent=a.t;
        const nm=div('asset-name');nm.textContent=a.n;
        item.append(tk,nm);
        item.addEventListener('click',()=>{
          cfg.asset=a.t;
          // Snap risk fields to new asset's tick
          const {tick} = getAssetTick(a.t);
          cfg.stopPts   = snapToTick(Math.max(tick, cfg.stopPts),   tick);
          cfg.stopOffset= snapToTick(cfg.stopOffset,  tick);
          cfg.tpPts     = snapToTick(Math.max(tick, cfg.tpPts),     tick);
          // Reset management — fields depend on tick size, force user to reconfigure
          cfg.trailing=false;
          cfg.trailAct =snapToTick(100, tick);
          cfg.trailDist=snapToTick(100, tick);
          cfg.trailStep=snapToTick(50,  tick);
          cfg.partial=false;
          cfg.partAt   =snapToTick(200, tick);
          cfg.partPct  =50;
          cfg.partMoveStop=true;
          dropdown.classList.remove('open');
          searchInput.value='';
          renderApp();
        });
        dropdown.appendChild(item);
      });
    }
    if(!hasResults){
      const empty=div('');empty.style.cssText='padding:16px;text-align:center;font-size:12px;color:var(--txm)';
      empty.textContent='Nenhum ativo encontrado';
      dropdown.appendChild(empty);
    }
  }

  function positionDropdown() {
    const rect = searchInput.getBoundingClientRect();
    dropdown.style.top  = (rect.bottom + 4) + 'px';
    dropdown.style.left = rect.left + 'px';
    dropdown.style.width = rect.width + 'px';
  }
  searchInput.addEventListener('focus',()=>{renderDropdown(searchInput.value);positionDropdown();dropdown.classList.add('open');});
  searchInput.addEventListener('input',()=>{renderDropdown(searchInput.value);positionDropdown();dropdown.classList.add('open');});
  document.addEventListener('click',e=>{if(!combo.contains(e.target))dropdown.classList.remove('open');},{once:false});

  assetBlock.appendChild(combo);

  // Selected asset display
  const cur=findAsset(cfg.asset);
  if(cur){
    const sel=div('asset-selected');
    const tk=div('asset-ticker');tk.textContent=cur.t;
    const nm=div('asset-name');nm.textContent=cur.n;
    const catBadge=div('');catBadge.style.cssText='font-size:10px;color:var(--txs);background:var(--bg3);border:0.5px solid var(--bd);border-radius:4px;padding:1px 6px;font-weight:600;font-family:"JetBrains Mono",monospace';
    catBadge.textContent=CAT_LABELS[cur.cat]||cur.cat;
    sel.append(tk,nm,catBadge);
    assetBlock.appendChild(sel);
  }
  el.appendChild(assetBlock);

  // Timeframe
  const tfBlock=div('');
  tfBlock.appendChild(slabel('Timeframe'));
  tfBlock.appendChild(chipsWrap(TFS,cfg.tf,v=>{cfg.tf=v;renderApp();}));
  el.appendChild(tfBlock);

  // Window
  const wBlock=div('');
  wBlock.appendChild(slabel('Janela Operacional','Define três momentos: início da leitura de sinais, horário máximo para abrir novas posições, e horário de encerramento forçado de posições abertas.'));

  const r1=div('');r1.style.cssText='display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap';
  const lb1=div('');lb1.style.cssText='font-size:13px;color:var(--txs);min-width:120px';lb1.textContent='Início da leitura';
  r1.append(lb1,timeStepper(cfg.tStart,v=>{cfg.tStart=v;renderApp();}));

  const r2=div('');r2.style.cssText='display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap';
  const lb2=div('');lb2.style.cssText='font-size:13px;color:var(--txs);min-width:120px';lb2.textContent='Última abertura';
  const tip2=div('');tip2.style.cssText='font-size:11px;color:var(--txm)';tip2.textContent='Nenhuma operação nova após este horário';
  r2.append(lb2,timeStepper(cfg.tLastEntry,v=>{cfg.tLastEntry=v;renderApp();}),tip2);

  const r3=div('');r3.style.cssText='display:flex;align-items:center;gap:9px;margin-bottom:4px;flex-wrap:wrap';
  const lb3=div('');lb3.style.cssText='font-size:13px;color:var(--txs);min-width:120px';lb3.textContent='Encerramento';
  const tip3=div('');tip3.style.cssText='font-size:11px;color:var(--txm)';tip3.textContent='Posições abertas são encerradas neste horário';
  r3.append(lb3,timeStepper(cfg.tEnd,v=>{cfg.tEnd=v;renderApp();}),tip3);

  wBlock.append(r1,r2,r3);
  el.appendChild(wBlock);

  // Max daily trades
  const dtBlock=div('');
  dtBlock.appendChild(slabel('Operações por dia','Limite máximo de operações que podem ser abertas no mesmo dia. Zero = sem limite.'));
  const dtRow=div('');dtRow.style.cssText='display:flex;align-items:center;gap:9px;flex-wrap:wrap';
  const dtHint=div('');dtHint.style.cssText='font-size:11px;color:var(--txm)';
  function updateDtHint(v){dtHint.textContent=v===0?'Sem limite':'Máximo de '+v+(v>1?' operações':' operação')+' por dia';}
  updateDtHint(cfg.maxDailyTrades);
  dtRow.appendChild(stepper(cfg.maxDailyTrades,0,100,'',v=>{cfg.maxDailyTrades=v;renderApp();}));
  dtRow.appendChild(dtHint);
  dtBlock.appendChild(dtRow);
  el.appendChild(dtBlock);

  // Validation: janela operacional
  const s1issues=validateStep1(cfg);
  if(s1issues.length>0) el.appendChild(renderIssues(s1issues));
  return el;
}

// ─── BACKEND INTEGRATION ─────────────────────────────────────

// Converte resultado do worker (metrics + trades + equity_curve) para formato EQ do frontend
function convertBackendResult(result, deposit) {
  deposit = deposit || 100000;
  const metrics = result.metrics || {};
  const trades = result.trades || [];
  const equityCurve = result.equity_curve || [];

  // Se temos trades, construir EQ a partir deles
  if (trades.length > 0) {
    let v = 0, peak = 0;
    return trades.map((t, i) => {
      const pnl = (t.profit || 0) + (t.commission || 0) + (t.swap || 0);
      v += pnl;
      if (v > peak) peak = v;
      // Extrair data do trade para label
      const dt = t.close_time || t.open_time || '';
      const parts = dt.split(/[.\s-]/);
      let tLabel = '';
      if (parts.length >= 2) {
        const yr = parts[0], mo = parseInt(parts[1]) - 1;
        const d = new Date(parseInt(yr), mo);
        tLabel = d.toLocaleDateString('pt-BR', {month:'short'}).replace('.','') + " '" + String(yr).slice(2);
      } else {
        tLabel = 'T' + (i+1);
      }
      return { v: Math.round(v), dd: Math.round(Math.min(0, v - peak)), pnl: Math.round(pnl), t: tLabel };
    });
  }

  // Fallback: se temos equity_curve (array de saldos), converter para PnL relativo
  if (equityCurve.length > 0) {
    let peak = 0;
    return equityCurve.map((balance, i) => {
      const v = balance - deposit;
      if (v > peak) peak = v;
      const pnl = i === 0 ? v : (balance - equityCurve[i-1]);
      return { v: Math.round(v), dd: Math.round(Math.min(0, v - peak)), pnl: Math.round(pnl), t: 'T' + (i+1) };
    });
  }

  // Ultimo fallback: gerar EQ sintetico a partir das metricas
  const totalTrades = metrics.total_trades || 0;
  const winRate = (metrics.win_rate || 50) / 100;
  const avgWin = metrics.gross_profit && metrics.win_trades ? metrics.gross_profit / metrics.win_trades : 200;
  const avgLoss = metrics.gross_loss && metrics.loss_trades ? Math.abs(metrics.gross_loss) / metrics.loss_trades : 150;

  let v = 0, peak = 0;
  const eq = [];
  // Seed baseado no checksum para ser determinístico
  let s = totalTrades * 7919 + Math.round((metrics.total_net_profit || 0) * 100);
  const rng = () => { s = (s * 16807 + 0) % 2147483647; return (s & 0x7fffffff) / 2147483647; };

  for (let i = 0; i < Math.max(totalTrades, 30); i++) {
    const isWin = rng() < winRate;
    const pnl = isWin ? avgWin * (0.5 + rng()) : -avgLoss * (0.5 + rng());
    v += pnl;
    if (v > peak) peak = v;
    eq.push({ v: Math.round(v), dd: Math.round(Math.min(0, v - peak)), pnl: Math.round(pnl), t: 'T' + (i+1) });
  }
  return eq;
}

// Envia backtest para o backend e faz polling do resultado
async function submitBacktestToBackend() {
  if (!currentUser) {
    alert('Faca login para rodar backtests.');
    return null;
  }

  // Refresh para garantir token valido
  const { data: refreshData, error: refreshErr } = await db.auth.refreshSession();
  const token = refreshData?.session?.access_token;
  if (refreshErr || !token) {
    alert('Sessao expirada. Faca login novamente.');
    return null;
  }

  // Submeter para a fila
  try {
    const res = await fetch(`${SUPA_URL}/functions/v1/submit-backtest`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
        'apikey': SUPA_KEY,
      },
      body: JSON.stringify({ cfg: {
        ...state.cfg,
        // n_candles: offset fixo em 1 tick — não exposto ao usuário
        stopOffset: state.cfg.stopType==='n_candles'
          ? getAssetTick(state.cfg.asset).tick
          : state.cfg.stopOffset,
      } }),
    });

    const data = await res.json();
    console.log('submit-backtest response:', res.status, data);

    if (!res.ok) {
      return { error: data.error || `Erro ${res.status}: ${JSON.stringify(data)}` };
    }

    return { backtest_id: data.backtest_id };
  } catch (e) {
    return { error: 'Erro de conexao: ' + e.message };
  }
}

// Polling do status do backtest
async function pollBacktestResult(backtestId, onProgress, onDone, onError) {
  const maxAttempts = 720; // 720 * 5s = 60 min max
  let attempts = 0;
  const progressMsgs = getLoadMsgs();

  // Obter token do usuario para RLS
  const session = await db.auth.getSession();
  const userToken = session?.data?.session?.access_token || SUPA_KEY;

  const poll = async () => {
    if (attempts >= maxAttempts) {
      onError('Timeout: backtest demorou mais de 60 minutos.');
      return;
    }

    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/backtests?id=eq.${backtestId}&select=status,result,error`,
        { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${userToken}` } }
      );
      const rows = await res.json();
      if (!rows || rows.length === 0) {
        onError('Backtest nao encontrado.');
        return;
      }

      const bt = rows[0];

      if (bt.status === 'completed' && bt.result) {
        onDone(bt.result);
        return;
      }

      if (bt.status === 'failed') {
        onError(bt.error || 'Backtest falhou sem mensagem de erro.');
        return;
      }

      // Ainda processando
      attempts++;
      const msgIdx = Math.min(Math.floor(attempts / 3), progressMsgs.length - 1);
      onProgress(progressMsgs[msgIdx], attempts);
      setTimeout(poll, 5000);
    } catch (e) {
      attempts++;
      if (attempts < maxAttempts) {
        setTimeout(poll, 5000);
      } else {
        onError('Erro de conexao durante polling: ' + e.message);
      }
    }
  };

  poll();
}

// ─── LOADING ─────────────────────────────────────────────────
function calcCandles(tf) {
  // Periodo historico: Jan 2019 - Mar 2026 = ~7.25 anos = ~1856 dias uteis
  const diasUteis = 1856;
  const minPorDia = {'1m':480,'2m':480,'5m':480,'10m':480,'15m':480,'30m':480,'60m':480,'D':1};
  const tfMin = {'1m':1,'2m':2,'5m':5,'10m':10,'15m':15,'30m':30,'60m':60,'D':480};
  const minDia = minPorDia[tf] || 480;
  const minTf  = tfMin[tf] || 5;
  const total  = Math.round((diasUteis * minDia) / minTf);
  return total.toLocaleString('pt-BR');
}

function getLoadMsgs() {
  const tf = state.cfg ? state.cfg.tf : '5m';
  const nCandles = calcCandles(tf);
  const tfLabel = {'1m':'1 minuto','2m':'2 minutos','5m':'5 minutos','10m':'10 minutos',
                   '15m':'15 minutos','30m':'30 minutos','60m':'60 minutos','D':'diário'}[tf] || tf;
  return [
    'Enviando para processamento...',
    'Analisando 7 anos de dados reais do mercado...',
    `Carregando ${nCandles} candles de ${tfLabel}...`,
    'Simulando cada operacao, candle por candle...',
    'Calculando o que teria acontecido com o seu dinheiro...',
    'Medindo drawdowns - os momentos dificeis tambem contam...',
    'Quase la. A verdade sobre esse setup esta chegando...',
  ];
}

async function startLoading() {
  state.animate=true;state.screen='loading';state.loadMsg=0;renderApp();

  // 1. Submeter backtest
  const submission = await submitBacktestToBackend();

  if (!submission || submission.error) {
    // Erro ao submeter: mostrar na tela de loading e voltar
    const errMsg = submission ? submission.error : 'Erro desconhecido';
    console.error('submitBacktest error:', errMsg);
    const msgEl = document.getElementById('load-msg');
    if (msgEl) msgEl.textContent = errMsg;
    setTimeout(() => { state.animate=true; state.screen='confirm'; renderApp(); }, 5000);
    return;
  }

  // 2. Polling do resultado
  pollBacktestResult(
    submission.backtest_id,
    // onProgress
    (msg, attempt) => {
      const msgEl = document.getElementById('load-msg');
      if (msgEl) msgEl.textContent = msg;
      // Atualizar barra de progresso (estimativa)
      const fill = document.querySelector('.load-fill');
      if (fill) {
        const pct = Math.min(90, attempt * 2);
        fill.style.width = pct + '%';
      }
    },
    // onDone
    (result) => {
      // Converter resultado para formato EQ
      EQ = convertBackendResult(result, 100000);
      if (EQ.length === 0) {
        // Fallback: resultado sem trades
        EQ = [{ v: 0, dd: 0, pnl: 0, t: 'N/A' }];
      }
      EQ_ANALYSIS = computeAnalysis(EQ, 100000);

      // Completar barra e mostrar resultados
      const fill = document.querySelector('.load-fill');
      if (fill) fill.style.width = '100%';
      setTimeout(() => { state.animate=true; state.screen='results'; renderApp(); }, 500);
    },
    // onError
    (errorMsg) => {
      const msgEl = document.getElementById('load-msg');
      if (msgEl) {
        msgEl.style.color = '#EF4444';
        msgEl.textContent = errorMsg;
      }
      // Botao para voltar
      const loadScreen = document.querySelector('.loading-screen');
      if (loadScreen) {
        const backBtn = document.createElement('button');
        backBtn.className = 'btn btnS';
        backBtn.style.cssText = 'margin-top:20px';
        backBtn.textContent = 'Voltar';
        backBtn.onclick = () => { state.animate=true; state.screen='confirm'; renderApp(); };
        loadScreen.appendChild(backBtn);
      }
    }
  );
}

// ─── STRATEGY SENTENCE ────────────────────────────────────────
function buildStrategySentence(cfg) {
  const asset = findAsset(cfg.asset);
  const assetName = asset ? asset.n : cfg.asset;
  const dirText = cfg.direction==='long'
    ? '<span class="hl">comprar</span>'
    : cfg.direction==='short'
    ? '<span class="hl">vender</span>'
    : '<span class="hl">comprar e vender</span>';
  const entryMap = {
    breakout: 'entrando no rompimento da máx/mín do candle de sinal',
    next_open: 'entrando na abertura do próximo candle',
  };
  const stopMap = {
    fixed: `stop fixo de <strong>${cfg.stopPts} pts</strong>`,
    hl_candle: `stop na máx/mín do candle de sinal`,
    n_candles: `stop na máx/mín dos últimos <strong>${cfg.stopCandles} candles</strong> (1 tick de buffer)`,
    atr: `stop de <strong>${cfg.stopAtrMult}× ATR(${cfg.stopAtrPer})</strong>`,
  };
  const tpMap = {
    fixed: `alvo de <strong>${cfg.tpPts} pts</strong>`,
    rr: `alvo de <strong>${cfg.tpRR}× o risco</strong>`,
    atr: `alvo de <strong>${cfg.tpAtrMult}× ATR(${cfg.tpAtrPer})</strong>`,
    fib_ext: `alvo na extensão de Fibonacci <strong>${cfg.tpFibLevel}%</strong>`,
    none: 'sem alvo fixo',
  };
  const conds = cfg.conditions.length === 0
    ? '<span style="color:var(--txm)">nenhuma condição definida ainda</span>'
    : cfg.conditions.map(c => `<strong>${condLabel(c)}</strong>`).join(' <span class="hl">e</span> ');

  const parts = [];
  parts.push(`Sistema vai ${dirText} <strong>${assetName}</strong> no <strong>${cfg.tf}</strong>`);
  parts.push(`quando ${conds}`);
  if(cfg.conditions.length > 0) parts.push(entryMap[cfg.entryType] || '');
  const risk = [stopMap[cfg.stopType], tpMap[cfg.tpType]].filter(Boolean);
  if(risk.length) parts.push(risk.join(', '));
  if(cfg.trailing) parts.push(`trailing após <strong>${cfg.trailAct} pts</strong>`);
  if(cfg.partial) parts.push(`parcial de <strong>${cfg.partPct}%</strong> aos <strong>${cfg.partAt} pts</strong>`);
  return parts.filter(Boolean).join(' · ');
}

// ─── PROGRESS BAR ─────────────────────────────────────────────
function renderProgressBar() {
  const pb=document.getElementById('prog-bar');
  pb.innerHTML='';
  if(state.screen!=='wizard') {
    const lbl=div('');lbl.style.cssText='font-size:13px;color:var(--txs);font-weight:500';
    lbl.textContent=state.screen==='confirm'?'Confirmar estratégia':state.screen==='loading'?'Processando...':'Resultado do backtest';
    pb.appendChild(lbl);return;
  }
  STEPS.forEach((s,i)=>{
    const done=i<state.maxDone;const active=i===state.step;
    const btn_=h('button',{class:'prog-step',disabled:i>state.maxDone});
    btn_.addEventListener('click',()=>{if(i<=state.maxDone&&i!==state.step){if(i>1&&state.cfg.conditions.length===0)return;state.dir=i>state.step?'fwd':'bwd';state.animate=true;state.step=i;renderApp();}});
    const circle=div('prog-circle'+(done?' done':active?' active':''));
    if(done) circle.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    else circle.innerHTML=IC[s.icon]||'';
    if(circle.querySelector('svg')){const sv=circle.querySelector('svg');sv.style.color=active?'var(--action-t)':done?'white':'var(--txm)';}
    if(done && i===state.maxDone-1 && state.dir==='fwd'){circle.style.animation='stepDone .36s ease-out';}
    const label=div('prog-label'+(done?' done':active?' active':''));label.textContent=s.label;
    btn_.append(circle,label);
    pb.appendChild(btn_);
    if(i<STEPS.length-1){const line=div('prog-line'+(done?' done':''));pb.appendChild(line);}
  });
}

function switchPayMethod(method, btnEl) {
  document.querySelectorAll('.pay-method-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  const pixArea = document.getElementById('pix-form-area');
  const cardContainer = document.getElementById('cardPaymentBrick_container');
  if (method === 'pix') {
    payMethod = 'pix';
    if (pixArea) pixArea.style.display = 'block';
    if (cardContainer) cardContainer.style.display = 'none';
  } else {
    const needsRemount = payMethod !== method || !mpMounted;
    payMethod = method;
    if (pixArea) pixArea.style.display = 'none';
    if (cardContainer) cardContainer.style.display = 'block';
    if (needsRemount) {
      // Destroy and recreate Brick with correct card type
      if (window.cardPaymentBrickController) { try { window.cardPaymentBrickController.unmount(); } catch(e){} window.cardPaymentBrickController = null; }
      mpMounted = false;
      if (cardContainer) cardContainer.innerHTML = '';
      initCardBrick();
    }
  }
}

function initCardBrick() {
  if (!window.MercadoPago) {
    const s = document.createElement('script');
    s.src = 'https://sdk.mercadopago.com/js/v2';
    s.onload = () => setTimeout(renderCardBrick, 200);
    document.head.appendChild(s);
  } else {
    renderCardBrick();
  }
}

async function renderCardBrick() {
  const container = document.getElementById('cardPaymentBrick_container');
  if (!container) return;
  if (mpMounted) return;
  mpMounted = true;
  const price = PRICES[selectedPlan][selectedCycle];
  try {
    mpInstance = new MercadoPago(MP_PUBLIC_KEY, { locale: 'pt-BR' });
    const bricksBuilder = mpInstance.bricks();
    window.cardPaymentBrickController = await bricksBuilder.create('cardPayment', 'cardPaymentBrick_container', {
      initialization: {
        amount: price,
        payer: {
          email: currentUser.email,
        },
      },
      customization: {
        visual: {
          style: {
            theme: 'dark',
            customVariables: {
              formBackgroundColor: '#12121A',
              baseColor: '#00D4AA',
            }
          },
          hideFormTitle: true,
          hidePaymentButton: false,
        },
        paymentMethods: {
          maxInstallments: payMethod === 'credit_card' ? 12 : 1,
          ...(payMethod === 'credit_card' ? { debitCard: 'none' } : { creditCard: 'none' }),
        },
      },
      callbacks: {
        onReady: () => {},
        onSubmit: async (formData) => {
          try {
            const { data: { session } } = await db.auth.getSession();
            const res = await fetch(`${SUPA_URL}/functions/v1/create-payment`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
              body: JSON.stringify({
                plan: selectedPlan,
                cycle: selectedCycle,
                payment_type: payMethod,
                payment_method_id: formData.payment_method_id,
                token: formData.token,
                issuer_id: formData.issuer_id || null,
                installments: formData.installments || 1,
                payer: {
                  email: currentUser.email,
                  identification: formData.payer?.identification || { type:'CPF', number:'' },
                },
              }),
            });
            const data = await res.json();
            if (!res.ok || data.error) { showPayError(data.error||'Erro no pagamento.'); return; }
            if (data.status==='approved') {
              const { data: { session: s } } = await db.auth.getSession();
              await loadSubscription(s.access_token);
              updateAvatarUI();
              showPaySuccess();
            } else {
              showPayError('Pagamento recusado. Verifique os dados ou tente outro método.');
            }
          } catch(e) { showPayError('Erro ao processar pagamento.'); }
        },
        onError: () => {},
      },
    });
  } catch(e) { console.error('MP Brick init error:', e); }
}

let tourActive=false, tourStepIdx=0, tourCurrentSteps=[];

function startTour(steps){
  if(!steps||!steps.length)return;
  tourActive=true;tourStepIdx=0;tourCurrentSteps=steps;
  showTourStep();
}

function startTourForCurrentScreen(){
  if(state.screen==='wizard') startTour(TOUR_STEPS.wizard);
  else if(state.screen==='results') startTour(TOUR_STEPS.results);
  else if(currentScreen==='history') startTour(TOUR_STEPS.history);
}

function showTourStep(){
  clearTour();
  if(tourStepIdx>=tourCurrentSteps.length){endTour();return;}
  const step=tourCurrentSteps[tourStepIdx];
  const target=document.querySelector(step.sel);
  if(!target){tourStepIdx++;showTourStep();return;}

  // Backdrop
  const backdrop=div('tour-backdrop');
  backdrop.id='tour-backdrop';
  backdrop.addEventListener('click',endTour);
  document.body.appendChild(backdrop);

  // Highlight
  const rect=target.getBoundingClientRect();
  const highlight=div('tour-highlight');
  highlight.id='tour-highlight';
  highlight.style.cssText=`position:fixed;left:${rect.left-4}px;top:${rect.top-4}px;width:${rect.width+8}px;height:${rect.height+8}px`;
  document.body.appendChild(highlight);

  // Ensure target is visible above backdrop
  target.style.position=target.style.position||'relative';
  target.style.zIndex='901';
  target.dataset.tourRestore='1';

  // Tooltip
  const tooltip=div('tour-tooltip');
  tooltip.id='tour-tooltip';

  const titleEl=div('tour-tooltip-title');
  titleEl.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="3"/></svg> ${step.title}`;
  const bodyEl=div('tour-tooltip-body');bodyEl.textContent=step.body;

  const footer=div('tour-tooltip-footer');
  const counter=div('tour-tooltip-counter');counter.textContent=`${tourStepIdx+1} de ${tourCurrentSteps.length}`;
  const btns=div('tour-tooltip-btns');
  const skipBtn=h('button',{class:'tour-skip',onclick:endTour});skipBtn.textContent='Pular';
  const nextBtn=h('button',{class:'tour-next',onclick:nextTourStep});
  nextBtn.textContent=tourStepIdx<tourCurrentSteps.length-1?'Próximo':'Entendi!';
  btns.append(skipBtn,nextBtn);footer.append(counter,btns);

  // Arrow
  const arrow=div('tour-arrow');

  tooltip.append(titleEl,bodyEl,footer);
  // Renderiza invisível primeiro para medir dimensões reais
  tooltip.style.cssText='position:fixed;visibility:hidden;left:0;top:0';
  document.body.appendChild(tooltip);

  // Mede após renderização
  const ttRect=tooltip.getBoundingClientRect();
  let left=rect.left, top;

  // Tenta posição preferida, faz fallback se não couber
  const spaceBelow = window.innerHeight - rect.bottom - 12;
  const spaceAbove = rect.top - 12;
  let useBottom = (step.pos==='bottom'||!step.pos) ? true : false;

  // Fallback: se não couber na posição preferida, tenta o outro lado
  if(useBottom && spaceBelow < ttRect.height && spaceAbove >= ttRect.height) useBottom=false;
  if(!useBottom && spaceAbove < ttRect.height && spaceBelow >= ttRect.height) useBottom=true;

  if(useBottom){
    top=rect.bottom+12;
    arrow.className='tour-arrow tour-arrow-bottom';
  } else {
    top=rect.top-ttRect.height-12;
    arrow.className='tour-arrow tour-arrow-top';
  }
  tooltip.appendChild(arrow);

  // Mantém dentro da viewport horizontalmente
  if(left+ttRect.width>window.innerWidth-16) left=window.innerWidth-ttRect.width-16;
  if(left<16) left=16;
  // Garante que não sai da viewport verticalmente
  if(top<8) top=8;
  if(top+ttRect.height>window.innerHeight-8) top=window.innerHeight-ttRect.height-8;

  tooltip.style.cssText=`position:fixed;left:${left}px;top:${top}px`;
}

function nextTourStep(){tourStepIdx++;showTourStep();}

function clearTour(){
  document.getElementById('tour-backdrop')?.remove();
  document.getElementById('tour-highlight')?.remove();
  document.getElementById('tour-tooltip')?.remove();
  document.querySelectorAll('[data-tour-restore]').forEach(el=>{el.style.zIndex='';delete el.dataset.tourRestore;});
}

function endTour(){
  clearTour();tourActive=false;tourStepIdx=0;tourCurrentSteps=[];
  try{localStorage.setItem('bt_tour_done','1');}catch(e){}
}

function maybeAutoTour(){
  try{if(localStorage.getItem('bt_tour_done'))return;}catch(e){}
  setTimeout(()=>{if(state.screen==='wizard')startTour(TOUR_STEPS.wizard);},600);
}

// Rate limiting simples no cliente
const _authAttempts = { count: 0, resetAt: 0 };
async function handleAuth(mode) {
  const now = Date.now();
  if (now > _authAttempts.resetAt) { _authAttempts.count = 0; _authAttempts.resetAt = now + 60000; }
  if (++_authAttempts.count > 5) {
    const w = Math.ceil((_authAttempts.resetAt - now) / 1000);
    const e = document.getElementById('auth-error');
    if (e) { e.textContent = `Muitas tentativas. Aguarde ${w}s.`; e.classList.add('show'); }
    _authAttempts.count--;
    return;
  }
  const email=document.getElementById('auth-email')?.value?.trim();
  const pass=document.getElementById('auth-pass')?.value;
  const name=document.getElementById('auth-name')?.value?.trim();
  const btn=document.getElementById('auth-submit');
  const errEl=document.getElementById('auth-error');
  if(!email||!pass){errEl.textContent='Preencha e-mail e senha.';errEl.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Aguarde...';
  let result;
  if(mode==='login') result=await db.auth.signInWithPassword({email,password:pass});
  else result=await db.auth.signUp({email,password:pass,options:{data:{full_name:name||email.split('@')[0]}}});
  if(result.error){
    const msgs={'Invalid login credentials':'E-mail ou senha incorretos.','User already registered':'E-mail já cadastrado. Faça login.','Password should be at least 6 characters':'Senha deve ter pelo menos 6 caracteres.'};
    errEl.textContent=msgs[result.error.message]||result.error.message;errEl.classList.add('show');
    btn.disabled=false;btn.textContent=mode==='login'?'Entrar':'Criar conta';return;
  }
  if(mode==='signup'&&!result.data.session){
    document.getElementById('auth-overlay')?.remove();
    alert('Verifique seu e-mail para confirmar o cadastro.');
    showAuthModal('login');return;
  }
  // Login bem sucedido — onAuthStateChange vai cuidar do resto
}

// ─── BOOT ─────────────────────────────────────────────────────
// Único ponto de entrada de sessão — onAuthStateChange
let currentScreen = null; // Track current screen to prevent auth override
let authResolved = false; // Flag para saber se o INITIAL_SESSION já foi processado

// Mostrar spinner de boot enquanto a sessão é verificada
(function showBootSpinner() {
  const main = document.getElementById('main');
  if (!main) return;
  const spinner = document.createElement('div');
  spinner.id = 'boot-spinner';
  spinner.style.cssText = 'display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px)';
  spinner.innerHTML = '<div style="width:28px;height:28px;border:2.5px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin 0.7s linear infinite"></div>';
  main.replaceChildren(spinner);
})();

db.auth.onAuthStateChange(async (event, session) => {
  
  if (event === 'SIGNED_IN' && session?.user) {
    currentUser = session.user;
    await loadSubscription(session.access_token);
    updateAvatarUI();
    document.getElementById('auth-overlay')?.remove();
    // Don't override if user is already on plans/payment screens
    if (currentScreen === 'plans' || currentScreen === 'payment' || currentScreen === 'history') return;
    if (currentSub) { renderApp(); } else { showScreen('nosub'); }
  }
  if (event === 'INITIAL_SESSION') {
    authResolved = true;
    console.log('[AUTH] INITIAL_SESSION — user:', session?.user?.email || 'none');
    if (session?.user) {
      currentUser = session.user;
      await loadSubscription(session.access_token);
      console.log('[AUTH] loadSubscription result — currentSub:', currentSub);
      updateAvatarUI();
      document.getElementById('boot-spinner')?.remove();
      if (currentSub) {
        console.log('[AUTH] → renderApp()');
        renderApp(); maybeAutoTour();
      } else {
        console.log('[AUTH] → showScreen(nosub)');
        showScreen('nosub');
      }
    } else {
      document.getElementById('boot-spinner')?.remove();
      showAuthModal('login');
    }
  }
  if (event === 'SIGNED_OUT') {
    currentUser=null; currentSub=null; currentScreen=null; authResolved=false;
    showAuthModal('login');
  }
});

// ─── SHARE CARD GENERATOR ──────────────────────────────────────
function rrect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

async function generateShareCard(){
  const A=EQ_ANALYSIS,last=EQ[EQ.length-1].v,ok=last>0,cfg=state.cfg;

  cx.fillStyle='#0A0A0F';cx.fillRect(0,0,S,S);

  const gd=cx.createLinearGradient(0,0,S,0);
  gd.addColorStop(0,'transparent');gd.addColorStop(.2,ok?'#10B981':'#EF4444');gd.addColorStop(.5,ok?'#00D4AA':'#F87171');gd.addColorStop(.8,ok?'#10B981':'#EF4444');gd.addColorStop(1,'transparent');
  cx.fillStyle=gd;cx.fillRect(0,0,S,sc(2));
  const gG=cx.createRadialGradient(S/2,sc(120),0,S/2,sc(120),sc(250));
  gG.addColorStop(0,ok?'rgba(16,185,129,0.05)':'rgba(239,68,68,0.05)');gG.addColorStop(1,'transparent');
  cx.fillStyle=gG;cx.fillRect(0,0,S,sc(300));

  // Header
  const lx=sc(28),ly=sc(22);
  cx.fillStyle='rgba(0,212,170,0.12)';cx.strokeStyle='rgba(0,212,170,0.3)';cx.lineWidth=1;
  rrect(cx,lx,ly,sc(24),sc(24),sc(6));cx.fill();cx.stroke();
  cx.strokeStyle='#00D4AA';cx.lineWidth=sc(1.5);cx.lineCap='round';
  cx.beginPath();cx.moveTo(lx+sc(6),ly+sc(4));cx.lineTo(lx+sc(6),ly+sc(18));cx.lineTo(lx+sc(18),ly+sc(18));cx.stroke();
  cx.beginPath();cx.moveTo(lx+sc(9),ly+sc(14));cx.lineTo(lx+sc(12),ly+sc(10));cx.lineTo(lx+sc(15),ly+sc(12));cx.lineTo(lx+sc(18),ly+sc(8));cx.stroke();

  cx.fillStyle='#44445A';cx.font=sn(500,8.5);cx.textAlign='right';

  // Strategy bar
  const bY=sc(58);

  rrect(cx,sc(28),bY,S-sc(56),sc(38),sc(8));cx.fill();cx.stroke();
  const si=[['ATIVO',cfg.asset],['TIMEFRAME',cfg.tf],['PER\u00cdODO','Jan/2021 \u2013 Mar/2026'],['OPERA\u00c7\u00d5ES',EQ.length.toLocaleString('pt-BR')]];

  cx.font=sn(700,10);const bt=ok?'Lucrativa':'Deficit\u00e1ria';
  const bW2=cx.measureText(bt).width+sc(30),bX2=S-sc(28)-bW2;

  rrect(cx,bX2,vY+sc(14),bW2,sc(26),sc(13));cx.fill();cx.stroke();
  cx.fillStyle=ok?'#10B981':'#EF4444';cx.textAlign='center';cx.fillText(bt,bX2+bW2/2,vY+sc(31));cx.textAlign='left';

  // Metrics
  const mY=sc(188),mW=(S-sc(56)-sc(24))/4;
  [{l:'TAXA DE ACERTO',v:A.winRate.toFixed(1)+'%',c:'#F59E0B',p:A.winRate},{l:'PROFIT FACTOR',v:A.profitFactor.toFixed(2),c:A.profitFactor>1?'#00D4AA':'#EF4444'},{l:'RESULTADO/TRADE',v:'R$'+(last/EQ.length).toFixed(2),c:last>=0?'#10B981':'#EF4444'},{l:'MAX DRAWDOWN',v:'\u2212R$'+A.maxDDVal.toLocaleString('pt-BR',{maximumFractionDigits:0}),c:'#EF4444'}].forEach((m,i)=>{

  });

  // Equity chart

  cx.fillStyle='#44445A';cx.font=sn(700,7.5);cx.fillText('CURVA DE EQUITY',sc(42),cY2+sc(16));
  const chX=sc(42),chY=cY2+sc(24),chW=S-sc(84),chH=sc(72);
  const vs=EQ.map(d=>d.v),mnV=Math.min(...vs,0),mxV=Math.max(...vs),rgV=mxV-mnV||1;
  const px=i=>chX+(i/(EQ.length-1))*chW,py=v=>chY+(1-(v-mnV)/rgV)*chH;
  if(mnV<0){const zy=py(0);cx.strokeStyle='#1E1E2E';cx.lineWidth=.5;cx.setLineDash([sc(3),sc(4)]);cx.beginPath();cx.moveTo(chX,zy);cx.lineTo(chX+chW,zy);cx.stroke();cx.setLineDash([]);}
  const aG=cx.createLinearGradient(0,chY,0,chY+chH);

  cx.fillStyle=aG;cx.beginPath();cx.moveTo(px(0),chY+chH);EQ.forEach((d,i)=>cx.lineTo(px(i),py(d.v)));cx.lineTo(px(EQ.length-1),chY+chH);cx.closePath();cx.fill();
  cx.strokeStyle=ok?'#10B981':'#EF4444';cx.lineWidth=sc(1.5);cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();EQ.forEach((d,i)=>{if(i===0)cx.moveTo(px(i),py(d.v));else cx.lineTo(px(i),py(d.v));});cx.stroke();
  const lp2={x:px(EQ.length-1),y:py(last)};
  cx.fillStyle=ok?'rgba(16,185,129,0.15)':'rgba(239,68,68,0.15)';cx.beginPath();cx.arc(lp2.x,lp2.y,sc(5),0,Math.PI*2);cx.fill();

async function shareResult(evt){
  const btn=evt?evt.currentTarget:event.currentTarget;
  const orig=btn.innerHTML;
  btn.innerHTML='<span style="display:inline-flex;animation:spin .6s linear infinite">\u27f3</span> Gerando...';btn.disabled=true;
  try{
    const blob=await generateShareCard();
    const file=new File([blob],'backtest-pro-resultado.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Resultado do Backtest Pro'});
    }else{
      const url=URL.createObjectURL(blob);const a=document.createElement('a');
      a.href=url;a.download='backtest-pro-resultado.png';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  }catch(e){if(e.name!=='AbortError')console.error('Share error:',e);}
  btn.innerHTML=orig;btn.disabled=false;
}
